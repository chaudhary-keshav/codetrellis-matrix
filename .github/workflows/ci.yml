name: CodeTrellis Quality Gates

on:
  push:
    branches: [main, master, batch-2]
  pull_request:
    branches: [main, master, batch-2]

env:
  CODETRELLIS_BUILD_TIMESTAMP: "2026-01-01T00:00:00"

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pytest-timeout

      # ── Gate 2: Lint (D2) ──────────────────────────────────────────
      - name: "Gate 2 — Lint (ruff)"
        run: ruff check codetrellis/

      - name: "Gate 2 — Typecheck (mypy)"
        run: mypy codetrellis/ --ignore-missing-imports --no-error-summary
        continue-on-error: true # Advisory per D6

      # ── Gate 3: Tests (D3) ─────────────────────────────────────────
      - name: "Gate 3 — Tests (pytest)"
        run: |
          pytest tests/ -v --tb=short -q --timeout=120

      # ── Gate 1: Build (D1) ─────────────────────────────────────────
      - name: "Gate 1 — Build (scan + verify)"
        run: |
          codetrellis scan . --optimal
          codetrellis verify .

      # ── Gate 4: Determinism (D4) ───────────────────────────────────
      - name: "Gate 4 — Determinism"
        run: bash scripts/verify_determinism.sh .

      # ── Gate 5: Incremental Rebuild (D5) ───────────────────────────
      - name: "Gate 5 — Incremental Rebuild"
        run: bash scripts/verify_incremental.sh .
