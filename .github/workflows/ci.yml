name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CODETRELLIS_BUILD_TIMESTAMP: "2026-01-01T00:00:00"

jobs:
  # ── Lint ────────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check codetrellis/

      - name: Mypy typecheck (advisory)
        run: mypy codetrellis/ --ignore-missing-imports --no-error-summary
        continue-on-error: true

      - name: Version consistency check
        run: |
          PYPROJECT_VER=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          INIT_VER=$(python3 -c "from codetrellis import __version__; print(__version__)")
          if [ "$PYPROJECT_VER" != "$INIT_VER" ]; then
            echo "❌ Version mismatch: pyproject.toml=$PYPROJECT_VER, __init__.py=$INIT_VER"
            exit 1
          fi
          echo "✅ Version consistent: $PYPROJECT_VER"

  # ── Test ────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -x -q --timeout=120

  # ── Package ─────────────────────────────────────────────────────
  package:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install build tools
        run: pip install build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Validate distributions
        run: twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
