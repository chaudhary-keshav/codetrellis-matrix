name: Release to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # Required for trusted publishing

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -x -q --timeout=120

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine
          pip install -e .

      - name: Version consistency check
        run: |
          PYPROJECT_VER=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          INIT_VER=$(python3 -c "from codetrellis import __version__; print(__version__)")
          if [ "$PYPROJECT_VER" != "$INIT_VER" ]; then
            echo "❌ Version mismatch: pyproject.toml=$PYPROJECT_VER, __init__.py=$INIT_VER"
            exit 1
          fi
          echo "✅ Version consistent: $PYPROJECT_VER"

      - name: Version from tag check
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VER="${GITHUB_REF#refs/tags/v}"
          PYPROJECT_VER=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$TAG_VER" != "$PYPROJECT_VER" ]; then
            echo "❌ Tag version mismatch: tag=$TAG_VER, pyproject.toml=$PYPROJECT_VER"
            exit 1
          fi
          echo "✅ Tag matches package version: $TAG_VER"

      - name: Build sdist and wheel
        run: python -m build

      - name: Validate distributions
        run: twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ── Publish to Test PyPI first ──────────────────────────────────
  publish-test:
    runs-on: ubuntu-latest
    needs: build
    environment: test-pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to Test PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  # ── Publish to PyPI ─────────────────────────────────────────────
  publish-pypi:
    runs-on: ubuntu-latest
    needs: [build, publish-test]
    if: startsWith(github.ref, 'refs/tags/v')
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
