🔍 AugmentCode's Full Product Architecture (Researched)
AugmentCode is not one tool — it's 7 coordinated products built on a shared Context Engine:

Product	What It Does
Context Engine	Cloud-hosted semantic index of entire codebase — code, deps, commit history, architecture patterns, tribal knowledge. Real-time knowledge graph. 1M+ files indexed.
IDE Agents	VS Code / JetBrains chat agent with Plan→Implement→Review workflow, task lists, memories, checkpoints, auto mode, parallel tool calls
Intent (new)	Standalone Mac app — multi-agent orchestration. Coordinator agent → Specialist agents (Auth, API, Test, etc.) → Verifier agent. Living spec as source of truth. Isolated workspaces with built-in browser + git.
Code Review	GitHub PR reviewer. 65% precision (F-score), beats Cursor/CodeRabbit/Copilot. Inline comments + one-click IDE fixes. PR summaries + team standards enforcement.
Remote Agents	Cloud-isolated agents running in parallel on separate branches. Each has own OS + workspace. 24/7 availability.
CLI (Auggie)	Terminal-native agent with same Context Engine.
Slack	AI in Slack channels for codebase questions.
