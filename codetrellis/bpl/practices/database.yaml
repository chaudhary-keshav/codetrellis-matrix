  # ADVANCED PATTERNS (DB016-DB020)
  # ============================================================================

  - id: DB016
    title: 'Use Read Replicas'
    category: architecture
    level: advanced
    priority: medium
    applicability:
      frameworks:
        - sqlalchemy
        - django
    content:
      description: |
        Route read queries to read replicas to scale database reads
        and reduce load on the primary.
      rationale: |
        Read replicas enable horizontal scaling of read-heavy
        workloads without affecting write performance.
      good_examples:
        - |
          # ✅ SQLAlchemy with read/write routing
          from sqlalchemy import create_engine
          from sqlalchemy.orm import Session

          write_engine = create_engine('postgresql://host-primary/db')
          read_engine = create_engine('postgresql://host-replica/db')

          class RoutingSession(Session):
              def get_bind(self, mapper=None, clause=None):
                  if self._flushing or self._transaction:
                      return write_engine
                  return read_engine

          # ✅ Django database router
          # settings.py
          DATABASES = {
              'default': {
                  'ENGINE': 'django.db.backends.postgresql',
                  'HOST': 'primary-host',
              },
              'replica': {
                  'ENGINE': 'django.db.backends.postgresql',
                  'HOST': 'replica-host',
              },
          }

          DATABASE_ROUTERS = ['myapp.routers.ReadReplicaRouter']

          # myapp/routers.py
          class ReadReplicaRouter:
              def db_for_read(self, model, **hints):
                  return 'replica'

              def db_for_write(self, model, **hints):
                  return 'default'

              def allow_relation(self, obj1, obj2, **hints):
                  return True

              def allow_migrate(self, db, app_label, model_name=None, **hints):
                  return db == 'default'

          # ✅ Explicit routing for replication lag
          # Read from primary when consistency needed
          user = User.objects.using('default').get(id=user_id)  # Force primary

          # Or use a decorator
          from functools import wraps

          def use_primary_db(func):
              @wraps(func)
              def wrapper(*args, **kwargs):
                  with transaction.atomic(using='default'):
                      return func(*args, **kwargs)
              return wrapper
      bad_examples:
        - |
          # ❌ All queries to primary
          # Replica sits idle while primary is overloaded

          # ❌ Reading from replica immediately after write
          user.name = 'New Name'
          user.save()
          # This might get stale data due to replication lag:
          User.objects.using('replica').get(id=user.id)
      tags:
        - read-replicas
        - scaling
        - architecture

  - id: DB017
    title: 'Implement Database Caching'
    category: performance
    level: intermediate
    priority: high
    applicability:
      frameworks:
        - sqlalchemy
        - django
    content:
      description: |
        Cache frequently accessed, rarely changed data to reduce
        database load. Implement proper cache invalidation.
      rationale: |
        Caching reduces database queries and improves response times
        for frequently accessed data.
      good_examples:
        - |
          # ✅ Django caching with invalidation
          from django.core.cache import cache
          from django.db.models.signals import post_save, post_delete
          from django.dispatch import receiver

          class CachedQueryMixin:
              CACHE_TIMEOUT = 300  # 5 minutes

              @classmethod
              def get_cache_key(cls, pk):
                  return f'{cls.__name__.lower()}:{pk}'

              @classmethod
              def get_cached(cls, pk):
                  cache_key = cls.get_cache_key(pk)
                  obj = cache.get(cache_key)
                  if obj is None:
                      obj = cls.objects.get(pk=pk)
                      cache.set(cache_key, obj, cls.CACHE_TIMEOUT)
                  return obj

              def invalidate_cache(self):
                  cache.delete(self.get_cache_key(self.pk))

          class Category(CachedQueryMixin, models.Model):
              name = models.CharField(max_length=100)

          @receiver([post_save, post_delete], sender=Category)
          def invalidate_category_cache(sender, instance, **kwargs):
              instance.invalidate_cache()
              cache.delete('all_categories')  # Invalidate list cache too

          # ✅ Cache query results
          def get_all_categories():
              cache_key = 'all_categories'
              categories = cache.get(cache_key)
              if categories is None:
                  categories = list(Category.objects.all())
                  cache.set(cache_key, categories, 3600)
              return categories

          # ✅ Cache with dogpile prevention
          from django.core.cache import cache
          import threading

          _locks = {}

          def get_with_lock(key, creator, timeout=300):
              value = cache.get(key)
              if value is not None:
                  return value

              lock = _locks.setdefault(key, threading.Lock())
              with lock:
                  value = cache.get(key)
                  if value is None:
                      value = creator()
                      cache.set(key, value, timeout)
              return value
      bad_examples:
        - |
          # ❌ No cache invalidation
          def get_category(pk):
              return cache.get_or_set(f'category:{pk}',
                  lambda: Category.objects.get(pk=pk), 3600)
          # Cache never invalidated when category changes!

          # ❌ Caching frequently changing data
          cache.set('user_order_count', Order.objects.count(), 86400)
      tags:
        - caching
        - performance
        - invalidation

  - id: DB018
    title: 'Handle Large Data Sets'
    category: performance
    level: advanced
    priority: medium
    applicability:
      frameworks:
        - sqlalchemy
        - django
    content:
      description: |
        Process large data sets efficiently using iterators, chunking,
        and streaming to avoid memory issues.
      rationale: |
        Loading large datasets into memory can cause out-of-memory
        errors and slow performance.
      good_examples:
        - |
          # ✅ SQLAlchemy - Streaming results
          def process_all_orders():
              # Stream results without loading all into memory
              for order in session.query(Order).yield_per(1000):
                  process_order(order)

              # Or use server-side cursor
              with session.begin():
                  for order in session.execute(
                      select(Order),
                      execution_options={'stream_results': True, 'yield_per': 1000}
                  ):
                      process_order(order)

          # ✅ Django - Iterator and chunked processing
          def export_all_users():
              # iterator() uses server-side cursor
              for user in User.objects.all().iterator(chunk_size=1000):
                  yield user.to_csv_row()

          # ✅ Chunked processing with ID ranges
          def process_in_chunks(model, process_func, chunk_size=1000):
              last_id = 0
              while True:
                  chunk = list(
                      model.objects.filter(id__gt=last_id)
                      .order_by('id')[:chunk_size]
                  )
                  if not chunk:
                      break

                  for obj in chunk:
                      process_func(obj)

                  last_id = chunk[-1].id

          # ✅ Bulk operations
          def update_all_prices(multiplier):
              # Don't load objects - update in batches
              batch_size = 1000
              updated = 0

              while True:
                  ids = list(
                      Product.objects.filter(price_updated=False)
                      .values_list('id', flat=True)[:batch_size]
                  )
                  if not ids:
                      break

                  Product.objects.filter(id__in=ids).update(
                      price=F('price') * multiplier,
                      price_updated=True,
                  )
                  updated += len(ids)

              return updated
      bad_examples:
        - |
          # ❌ Loading all into memory
          all_orders = list(Order.objects.all())  # Millions of objects!
          for order in all_orders:
              process(order)

          # ❌ No chunking
          Order.objects.all().update(processed=True)  # Single huge transaction
      tags:
        - large-data
        - streaming
        - memory

  - id: DB019
    title: 'Use Full-Text Search'
    category: patterns
    level: intermediate
    priority: medium
    applicability:
      frameworks:
        - postgresql
        - django
    content:
      description: |
        Use database full-text search for efficient text searching
        instead of LIKE queries or loading data into Python.
      rationale: |
        Full-text search is much faster than LIKE queries and
        provides features like ranking and stemming.
      good_examples:
        - |
          # ✅ PostgreSQL full-text search
          """
          -- Add search vector column
          ALTER TABLE articles ADD COLUMN search_vector tsvector;

          -- Create GIN index
          CREATE INDEX articles_search_idx ON articles USING GIN (search_vector);

          -- Update trigger
          CREATE FUNCTION articles_search_trigger() RETURNS trigger AS $$
          BEGIN
              NEW.search_vector :=
                  setweight(to_tsvector('english', COALESCE(NEW.title, '')), 'A') ||
                  setweight(to_tsvector('english', COALESCE(NEW.content, '')), 'B');
              RETURN NEW;
          END
          $$ LANGUAGE plpgsql;

          CREATE TRIGGER articles_search_update
              BEFORE INSERT OR UPDATE ON articles
              FOR EACH ROW EXECUTE FUNCTION articles_search_trigger();

          -- Search query with ranking
          SELECT id, title, ts_rank(search_vector, query) AS rank
          FROM articles, plainto_tsquery('english', 'python best practices') query
          WHERE search_vector @@ query
          ORDER BY rank DESC
          LIMIT 20;
          """

          # ✅ Django full-text search
          from django.contrib.postgres.search import (
              SearchVector, SearchQuery, SearchRank, TrigramSimilarity
          )

          # Basic search
          articles = Article.objects.annotate(
              search=SearchVector('title', 'content'),
          ).filter(search='python best practices')

          # Weighted search with ranking
          search_query = SearchQuery('python best practices')
          articles = Article.objects.annotate(
              search=SearchVector('title', weight='A') + SearchVector('content', weight='B'),
              rank=SearchRank(F('search'), search_query),
          ).filter(search=search_query).order_by('-rank')

          # Trigram similarity for fuzzy matching
          articles = Article.objects.annotate(
              similarity=TrigramSimilarity('title', 'pythom'),
          ).filter(similarity__gt=0.3).order_by('-similarity')
      bad_examples:
        - |
          # ❌ LIKE queries - slow and no ranking
          articles = Article.objects.filter(
              Q(title__icontains='python') | Q(content__icontains='python')
          )

          # ❌ Python-side filtering
          all_articles = Article.objects.all()
          results = [a for a in all_articles if 'python' in a.content.lower()]
      tags:
        - full-text-search
        - postgresql
        - search

  - id: DB020
    title: 'Monitor Database Performance'
    category: monitoring
    level: intermediate
    priority: high
    applicability:
      frameworks:
        - postgresql
        - mysql
    content:
      description: |
        Monitor database performance: slow queries, connection usage,
        lock contention, and resource utilization.
      rationale: |
        Database monitoring enables proactive identification of
        performance issues before they impact users.
      good_examples:
        - |
          # ✅ PostgreSQL slow query logging
          """
          -- postgresql.conf
          log_min_duration_statement = 1000  # Log queries > 1s
          log_statement = 'none'
          log_lock_waits = on

          -- Or dynamically
          ALTER SYSTEM SET log_min_duration_statement = 1000;
          SELECT pg_reload_conf();
          """

          # ✅ PostgreSQL pg_stat_statements
          """
          -- Enable extension
          CREATE EXTENSION pg_stat_statements;

          -- Find slow queries
          SELECT
              calls,
              mean_exec_time::integer as avg_ms,
              total_exec_time::integer as total_ms,
              query
          FROM pg_stat_statements
          ORDER BY mean_exec_time DESC
          LIMIT 20;

          -- Find queries with most I/O
          SELECT
              calls,
              shared_blks_read + shared_blks_hit as total_blocks,
              query
          FROM pg_stat_statements
          ORDER BY shared_blks_read DESC
          LIMIT 20;
          """

          # ✅ Django query logging
          import logging

          LOGGING = {
              'handlers': {
                  'db_queries': {
                      'level': 'DEBUG',
                      'class': 'logging.FileHandler',
                      'filename': '/var/log/django/queries.log',
                  },
              },
              'loggers': {
                  'django.db.backends': {
                      'handlers': ['db_queries'],
                      'level': 'DEBUG',
                  },
              },
          }

          # ✅ Connection monitoring
          """
          -- Active connections
          SELECT
              datname,
              usename,
              state,
              query_start,
              query
          FROM pg_stat_activity
          WHERE state = 'active';

          -- Connection count by state
          SELECT state, count(*)
          FROM pg_stat_activity
          GROUP BY state;

          -- Lock monitoring
          SELECT
              l.locktype,
              l.relation::regclass,
              l.mode,
              l.granted,
              a.query
          FROM pg_locks l
          JOIN pg_stat_activity a ON l.pid = a.pid
          WHERE NOT l.granted;
          """
      bad_examples:
        - |
          # ❌ No monitoring
          # Slow queries go unnoticed until users complain

          # ❌ DEBUG=True in production for query logging
          DEBUG = True  # Logs queries but also exposes errors!
      references:
        - 'https://www.postgresql.org/docs/current/monitoring-stats.html'
      tags:
        - monitoring
        - performance
        - observability
