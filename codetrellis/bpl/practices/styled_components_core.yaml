# Styled Components Core Best Practices for CodeTrellis BPL v1.0
# Part of CodeTrellis v4.42 - Styled Components Framework Support
# Practice IDs: SC001-SC050
# Coverage: Components, Theme, Styling, Mixins, Performance,
#           Accessibility, SSR, Testing, Patterns, Migration
# Versions: styled-components v1.x-v6.x, @emotion/styled, linaria, goober

practices:
  # ============================================================================
  # SC COMPONENTS (SC001-SC005)
  # ============================================================================

  - id: SC001
    title: "Define styled components outside render function"
    description: "Always define styled components outside of the render function or React component body. Defining them inside causes a new component to be created on every render, which destroys the DOM tree, causes flicker, and defeats React's reconciliation."
    category: "sc_components"
    severity: "critical"
    applicability:
      frameworks: ["styled-components", "react"]
    tags: ["styled-components", "performance", "render"]
    example: |
      // ✅ Correct: defined outside component
      const StyledButton = styled.button`
        background: blue;
        color: white;
      `;

      function MyComponent() {
        return <StyledButton>Click me</StyledButton>;
      }

      // ❌ Wrong: defined inside component (re-created every render)
      function MyComponent() {
        const StyledButton = styled.button`
          background: blue;
        `;
        return <StyledButton>Click me</StyledButton>;
      }

  - id: SC002
    title: "Use .attrs() for default and frequently-used props"
    description: "Use .attrs() to attach default props or compute props that don't affect styling. This avoids creating a new className for each prop value and improves performance. Useful for HTML attributes like type, tabIndex, aria-label."
    category: "sc_components"
    severity: "critical"
    applicability:
      frameworks: ["styled-components", "react"]
    tags: ["styled-components", "attrs", "props"]
    example: |
      // ✅ Use .attrs() for non-style props
      const Input = styled.input.attrs(props => ({
        type: props.type || 'text',
        'aria-label': props.label,
      }))`
        padding: 8px;
        border: 1px solid ${({ hasError }) => hasError ? 'red' : '#ccc'};
      `;

      // ✅ .attrs() for frequently-changing props (avoid new class per value)
      const ProgressBar = styled.div.attrs(({ width }) => ({
        style: { width: `${width}%` },
      }))`
        background: blue;
        height: 4px;
        transition: width 0.3s;
      `;

  - id: SC003
    title: "Use transient props ($prefix) to prevent DOM forwarding"
    description: "In styled-components v5.1+, prefix custom props with $ to prevent them from being forwarded to the underlying DOM element. This avoids React warnings about unknown DOM attributes."
    category: "sc_components"
    severity: "critical"
    applicability:
      frameworks: ["styled-components", "react"]
    tags: ["styled-components", "transient-props", "dom"]
    example: |
      // ✅ v5.1+: transient $-prefixed props (not forwarded to DOM)
      const Box = styled.div`
        background: ${({ $variant }) => $variant === 'primary' ? 'blue' : 'gray'};
        padding: ${({ $size }) => $size === 'large' ? '16px' : '8px'};
      `;

      <Box $variant="primary" $size="large">Content</Box>

      // ❌ Without $: variant and size are forwarded to the DOM
      const Box = styled.div`
        background: ${({ variant }) => variant === 'primary' ? 'blue' : 'gray'};
      `;
      // React warns: "Unknown prop `variant` on <div> element"

  - id: SC004
    title: "Use the as prop for element polymorphism"
    description: "Use the 'as' polymorphic prop (v4+) to change the rendered HTML element without creating a new styled component. This is preferred over .withComponent() which was removed in v6."
    category: "sc_components"
    severity: "critical"
    applicability:
      frameworks: ["styled-components", "react"]
    tags: ["styled-components", "polymorphism", "as-prop"]
    example: |
      const Button = styled.button`
        padding: 8px 16px;
        font-weight: bold;
      `;

      // ✅ Render as <a> with the as prop
      <Button as="a" href="/page">Link Button</Button>

      // ✅ Render as another component
      <Button as={Link} to="/page">Router Link</Button>

      // ❌ Avoid .withComponent() (removed in v6)
      const LinkButton = Button.withComponent('a');

  - id: SC005
    title: "Extend components with styled() wrapper"
    description: "Extend existing styled components by wrapping them with styled(). This creates a new component that inherits all styles and accepts additional CSS. Avoid .extend (removed in v4+)."
    category: "sc_components"
    severity: "critical"
    applicability:
      frameworks: ["styled-components", "react"]
    tags: ["styled-components", "extending", "composition"]
    example: |
      const BaseButton = styled.button`
        padding: 8px 16px;
        border-radius: 4px;
        font-weight: bold;
      `;

      // ✅ Extend with styled()
      const PrimaryButton = styled(BaseButton)`
        background: blue;
        color: white;
      `;

      const OutlineButton = styled(BaseButton)`
        background: transparent;
        border: 2px solid blue;
        color: blue;
      `;

      // ❌ .extend was removed in v4
      // const Extended = BaseButton.extend`...`;

  # ============================================================================
  # SC THEME (SC006-SC010)
  # ============================================================================

  - id: SC006
    title: "Use ThemeProvider at the root for consistent theming"
    description: "Wrap your application root with ThemeProvider to make the theme object available via props.theme in all styled components. This ensures consistent design tokens throughout the app."
    category: "sc_theme"
    severity: "critical"
    applicability:
      frameworks: ["styled-components", "react"]
    tags: ["styled-components", "theme", "provider"]
    example: |
      import { ThemeProvider } from 'styled-components';

      const theme = {
        colors: { primary: '#0070f3', secondary: '#ff4081' },
        fonts: { body: 'Inter, sans-serif' },
        spacing: { sm: '8px', md: '16px', lg: '24px' },
        breakpoints: { mobile: '480px', tablet: '768px', desktop: '1024px' },
      };

      function App() {
        return (
          <ThemeProvider theme={theme}>
            <GlobalStyles />
            <AppContent />
          </ThemeProvider>
        );
      }

  - id: SC007
    title: "Use createGlobalStyle for global CSS and resets"
    description: "Use createGlobalStyle (v3+) to inject global CSS like resets, font-face declarations, and CSS custom properties. It supports theme interpolation and is removed when unmounted."
    category: "sc_theme"
    severity: "critical"
    applicability:
      frameworks: ["styled-components", "react"]
    tags: ["styled-components", "global-styles", "css-reset"]
    example: |
      import { createGlobalStyle } from 'styled-components';

      const GlobalStyles = createGlobalStyle`
        *, *::before, *::after {
          box-sizing: border-box;
          margin: 0;
          padding: 0;
        }

        body {
          font-family: ${({ theme }) => theme.fonts.body};
          color: ${({ theme }) => theme.colors.text};
          background: ${({ theme }) => theme.colors.background};
        }

        :root {
          --color-primary: ${({ theme }) => theme.colors.primary};
        }
      `;

      // ❌ Don't use injectGlobal (removed in v3)
      // injectGlobal`...`;

  - id: SC008
    title: "Use useTheme hook for theme access in non-styled code"
    description: "In v5+, use the useTheme() hook to access the theme object in function components without styled-components. For v3-v4, use the withTheme() HOC."
    category: "sc_theme"
    severity: "critical"
    applicability:
      frameworks: ["styled-components", "react"]
    tags: ["styled-components", "useTheme", "hook"]
    example: |
      import { useTheme } from 'styled-components';

      // ✅ v5+: useTheme hook
      function ThemeAwareComponent() {
        const theme = useTheme();
        return <canvas style={{ color: theme.colors.primary }} />;
      }

      // ✅ v3-v4: withTheme HOC
      import { withTheme } from 'styled-components';
      const Component = withTheme(({ theme }) => (
        <canvas style={{ color: theme.colors.primary }} />
      ));

  - id: SC009
    title: "Structure theme tokens by category"
    description: "Organize theme tokens into logical categories: colors, typography, spacing, breakpoints, shadows, borders, etc. This makes the theme scalable and maintainable across large codebases."
    category: "sc_theme"
    severity: "high"
    applicability:
      frameworks: ["styled-components", "react"]
    tags: ["styled-components", "theme", "design-tokens"]
    example: |
      const theme = {
        colors: {
          primary: '#0070f3',
          secondary: '#ff4081',
          text: { primary: '#1a1a1a', secondary: '#666' },
          background: { default: '#fff', paper: '#f5f5f5' },
        },
        typography: {
          fontFamily: { body: 'Inter', heading: 'Poppins', mono: 'Fira Code' },
          fontSize: { xs: '12px', sm: '14px', md: '16px', lg: '20px', xl: '24px' },
          fontWeight: { regular: 400, medium: 500, bold: 700 },
        },
        spacing: { xs: '4px', sm: '8px', md: '16px', lg: '24px', xl: '32px' },
        breakpoints: { sm: '576px', md: '768px', lg: '992px', xl: '1200px' },
        shadows: { sm: '0 1px 3px rgba(0,0,0,0.12)', md: '0 4px 6px rgba(0,0,0,0.1)' },
        radii: { sm: '4px', md: '8px', lg: '16px', full: '9999px' },
      };

  - id: SC010
    title: "Implement dark mode with nested ThemeProvider"
    description: "Support dark/light mode by swapping the theme object passed to ThemeProvider, or use nested ThemeProvider for section-specific theme overrides. Avoid hardcoding colors."
    category: "sc_theme"
    severity: "high"
    applicability:
      frameworks: ["styled-components", "react"]
    tags: ["styled-components", "dark-mode", "theme"]
    example: |
      const lightTheme = { colors: { bg: '#fff', text: '#1a1a1a' } };
      const darkTheme = { colors: { bg: '#1a1a1a', text: '#f5f5f5' } };

      function App() {
        const [isDark, setIsDark] = useState(false);
        return (
          <ThemeProvider theme={isDark ? darkTheme : lightTheme}>
            <GlobalStyles />
            <button onClick={() => setIsDark(!isDark)}>Toggle</button>
            <AppContent />
          </ThemeProvider>
        );
      }

      // ✅ Nested ThemeProvider for section overrides
      <ThemeProvider theme={lightTheme}>
        <Header />
        <ThemeProvider theme={darkTheme}>
          <DarkSection />
        </ThemeProvider>
      </ThemeProvider>

  # ============================================================================
  # SC STYLING (SC011-SC015)
  # ============================================================================

  - id: SC011
    title: "Prefer theme-based values over hardcoded styles"
    description: "Always reference theme tokens via ${({ theme }) => ...} instead of hardcoding color codes, font sizes, or spacing values. This ensures design consistency and makes global changes easy."
    category: "sc_styling"
    severity: "critical"
    applicability:
      frameworks: ["styled-components", "react"]
    tags: ["styled-components", "theme", "consistency"]
    example: |
      // ✅ Theme-based values
      const Card = styled.div`
        background: ${({ theme }) => theme.colors.background.paper};
        padding: ${({ theme }) => theme.spacing.md};
        border-radius: ${({ theme }) => theme.radii.md};
        font-family: ${({ theme }) => theme.typography.fontFamily.body};
      `;

      // ❌ Hardcoded values
      const Card = styled.div`
        background: #f5f5f5;
        padding: 16px;
        border-radius: 8px;
        font-family: Inter, sans-serif;
      `;

  - id: SC012
    title: "Use css`` helper for reusable style fragments"
    description: "Use the css tagged template helper to create reusable style fragments. This enables style composition, conditional styles, and shared patterns across multiple components."
    category: "sc_styling"
    severity: "critical"
    applicability:
      frameworks: ["styled-components", "react"]
    tags: ["styled-components", "css-helper", "reuse"]
    example: |
      import styled, { css } from 'styled-components';

      // ✅ Reusable style fragment
      const truncate = css`
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      `;

      const flexCenter = css`
        display: flex;
        align-items: center;
        justify-content: center;
      `;

      const Title = styled.h2`
        ${truncate}
        font-size: 1.5rem;
      `;

      const Container = styled.div`
        ${flexCenter}
        min-height: 100vh;
      `;

  - id: SC013
    title: "Handle conditional styles with ternary or helper functions"
    description: "Use ternary operators for simple conditions and helper functions for complex ones. Avoid deeply nested conditional logic inside template literals."
    category: "sc_styling"
    severity: "high"
    applicability:
      frameworks: ["styled-components", "react"]
    tags: ["styled-components", "conditional", "dynamic"]
    example: |
      // ✅ Simple ternary
      const Button = styled.button`
        background: ${({ $primary }) => $primary ? '#0070f3' : '#eee'};
        color: ${({ $primary }) => $primary ? '#fff' : '#333'};
      `;

      // ✅ Helper for complex conditions
      const getVariantStyles = (variant) => {
        switch (variant) {
          case 'primary': return css`background: blue; color: white;`;
          case 'danger': return css`background: red; color: white;`;
          default: return css`background: #eee; color: #333;`;
        }
      };

      const Button = styled.button`
        padding: 8px 16px;
        ${({ $variant }) => getVariantStyles($variant)}
      `;

  - id: SC014
    title: "Use &-nesting for pseudo-selectors and child selectors"
    description: "Use the & reference for pseudo-selectors (:hover, :focus, ::before), sibling selectors, and child selectors. Avoid excessive nesting depth (max 3 levels recommended)."
    category: "sc_styling"
    severity: "high"
    applicability:
      frameworks: ["styled-components", "react"]
    tags: ["styled-components", "nesting", "pseudo"]
    example: |
      const Button = styled.button`
        background: #0070f3;
        color: white;
        transition: all 0.2s;

        &:hover {
          background: #0056b3;
          transform: translateY(-1px);
        }

        &:focus-visible {
          outline: 2px solid #0070f3;
          outline-offset: 2px;
        }

        &:active {
          transform: translateY(0);
        }

        &:disabled {
          opacity: 0.6;
          cursor: not-allowed;
        }

        & + & {
          margin-left: 8px;
        }
      `;

  - id: SC015
    title: "Define responsive styles with media queries or helper"
    description: "Use @media queries inside styled components for responsive design. Create reusable media query helpers for consistency across components. Prefer mobile-first (min-width) approach."
    category: "sc_styling"
    severity: "high"
    applicability:
      frameworks: ["styled-components", "react"]
    tags: ["styled-components", "responsive", "media-query"]
    example: |
      // ✅ Media query helper
      const media = {
        mobile: `@media (min-width: 480px)`,
        tablet: `@media (min-width: 768px)`,
        desktop: `@media (min-width: 1024px)`,
      };

      const Container = styled.div`
        padding: 16px;

        ${media.tablet} {
          padding: 24px;
          max-width: 720px;
          margin: 0 auto;
        }

        ${media.desktop} {
          padding: 32px;
          max-width: 1200px;
        }
      `;

  # ============================================================================
  # SC MIXINS (SC016-SC020)
  # ============================================================================

  - id: SC016
    title: "Use keyframes`` for CSS animations"
    description: "Use the keyframes tagged template to define CSS animations. The helper generates a unique name to avoid global namespace collisions. Always import keyframes from styled-components."
    category: "sc_mixins"
    severity: "critical"
    applicability:
      frameworks: ["styled-components", "react"]
    tags: ["styled-components", "keyframes", "animation"]
    example: |
      import styled, { keyframes } from 'styled-components';

      const fadeIn = keyframes`
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      `;

      const spin = keyframes`
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      `;

      const FadeInDiv = styled.div`
        animation: ${fadeIn} 0.3s ease-in-out;
      `;

      const Spinner = styled.div`
        animation: ${spin} 1s linear infinite;
        border: 3px solid #eee;
        border-top-color: #0070f3;
        border-radius: 50%;
        width: 24px;
        height: 24px;
      `;

  - id: SC017
    title: "Create parametric mixins as functions returning css``"
    description: "Build reusable parametric mixins as functions that return css`` fragments. This enables configurable, composable style blocks with TypeScript type safety."
    category: "sc_mixins"
    severity: "high"
    applicability:
      frameworks: ["styled-components", "react"]
    tags: ["styled-components", "mixin", "reuse"]
    example: |
      import { css } from 'styled-components';

      // ✅ Parametric mixin
      const ellipsis = (lines = 1) => css`
        overflow: hidden;
        text-overflow: ellipsis;
        ${lines === 1
          ? css`white-space: nowrap;`
          : css`
              display: -webkit-box;
              -webkit-line-clamp: ${lines};
              -webkit-box-orient: vertical;
            `
        }
      `;

      const Title = styled.h2`
        ${ellipsis(2)}
        font-size: 1.5rem;
      `;

  - id: SC018
    title: "Use polished utilities instead of manual color manipulation"
    description: "Use the polished library for color manipulation (lighten, darken, transparentize), responsive helpers, and CSS shorthand. It provides tested, composable utility functions."
    category: "sc_mixins"
    severity: "high"
    applicability:
      frameworks: ["styled-components", "polished", "react"]
    tags: ["styled-components", "polished", "utilities"]
    example: |
      import { lighten, darken, transparentize, rgba } from 'polished';

      const Button = styled.button`
        background: ${({ theme }) => theme.colors.primary};

        &:hover {
          background: ${({ theme }) => lighten(0.1, theme.colors.primary)};
        }

        &:active {
          background: ${({ theme }) => darken(0.1, theme.colors.primary)};
        }

        box-shadow: 0 4px 12px ${({ theme }) =>
          transparentize(0.7, theme.colors.primary)};
      `;

  - id: SC019
    title: "Share style constants via a dedicated mixins module"
    description: "Create a dedicated module (e.g., styles/mixins.ts) for shared css`` fragments, helpers, and utility functions. Import them across components for consistent reuse."
    category: "sc_mixins"
    severity: "high"
    applicability:
      frameworks: ["styled-components", "react"]
    tags: ["styled-components", "organization", "mixins"]
    example: |
      // styles/mixins.ts
      import { css } from 'styled-components';

      export const visuallyHidden = css`
        position: absolute;
        width: 1px;
        height: 1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
      `;

      export const focusRing = css`
        &:focus-visible {
          outline: 2px solid ${({ theme }) => theme.colors.primary};
          outline-offset: 2px;
        }
      `;

      // Usage in component
      import { visuallyHidden, focusRing } from '../styles/mixins';
      const SkipLink = styled.a`${visuallyHidden} ${focusRing}`;

  - id: SC020
    title: "Use CSS custom properties for runtime theme switching"
    description: "Combine styled-components with CSS custom properties (--variables) for values that need runtime changes without full re-render, such as scroll-based animations or user preferences."
    category: "sc_mixins"
    severity: "medium"
    applicability:
      frameworks: ["styled-components", "react"]
    tags: ["styled-components", "css-variables", "runtime"]
    example: |
      const GlobalStyle = createGlobalStyle`
        :root {
          --header-height: 64px;
          --sidebar-width: 280px;
          --content-max-width: 1200px;
        }
      `;

      const Main = styled.main`
        margin-top: var(--header-height);
        margin-left: var(--sidebar-width);
        max-width: var(--content-max-width);
      `;

  # ============================================================================
  # SC PERFORMANCE (SC021-SC025)
  # ============================================================================

  - id: SC021
    title: "Avoid creating styled components in render for dynamic styles"
    description: "For frequently-changing styles (animations, scroll positions), use .attrs() with inline styles or CSS custom properties instead of creating interpolations that generate new classNames."
    category: "sc_performance"
    severity: "critical"
    applicability:
      frameworks: ["styled-components", "react"]
    tags: ["styled-components", "performance", "dynamic"]
    example: |
      // ✅ .attrs() with inline style for frequently-changing values
      const AnimatedBox = styled.div.attrs(({ $x, $y }) => ({
        style: { transform: `translate(${$x}px, ${$y}px)` },
      }))`
        width: 50px;
        height: 50px;
        background: blue;
        will-change: transform;
      `;

      // ❌ Interpolation generates a new class on every change
      const AnimatedBox = styled.div`
        transform: translate(${({ $x }) => $x}px, ${({ $y }) => $y}px);
      `;

  - id: SC022
    title: "Enable babel/SWC plugin for display names and SSR"
    description: "Use babel-plugin-styled-components or @swc/plugin-styled-components (v6+) for automatic displayName generation, dead code elimination, minification, and stable SSR class names."
    category: "sc_performance"
    severity: "critical"
    applicability:
      frameworks: ["styled-components", "react"]
    tags: ["styled-components", "babel", "swc", "build"]
    example: |
      // .babelrc or babel.config.js
      {
        "plugins": [
          ["babel-plugin-styled-components", {
            "displayName": true,
            "fileName": true,
            "ssr": true,
            "minify": true,
            "pure": true
          }]
        ]
      }

      // Next.js 12+ (built-in SWC support)
      // next.config.js
      module.exports = {
        compiler: {
          styledComponents: true,
        },
      };

  - id: SC023
    title: "Use shouldForwardProp to filter props from DOM"
    description: "Use shouldForwardProp (v5.1+ on styled(), v6 on .withConfig()) to explicitly control which props are forwarded to the underlying HTML element. More granular than transient props."
    category: "sc_performance"
    severity: "high"
    applicability:
      frameworks: ["styled-components", "react"]
    tags: ["styled-components", "shouldForwardProp", "props"]
    example: |
      // ✅ v5.1+: shouldForwardProp on styled()
      const Box = styled('div').withConfig({
        shouldForwardProp: (prop) => !['variant', 'size', 'isActive'].includes(prop),
      })`
        background: ${({ variant }) => variant === 'primary' ? 'blue' : 'gray'};
      `;

      // ✅ v6: shouldForwardProp on .withConfig()
      const Box = styled.div.withConfig({
        shouldForwardProp: (prop, defaultFn) =>
          !['$variant', '$size'].includes(prop) && defaultFn(prop),
      })`
        background: ${({ $variant }) => $variant === 'primary' ? 'blue' : 'gray'};
      `;

  - id: SC024
    title: "Use .withConfig() for displayName and componentId"
    description: "Use .withConfig() to set displayName and componentId for better debugging, deterministic class names, and SSR consistency. The babel/SWC plugin does this automatically."
    category: "sc_performance"
    severity: "medium"
    applicability:
      frameworks: ["styled-components", "react"]
    tags: ["styled-components", "withConfig", "debugging"]
    example: |
      // ✅ Manual displayName and componentId
      const Button = styled.button.withConfig({
        displayName: 'Button',
        componentId: 'sc-button',
      })`
        padding: 8px 16px;
        border-radius: 4px;
      `;

      // Rendered class: .sc-button-xxxx (deterministic prefix)
      // DevTools: <Button> (named, not <styled.button>)

  - id: SC025
    title: "Minimize interpolation count in styled declarations"
    description: "Reduce the number of prop-based interpolations in a single styled component. Extract shared logic into css`` helpers or combine related interpolations. Excessive interpolations impact CSS generation performance."
    category: "sc_performance"
    severity: "medium"
    applicability:
      frameworks: ["styled-components", "react"]
    tags: ["styled-components", "performance", "interpolation"]
    example: |
      // ❌ Too many individual interpolations
      const Box = styled.div`
        color: ${p => p.theme.colors.text};
        background: ${p => p.theme.colors.bg};
        font-size: ${p => p.theme.fontSize.md};
        padding: ${p => p.theme.spacing.md};
        margin: ${p => p.theme.spacing.sm};
        border-radius: ${p => p.theme.radii.md};
      `;

      // ✅ Combine into a single interpolation
      const Box = styled.div`
        ${({ theme }) => css`
          color: ${theme.colors.text};
          background: ${theme.colors.bg};
          font-size: ${theme.fontSize.md};
          padding: ${theme.spacing.md};
          margin: ${theme.spacing.sm};
          border-radius: ${theme.radii.md};
        `}
      `;

  # ============================================================================
  # SC ACCESSIBILITY (SC026-SC030)
  # ============================================================================

  - id: SC026
    title: "Include focus-visible styles for keyboard navigation"
    description: "Always provide :focus-visible styles on interactive styled components. Use outline or box-shadow for a visible focus ring that appears only on keyboard navigation, not mouse clicks."
    category: "sc_accessibility"
    severity: "critical"
    applicability:
      frameworks: ["styled-components", "react"]
    tags: ["styled-components", "accessibility", "focus"]
    example: |
      const Button = styled.button`
        background: #0070f3;
        color: white;
        border: none;
        cursor: pointer;

        &:focus-visible {
          outline: 2px solid #0070f3;
          outline-offset: 2px;
        }

        /* Reset default focus ring */
        &:focus:not(:focus-visible) {
          outline: none;
        }
      `;

  - id: SC027
    title: "Use proper semantic HTML elements in styled components"
    description: "Choose the correct HTML element when creating styled components (button, a, nav, header, etc.). Styled-components should enhance, not replace, semantic HTML."
    category: "sc_accessibility"
    severity: "critical"
    applicability:
      frameworks: ["styled-components", "react"]
    tags: ["styled-components", "accessibility", "semantics"]
    example: |
      // ✅ Semantic elements
      const Nav = styled.nav`...`;
      const Header = styled.header`...`;
      const Main = styled.main`...`;
      const Button = styled.button`...`;  // interactive
      const Link = styled.a`...`;          // navigation

      // ❌ Div for everything
      const Nav = styled.div`...`;  // loses semantics
      const Button = styled.div`...`;  // not focusable, no keyboard support

  - id: SC028
    title: "Support prefers-reduced-motion media query"
    description: "Respect the prefers-reduced-motion media query in animations and transitions. Provide static alternatives for users who prefer reduced motion."
    category: "sc_accessibility"
    severity: "high"
    applicability:
      frameworks: ["styled-components", "react"]
    tags: ["styled-components", "accessibility", "motion"]
    example: |
      const fadeIn = keyframes`
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      `;

      const AnimatedCard = styled.div`
        animation: ${fadeIn} 0.3s ease-out;

        @media (prefers-reduced-motion: reduce) {
          animation: none;
          opacity: 1;
          transform: none;
        }
      `;

  - id: SC029
    title: "Support prefers-color-scheme for system dark mode"
    description: "Use the prefers-color-scheme media query in createGlobalStyle or styled components to automatically adapt to the user's system color scheme preference."
    category: "sc_accessibility"
    severity: "high"
    applicability:
      frameworks: ["styled-components", "react"]
    tags: ["styled-components", "accessibility", "dark-mode"]
    example: |
      const GlobalStyles = createGlobalStyle`
        :root {
          --bg: #ffffff;
          --text: #1a1a1a;
        }

        @media (prefers-color-scheme: dark) {
          :root {
            --bg: #1a1a1a;
            --text: #f5f5f5;
          }
        }
      `;

  - id: SC030
    title: "Provide sufficient color contrast in themed components"
    description: "Ensure styled components meet WCAG 2.1 contrast ratios: 4.5:1 for normal text, 3:1 for large text. Use polished's meetsContrastGuidelines() to validate at build time."
    category: "sc_accessibility"
    severity: "high"
    applicability:
      frameworks: ["styled-components", "react"]
    tags: ["styled-components", "accessibility", "contrast"]
    example: |
      import { meetsContrastGuidelines, readableColor } from 'polished';

      // ✅ Auto-compute readable text color
      const Badge = styled.span`
        background: ${({ $color }) => $color};
        color: ${({ $color }) => readableColor($color)};
        padding: 4px 8px;
        border-radius: 4px;
      `;

  # ============================================================================
  # SC SSR (SC031-SC035)
  # ============================================================================

  - id: SC031
    title: "Use ServerStyleSheet for Express/custom SSR"
    description: "Use ServerStyleSheet to collect styled-components styles during server-side rendering. Extract the styles and inject them into the HTML <head> to avoid FOUC (flash of unstyled content)."
    category: "sc_ssr"
    severity: "critical"
    applicability:
      frameworks: ["styled-components", "react"]
    tags: ["styled-components", "ssr", "server-rendering"]
    example: |
      import { ServerStyleSheet } from 'styled-components';
      import { renderToString } from 'react-dom/server';

      // ✅ Express SSR
      app.get('/', (req, res) => {
        const sheet = new ServerStyleSheet();
        try {
          const html = renderToString(sheet.collectStyles(<App />));
          const styleTags = sheet.getStyleTags();
          res.send(`<html><head>${styleTags}</head><body>${html}</body></html>`);
        } finally {
          sheet.seal();
        }
      });

  - id: SC032
    title: "Use Next.js built-in SWC compiler for styled-components"
    description: "Next.js 12+ has built-in SWC support for styled-components. Enable it in next.config.js instead of using babel-plugin-styled-components for faster builds."
    category: "sc_ssr"
    severity: "critical"
    applicability:
      frameworks: ["styled-components", "nextjs", "react"]
    tags: ["styled-components", "nextjs", "swc", "ssr"]
    example: |
      // next.config.js (Next.js 12+)
      module.exports = {
        compiler: {
          styledComponents: true,
        },
      };

      // For Next.js 13+ App Router with v6:
      // Use useServerInsertedHTML in a client component
      'use client';
      import { useServerInsertedHTML } from 'next/navigation';
      import { ServerStyleSheet, StyleSheetManager } from 'styled-components';

      export default function StyledComponentsRegistry({ children }) {
        const [sheet] = useState(() => new ServerStyleSheet());

        useServerInsertedHTML(() => {
          const styles = sheet.getStyleElement();
          sheet.instance.clearTag();
          return <>{styles}</>;
        });

        return (
          <StyleSheetManager sheet={sheet.instance}>
            {children}
          </StyleSheetManager>
        );
      }

  - id: SC033
    title: "Use streaming SSR for better performance"
    description: "In v3+, use ServerStyleSheet.interleaveWithNodeStream() or streaming rendering for better Time-to-First-Byte. This interleaves styles with the HTML stream."
    category: "sc_ssr"
    severity: "high"
    applicability:
      frameworks: ["styled-components", "react"]
    tags: ["styled-components", "ssr", "streaming"]
    example: |
      import { ServerStyleSheet } from 'styled-components';
      import { renderToNodeStream } from 'react-dom/server';

      app.get('/', (req, res) => {
        const sheet = new ServerStyleSheet();
        const jsx = sheet.collectStyles(<App />);
        const stream = sheet.interleaveWithNodeStream(renderToNodeStream(jsx));

        res.write('<html><head></head><body><div id="root">');
        stream.pipe(res, { end: false });
        stream.on('end', () => res.end('</div></body></html>'));
      });

  - id: SC034
    title: "Use StyleSheetManager for SSR and stylis configuration"
    description: "Use StyleSheetManager to configure the injection target, enable/disable vendor prefixes, and customize stylis plugins. Essential for SSR setups and iframe rendering."
    category: "sc_ssr"
    severity: "high"
    applicability:
      frameworks: ["styled-components", "react"]
    tags: ["styled-components", "StyleSheetManager", "config"]
    example: |
      import { StyleSheetManager } from 'styled-components';

      // ✅ Disable vendor prefixes (v6: enableVendorPrefixes)
      <StyleSheetManager enableVendorPrefixes={false}>
        <App />
      </StyleSheetManager>

      // ✅ Inject into iframe
      <StyleSheetManager target={iframeRef.current.contentDocument.head}>
        <IframeContent />
      </StyleSheetManager>

  - id: SC035
    title: "Always seal ServerStyleSheet in finally block"
    description: "Call sheet.seal() in a finally block after rendering to prevent memory leaks. This is especially important in long-running server processes."
    category: "sc_ssr"
    severity: "high"
    applicability:
      frameworks: ["styled-components", "react"]
    tags: ["styled-components", "ssr", "memory"]
    example: |
      const sheet = new ServerStyleSheet();
      try {
        const html = renderToString(sheet.collectStyles(<App />));
        const styleTags = sheet.getStyleTags();
        return `<html><head>${styleTags}</head><body>${html}</body></html>`;
      } catch (err) {
        console.error('SSR error:', err);
        throw err;
      } finally {
        sheet.seal();  // ✅ Always seal to prevent memory leak
      }

  # ============================================================================
  # SC TESTING (SC036-SC040)
  # ============================================================================

  - id: SC036
    title: "Use jest-styled-components for style assertions"
    description: "Install jest-styled-components to enable toHaveStyleRule matcher and proper styled-components snapshot serialization in Jest tests."
    category: "sc_testing"
    severity: "critical"
    applicability:
      frameworks: ["styled-components", "react", "jest"]
    tags: ["styled-components", "testing", "jest"]
    example: |
      import 'jest-styled-components';
      import { render } from '@testing-library/react';
      import { ThemeProvider } from 'styled-components';

      test('Button has correct styles', () => {
        const { container } = render(
          <ThemeProvider theme={theme}>
            <Button $variant="primary">Click</Button>
          </ThemeProvider>
        );

        expect(container.firstChild).toHaveStyleRule('background', 'blue');
        expect(container.firstChild).toHaveStyleRule('color', 'white');
      });

  - id: SC037
    title: "Wrap components with ThemeProvider in tests"
    description: "Always wrap styled components that use theme interpolation with ThemeProvider in tests. Create a test utility wrapper to avoid repetition."
    category: "sc_testing"
    severity: "critical"
    applicability:
      frameworks: ["styled-components", "react", "jest"]
    tags: ["styled-components", "testing", "theme"]
    example: |
      // test-utils.tsx
      import { ThemeProvider } from 'styled-components';
      import { render } from '@testing-library/react';

      const theme = { colors: { primary: 'blue' }, spacing: { md: '16px' } };

      export function renderWithTheme(ui, options = {}) {
        return render(ui, {
          wrapper: ({ children }) => (
            <ThemeProvider theme={theme}>{children}</ThemeProvider>
          ),
          ...options,
        });
      }

      // Usage
      test('renders correctly', () => {
        const { getByText } = renderWithTheme(<Button>Click</Button>);
        expect(getByText('Click')).toBeInTheDocument();
      });

  - id: SC038
    title: "Test media query and pseudo-selector styles"
    description: "Use jest-styled-components media option to test responsive styles and pseudo option to test hover/focus states."
    category: "sc_testing"
    severity: "high"
    applicability:
      frameworks: ["styled-components", "react", "jest"]
    tags: ["styled-components", "testing", "responsive"]
    example: |
      import 'jest-styled-components';

      test('Container has responsive styles', () => {
        const { container } = renderWithTheme(<Container />);

        // Test base styles
        expect(container.firstChild).toHaveStyleRule('padding', '16px');

        // Test media query styles
        expect(container.firstChild).toHaveStyleRule('padding', '32px', {
          media: '(min-width: 768px)',
        });

        // Test hover styles
        expect(container.firstChild).toHaveStyleRule('opacity', '0.8', {
          modifier: ':hover',
        });
      });

  - id: SC039
    title: "Use snapshot testing for styled component structure"
    description: "Use snapshot tests with jest-styled-components serializer to capture the complete CSS output. This catches unintended style regressions."
    category: "sc_testing"
    severity: "medium"
    applicability:
      frameworks: ["styled-components", "react", "jest"]
    tags: ["styled-components", "testing", "snapshot"]
    example: |
      import 'jest-styled-components';
      import renderer from 'react-test-renderer';

      test('Button matches snapshot', () => {
        const tree = renderer.create(
          <ThemeProvider theme={theme}>
            <Button $variant="primary">Click</Button>
          </ThemeProvider>
        ).toJSON();

        expect(tree).toMatchSnapshot();
        // Snapshot includes full CSS:
        // .c0 { background: blue; color: white; padding: 8px 16px; }
      });

  - id: SC040
    title: "Test dynamic prop-based styling"
    description: "Test that styled components correctly apply styles based on prop values. Test all variants, states, and edge cases."
    category: "sc_testing"
    severity: "medium"
    applicability:
      frameworks: ["styled-components", "react", "jest"]
    tags: ["styled-components", "testing", "props"]
    example: |
      test('Button variants apply correct styles', () => {
        const { rerender, container } = renderWithTheme(
          <Button $variant="primary">Click</Button>
        );

        expect(container.firstChild).toHaveStyleRule('background', 'blue');

        rerender(
          <ThemeProvider theme={theme}>
            <Button $variant="danger">Click</Button>
          </ThemeProvider>
        );

        expect(container.firstChild).toHaveStyleRule('background', 'red');
      });

  # ============================================================================
  # SC PATTERNS (SC041-SC045)
  # ============================================================================

  - id: SC041
    title: "Organize styled components in collocated style files"
    description: "Collocate styled components with their React component in a .styles.ts file or directly in the component file. Avoid a single monolithic styles directory."
    category: "sc_patterns"
    severity: "high"
    applicability:
      frameworks: ["styled-components", "react"]
    tags: ["styled-components", "organization", "file-structure"]
    example: |
      // ✅ Option 1: Collocated .styles.ts
      // components/Button/Button.styles.ts
      export const StyledButton = styled.button`...`;
      export const ButtonIcon = styled.span`...`;

      // components/Button/Button.tsx
      import { StyledButton, ButtonIcon } from './Button.styles';

      // ✅ Option 2: Inline in component file (for small components)
      // components/Badge.tsx
      const StyledBadge = styled.span`...`;
      export const Badge = ({ children }) => <StyledBadge>{children}</StyledBadge>;

  - id: SC042
    title: "Type styled component props with TypeScript generics"
    description: "Use TypeScript generics on styled() to type custom props. This provides autocompletion, type checking, and better documentation."
    category: "sc_patterns"
    severity: "high"
    applicability:
      frameworks: ["styled-components", "react", "typescript"]
    tags: ["styled-components", "typescript", "types"]
    example: |
      interface ButtonProps {
        $variant?: 'primary' | 'secondary' | 'danger';
        $size?: 'small' | 'medium' | 'large';
        $fullWidth?: boolean;
      }

      const StyledButton = styled.button<ButtonProps>`
        background: ${({ $variant }) =>
          $variant === 'primary' ? '#0070f3' :
          $variant === 'danger' ? '#e00' : '#eee'};
        padding: ${({ $size }) =>
          $size === 'large' ? '12px 24px' :
          $size === 'small' ? '4px 8px' : '8px 16px'};
        width: ${({ $fullWidth }) => $fullWidth ? '100%' : 'auto'};
      `;

  - id: SC043
    title: "Use component composition over deep style nesting"
    description: "Prefer composing multiple styled components over deeply nesting CSS selectors. This improves readability, reusability, and keeps specificity flat."
    category: "sc_patterns"
    severity: "high"
    applicability:
      frameworks: ["styled-components", "react"]
    tags: ["styled-components", "composition", "nesting"]
    example: |
      // ✅ Composition: separate styled components
      const Card = styled.div`
        border: 1px solid #eee;
        border-radius: 8px;
        padding: 16px;
      `;

      const CardHeader = styled.div`
        display: flex;
        align-items: center;
        margin-bottom: 12px;
      `;

      const CardTitle = styled.h3`
        font-size: 1.25rem;
        font-weight: 600;
      `;

      // ❌ Deep nesting (hard to maintain)
      const Card = styled.div`
        border: 1px solid #eee;
        .header {
          display: flex;
          .title {
            font-size: 1.25rem;
            span { color: blue; }
          }
        }
      `;

  - id: SC044
    title: "Use isStyledComponent for type checking in libraries"
    description: "When building component libraries, use the isStyledComponent utility to check if a component is a styled component. Useful for applying styles conditionally."
    category: "sc_patterns"
    severity: "medium"
    applicability:
      frameworks: ["styled-components", "react"]
    tags: ["styled-components", "utility", "library"]
    example: |
      import styled, { isStyledComponent } from 'styled-components';

      function wrapWithStyles(Component) {
        if (isStyledComponent(Component)) {
          // Already styled, extend it
          return styled(Component)`
            margin: 8px;
          `;
        }
        // Wrap plain component
        return styled(Component)`
          margin: 8px;
          display: block;
        `;
      }

  - id: SC045
    title: "Separate variant logic from base styles"
    description: "Define base styles directly and extract variant/conditional logic into separate helper functions. This makes components more readable and testable."
    category: "sc_patterns"
    severity: "medium"
    applicability:
      frameworks: ["styled-components", "react"]
    tags: ["styled-components", "variants", "organization"]
    example: |
      // variants.ts
      const sizeStyles = {
        small: css`padding: 4px 8px; font-size: 12px;`,
        medium: css`padding: 8px 16px; font-size: 14px;`,
        large: css`padding: 12px 24px; font-size: 16px;`,
      };

      const variantStyles = {
        primary: css`background: blue; color: white;`,
        outline: css`background: transparent; border: 2px solid blue; color: blue;`,
        ghost: css`background: transparent; color: blue;`,
      };

      // Button.styles.ts
      export const StyledButton = styled.button<ButtonProps>`
        border: none;
        border-radius: 4px;
        cursor: pointer;
        transition: all 0.2s;

        ${({ $size = 'medium' }) => sizeStyles[$size]}
        ${({ $variant = 'primary' }) => variantStyles[$variant]}
      `;

  # ============================================================================
  # SC MIGRATION (SC046-SC050)
  # ============================================================================

  - id: SC046
    title: "Migrate from .extend to styled() wrapping"
    description: "The .extend method was removed in v4. Replace Component.extend`...` with styled(Component)`...` for extending styled components."
    category: "sc_migration"
    severity: "critical"
    applicability:
      frameworks: ["styled-components", "react"]
    tags: ["styled-components", "migration", "v4"]
    example: |
      // ❌ v3 .extend (removed in v4)
      const ExtendedButton = Button.extend`
        background: green;
      `;

      // ✅ v4+: styled() wrapping
      const ExtendedButton = styled(Button)`
        background: green;
      `;

  - id: SC047
    title: "Migrate from injectGlobal to createGlobalStyle"
    description: "The injectGlobal helper was removed in v3. Use createGlobalStyle to create a component that injects global CSS and supports theme interpolation."
    category: "sc_migration"
    severity: "critical"
    applicability:
      frameworks: ["styled-components", "react"]
    tags: ["styled-components", "migration", "v3"]
    example: |
      // ❌ v2 injectGlobal (removed in v3)
      import { injectGlobal } from 'styled-components';
      injectGlobal`body { margin: 0; }`;

      // ✅ v3+: createGlobalStyle
      import { createGlobalStyle } from 'styled-components';
      const GlobalStyle = createGlobalStyle`
        body {
          margin: 0;
          font-family: ${({ theme }) => theme.fonts.body};
        }
      `;
      // Render as a component: <GlobalStyle />

  - id: SC048
    title: "Migrate from .withComponent to as prop"
    description: "The .withComponent() method was removed in v6. Use the 'as' polymorphic prop to change the rendered HTML element at the call site."
    category: "sc_migration"
    severity: "critical"
    applicability:
      frameworks: ["styled-components", "react"]
    tags: ["styled-components", "migration", "v6"]
    example: |
      // ❌ .withComponent (removed in v6)
      const LinkButton = Button.withComponent('a');

      // ✅ v4+: as prop (no extra component needed)
      <Button as="a" href="/page">Link Button</Button>
      <Button as={RouterLink} to="/page">Router Link</Button>

  - id: SC049
    title: "Migrate from innerRef to forwardRef"
    description: "In v4+, styled components automatically forward refs. Replace innerRef with standard ref. No need for React.forwardRef wrapping."
    category: "sc_migration"
    severity: "high"
    applicability:
      frameworks: ["styled-components", "react"]
    tags: ["styled-components", "migration", "ref"]
    example: |
      // ❌ v3: innerRef
      <StyledInput innerRef={inputRef} />

      // ✅ v4+: standard ref (forwardRef automatic)
      <StyledInput ref={inputRef} />

  - id: SC050
    title: "Migrate SSR to v6 with useServerInsertedHTML"
    description: "In v6 with Next.js App Router, use useServerInsertedHTML for SSR style collection. Create a StyledComponentsRegistry client component. v5 ServerStyleSheet still works with Pages Router."
    category: "sc_migration"
    severity: "high"
    applicability:
      frameworks: ["styled-components", "nextjs", "react"]
    tags: ["styled-components", "migration", "v6", "ssr"]
    example: |
      // ✅ v6 + Next.js App Router: app/lib/registry.tsx
      'use client';
      import React, { useState } from 'react';
      import { useServerInsertedHTML } from 'next/navigation';
      import { ServerStyleSheet, StyleSheetManager } from 'styled-components';

      export default function StyledComponentsRegistry({
        children,
      }: { children: React.ReactNode }) {
        const [styledComponentsStyleSheet] = useState(
          () => new ServerStyleSheet()
        );

        useServerInsertedHTML(() => {
          const styles = styledComponentsStyleSheet.getStyleElement();
          styledComponentsStyleSheet.instance.clearTag();
          return <>{styles}</>;
        });

        if (typeof window !== 'undefined') return <>{children}</>;

        return (
          <StyleSheetManager sheet={styledComponentsStyleSheet.instance}>
            {children}
          </StyleSheetManager>
        );
      }

      // app/layout.tsx
      import StyledComponentsRegistry from './lib/registry';
      export default function RootLayout({ children }) {
        return (
          <html><body>
            <StyledComponentsRegistry>{children}</StyledComponentsRegistry>
          </body></html>
        );
      }
