  # TESTING & QUALITY (NEST025-NEST030)
  # ============================================================================

  - id: NEST025
    title: 'Unit Testing Services'
    category: testing
    level: intermediate
    priority: high
    applicability:
      frameworks:
        - nestjs
    content:
      description: |
        Unit test services by mocking dependencies. Use NestJS testing
        utilities for proper DI setup.
      rationale: |
        Unit tests verify business logic in isolation, run fast,
        and catch regressions early.
      good_examples:
        - |
          // ✅ Service unit test with mocks
          import { Test, TestingModule } from '@nestjs/testing';
          import { UsersService } from './users.service';
          import { UsersRepository } from './users.repository';
          import { NotFoundException } from '@nestjs/common';

          describe('UsersService', () => {
            let service: UsersService;
            let repository: jest.Mocked<UsersRepository>;

            beforeEach(async () => {
              const module: TestingModule = await Test.createTestingModule({
                providers: [
                  UsersService,
                  {
                    provide: UsersRepository,
                    useValue: {
                      findOne: jest.fn(),
                      findByEmail: jest.fn(),
                      save: jest.fn(),
                      update: jest.fn(),
                    },
                  },
                ],
              }).compile();

              service = module.get<UsersService>(UsersService);
              repository = module.get(UsersRepository);
            });

            describe('findById', () => {
              it('should return user when found', async () => {
                const user = { id: '1', email: 'test@example.com' };
                repository.findOne.mockResolvedValue(user);

                const result = await service.findById('1');

                expect(result).toEqual(user);
                expect(repository.findOne).toHaveBeenCalledWith({
                  where: { id: '1' },
                });
              });

              it('should throw NotFoundException when user not found', async () => {
                repository.findOne.mockResolvedValue(null);

                await expect(service.findById('1')).rejects.toThrow(
                  NotFoundException,
                );
              });
            });

            describe('create', () => {
              it('should create user with hashed password', async () => {
                const dto = { email: 'test@example.com', password: 'secret' };
                const savedUser = { id: '1', ...dto, password: 'hashed' };

                repository.findByEmail.mockResolvedValue(null);
                repository.save.mockResolvedValue(savedUser);

                const result = await service.create(dto);

                expect(result.password).not.toBe('secret');
                expect(repository.save).toHaveBeenCalled();
              });

              it('should throw ConflictException if email exists', async () => {
                repository.findByEmail.mockResolvedValue({ id: '1' });

                await expect(
                  service.create({ email: 'test@example.com', password: 'secret' }),
                ).rejects.toThrow(ConflictException);
              });
            });
          });
      bad_examples:
        - |
          // ❌ Testing with real database
          describe('UsersService', () => {
            it('should find user', async () => {
              // Uses real DB - slow, flaky, requires setup
              const service = new UsersService(realRepository);
              const user = await service.findById('1');
            });
          });

          // ❌ Not testing edge cases
          describe('UsersService', () => {
            it('should work', async () => {
              const result = await service.findAll();
              expect(result).toBeDefined(); // Useless assertion
            });
          });
      references:
        - 'https://docs.nestjs.com/fundamentals/testing'
      tags:
        - testing
        - unit-tests
        - mocking

  - id: NEST026
    title: 'Integration Testing with Database'
    category: testing
    level: intermediate
    priority: high
    applicability:
      frameworks:
        - nestjs
    content:
      description: |
        Write integration tests that verify components work together.
        Use test database and clean up between tests.
      rationale: |
        Integration tests catch issues that unit tests miss, like
        incorrect queries, transaction problems, and ORM mappings.
      good_examples:
        - |
          // ✅ Integration test setup
          import { Test, TestingModule } from '@nestjs/testing';
          import { INestApplication } from '@nestjs/common';
          import { TypeOrmModule } from '@nestjs/typeorm';
          import * as request from 'supertest';

          describe('UsersController (e2e)', () => {
            let app: INestApplication;
            let repository: Repository<User>;

            beforeAll(async () => {
              const module: TestingModule = await Test.createTestingModule({
                imports: [
                  TypeOrmModule.forRoot({
                    type: 'postgres',
                    host: 'localhost',
                    database: 'test_db',
                    synchronize: true, // OK for test DB
                    dropSchema: true,  // Clean slate each run
                    entities: [User],
                  }),
                  UsersModule,
                ],
              }).compile();

              app = module.createNestApplication();
              app.useGlobalPipes(new ValidationPipe());
              await app.init();

              repository = module.get(getRepositoryToken(User));
            });

            afterAll(async () => {
              await app.close();
            });

            beforeEach(async () => {
              await repository.clear(); // Clean between tests
            });

            describe('POST /users', () => {
              it('should create user', async () => {
                const response = await request(app.getHttpServer())
                  .post('/users')
                  .send({
                    email: 'test@example.com',
                    password: 'Password123!',
                    name: 'Test User',
                  })
                  .expect(201);

                expect(response.body.email).toBe('test@example.com');
                expect(response.body.password).toBeUndefined(); // Not exposed

                // Verify in database
                const user = await repository.findOne({
                  where: { email: 'test@example.com' },
                });
                expect(user).toBeDefined();
              });

              it('should validate email format', async () => {
                await request(app.getHttpServer())
                  .post('/users')
                  .send({ email: 'invalid', password: 'Password123!' })
                  .expect(400);
              });

              it('should reject duplicate email', async () => {
                await repository.save({
                  email: 'test@example.com',
                  password: 'hashed'
                });

                await request(app.getHttpServer())
                  .post('/users')
                  .send({ email: 'test@example.com', password: 'Password123!' })
                  .expect(409);
              });
            });
          });
      bad_examples:
        - |
          // ❌ Tests affect each other
          describe('Users', () => {
            it('creates user', async () => {
              await request(app.getHttpServer())
                .post('/users')
                .send({ email: 'test@example.com' });
            });

            it('lists users', async () => {
              const response = await request(app.getHttpServer())
                .get('/users');
              // Fails if run alone, passes if previous test ran!
            });
          });
      tags:
        - testing
        - integration-tests
        - e2e

  - id: NEST027
    title: 'Configuration Validation'
    category: configuration
    level: beginner
    priority: high
    applicability:
      frameworks:
        - nestjs
    content:
      description: |
        Validate configuration at startup using class-validator or Joi.
        Fail fast if required configuration is missing.
      rationale: |
        Startup validation catches configuration errors immediately,
        not at runtime when the config is first used.
      good_examples:
        - |
          // ✅ Configuration validation with Joi
          import * as Joi from 'joi';

          @Module({
            imports: [
              ConfigModule.forRoot({
                validationSchema: Joi.object({
                  NODE_ENV: Joi.string()
                    .valid('development', 'production', 'test')
                    .default('development'),
                  PORT: Joi.number().default(3000),
                  DATABASE_URL: Joi.string().required(),
                  JWT_SECRET: Joi.string().min(32).required(),
                  JWT_EXPIRATION: Joi.string().default('1d'),
                  REDIS_URL: Joi.string().when('NODE_ENV', {
                    is: 'production',
                    then: Joi.required(),
                    otherwise: Joi.optional(),
                  }),
                }),
                validationOptions: {
                  abortEarly: true, // Fail on first error
                },
              }),
            ],
          })
          export class AppModule {}

          // ✅ Type-safe configuration class
          import { IsString, IsNumber, IsOptional, Min, validateSync } from 'class-validator';
          import { plainToInstance } from 'class-transformer';

          export class EnvironmentVariables {
            @IsString()
            NODE_ENV: string;

            @IsNumber()
            @Min(1)
            PORT: number;

            @IsString()
            DATABASE_URL: string;

            @IsString()
            JWT_SECRET: string;

            @IsOptional()
            @IsString()
            REDIS_URL?: string;
          }

          export function validate(config: Record<string, unknown>) {
            const validatedConfig = plainToInstance(EnvironmentVariables, config, {
              enableImplicitConversion: true,
            });

            const errors = validateSync(validatedConfig, {
              skipMissingProperties: false,
            });

            if (errors.length > 0) {
              throw new Error(errors.toString());
            }

            return validatedConfig;
          }

          // Usage
          ConfigModule.forRoot({ validate });
      bad_examples:
        - |
          // ❌ No validation - crashes at runtime
          @Injectable()
          export class DatabaseService {
            constructor(private config: ConfigService) {
              // Crashes here if DATABASE_URL not set
              const url = this.config.get<string>('DATABASE_URL');
              this.connect(url);
            }
          }

          // ❌ Unsafe type casting
          const port = process.env.PORT as unknown as number;
          // Actually a string! Math operations will fail
      references:
        - 'https://docs.nestjs.com/techniques/configuration#schema-validation'
      tags:
        - configuration
        - validation
        - fail-fast

  - id: NEST028
    title: 'Health Checks'
    category: monitoring
    level: beginner
    priority: high
    applicability:
      frameworks:
        - nestjs
    content:
      description: |
        Implement health check endpoints for monitoring service health.
        Check database, cache, and external service connections.
      rationale: |
        Health checks enable load balancers and orchestrators to detect
        unhealthy instances and route traffic appropriately.
      good_examples:
        - |
          // ✅ Health check module
          import {
            HealthCheckService, HttpHealthIndicator,
            TypeOrmHealthIndicator, MemoryHealthIndicator
          } from '@nestjs/terminus';

          @Controller('health')
          export class HealthController {
            constructor(
              private health: HealthCheckService,
              private http: HttpHealthIndicator,
              private db: TypeOrmHealthIndicator,
              private memory: MemoryHealthIndicator,
            ) {}

            @Get()
            @HealthCheck()
            check() {
              return this.health.check([
                // Database connection
                () => this.db.pingCheck('database'),

                // Memory usage
                () => this.memory.checkHeap('memory_heap', 300 * 1024 * 1024),
                () => this.memory.checkRSS('memory_rss', 500 * 1024 * 1024),

                // External service
                () => this.http.pingCheck('api', 'https://api.example.com/health'),
              ]);
            }

            // Kubernetes liveness probe
            @Get('live')
            @HealthCheck()
            live() {
              return this.health.check([]);
            }

            // Kubernetes readiness probe
            @Get('ready')
            @HealthCheck()
            ready() {
              return this.health.check([
                () => this.db.pingCheck('database'),
              ]);
            }
          }

          // ✅ Custom health indicator
          @Injectable()
          export class RedisHealthIndicator extends HealthIndicator {
            constructor(private redis: Redis) {
              super();
            }

            async isHealthy(key: string): Promise<HealthIndicatorResult> {
              try {
                await this.redis.ping();
                return this.getStatus(key, true);
              } catch (e) {
                return this.getStatus(key, false, { message: e.message });
              }
            }
          }
      bad_examples:
        - |
          // ❌ No health checks - can't monitor service
          // Load balancer keeps sending traffic to dead instance

          // ❌ Health check that always passes
          @Get('health')
          health() {
            return { status: 'ok' }; // Doesn't check actual health!
          }
      references:
        - 'https://docs.nestjs.com/recipes/terminus'
      tags:
        - health-checks
        - monitoring
        - kubernetes

  - id: NEST029
    title: 'Structured Logging'
    category: monitoring
    level: intermediate
    priority: high
    applicability:
      frameworks:
        - nestjs
    content:
      description: |
        Use structured logging with correlation IDs for request tracing.
        Log in JSON format for easy parsing by log aggregators.
      rationale: |
        Structured logs enable efficient searching, filtering, and
        alerting. Correlation IDs help trace requests across services.
      good_examples:
        - |
          // ✅ Custom logger with correlation ID
          import { Injectable, LoggerService, Scope, Inject } from '@nestjs/common';
          import { REQUEST } from '@nestjs/core';
          import { Request } from 'express';
          import * as winston from 'winston';

          @Injectable({ scope: Scope.REQUEST })
          export class AppLogger implements LoggerService {
            private logger: winston.Logger;
            private correlationId: string;

            constructor(@Inject(REQUEST) private request: Request) {
              this.correlationId = request.headers['x-correlation-id'] as string
                || crypto.randomUUID();

              this.logger = winston.createLogger({
                format: winston.format.combine(
                  winston.format.timestamp(),
                  winston.format.json(),
                ),
                defaultMeta: {
                  correlationId: this.correlationId,
                  service: 'orders-api',
                },
                transports: [
                  new winston.transports.Console(),
                ],
              });
            }

            log(message: string, context?: Record<string, any>) {
              this.logger.info(message, context);
            }

            error(message: string, trace?: string, context?: Record<string, any>) {
              this.logger.error(message, { trace, ...context });
            }

            warn(message: string, context?: Record<string, any>) {
              this.logger.warn(message, context);
            }
          }

          // ✅ Usage in service
          @Injectable()
          export class OrdersService {
            constructor(private logger: AppLogger) {}

            async createOrder(dto: CreateOrderDto): Promise<Order> {
              this.logger.log('Creating order', {
                customerId: dto.customerId,
                itemCount: dto.items.length,
              });

              try {
                const order = await this.process(dto);
                this.logger.log('Order created', { orderId: order.id });
                return order;
              } catch (error) {
                this.logger.error('Order creation failed', error.stack, {
                  customerId: dto.customerId,
                  error: error.message,
                });
                throw error;
              }
            }
          }

          // Output example:
          // {
          //   "timestamp": "2024-01-15T10:30:00.000Z",
          //   "level": "info",
          //   "message": "Order created",
          //   "correlationId": "abc-123",
          //   "service": "orders-api",
          //   "orderId": "order-456"
          // }
      bad_examples:
        - |
          // ❌ Unstructured console.log
          console.log('Creating order for customer ' + customerId);
          // Can't search, filter, or parse

          // ❌ Logging sensitive data
          this.logger.log('User login', { email, password }); // NEVER!
      tags:
        - logging
        - monitoring
        - observability

  - id: NEST030
    title: 'Graceful Shutdown'
    category: reliability
    level: intermediate
    priority: high
    applicability:
      frameworks:
        - nestjs
    content:
      description: |
        Implement graceful shutdown to complete in-flight requests and
        close connections properly before terminating.
      rationale: |
        Graceful shutdown prevents data corruption, ensures transactions
        complete, and provides better user experience during deployments.
      good_examples:
        - |
          // ✅ Enable shutdown hooks in main.ts
          async function bootstrap() {
            const app = await NestFactory.create(AppModule);

            // Enable graceful shutdown
            app.enableShutdownHooks();

            await app.listen(3000);
          }

          // ✅ Service with cleanup on shutdown
          import { Injectable, OnModuleDestroy, OnApplicationShutdown } from '@nestjs/common';

          @Injectable()
          export class DatabaseService implements OnModuleDestroy, OnApplicationShutdown {
            private connections: Connection[] = [];

            async onModuleDestroy() {
              // Called when module is being destroyed
              console.log('DatabaseService: Module destroying');
            }

            async onApplicationShutdown(signal?: string) {
              // Called when app receives termination signal
              console.log(`Application shutting down: ${signal}`);

              // Close all database connections
              await Promise.all(
                this.connections.map(conn => conn.close())
              );

              console.log('All connections closed');
            }
          }

          // ✅ Queue processor with graceful shutdown
          @Injectable()
          export class QueueProcessor implements OnApplicationShutdown {
            private isShuttingDown = false;

            async onApplicationShutdown(signal?: string) {
              this.isShuttingDown = true;

              // Wait for current jobs to complete (max 30s)
              const timeout = setTimeout(() => {
                console.error('Shutdown timeout, forcing exit');
                process.exit(1);
              }, 30000);

              await this.waitForJobsToComplete();
              clearTimeout(timeout);
            }

            private async waitForJobsToComplete(): Promise<void> {
              while (this.activeJobs > 0) {
                await new Promise(resolve => setTimeout(resolve, 100));
              }
            }

            async processJob(job: Job) {
              if (this.isShuttingDown) {
                // Reject new jobs during shutdown
                throw new Error('Service is shutting down');
              }

              this.activeJobs++;
              try {
                await this.doWork(job);
              } finally {
                this.activeJobs--;
              }
            }
          }

          // ✅ Health check returns unhealthy during shutdown
          @Injectable()
          export class ShutdownAwareHealthIndicator extends HealthIndicator
            implements OnApplicationShutdown {
            private isShuttingDown = false;

            onApplicationShutdown() {
              this.isShuttingDown = true;
            }

            async isHealthy(key: string): Promise<HealthIndicatorResult> {
              if (this.isShuttingDown) {
                throw new HealthCheckError('Shutting down', {});
              }
              return this.getStatus(key, true);
            }
          }
      bad_examples:
        - |
          // ❌ No shutdown handling - connections leak
          @Injectable()
          export class DatabaseService {
            private connection: Connection;

            async connect() {
              this.connection = await createConnection();
            }
            // Connection never closed on shutdown!
          }

          // ❌ Abrupt process exit
          process.on('SIGTERM', () => {
            process.exit(0); // Kills in-flight requests!
          });
      references:
        - 'https://docs.nestjs.com/fundamentals/lifecycle-events'
      tags:
        - shutdown
        - reliability
        - deployment
