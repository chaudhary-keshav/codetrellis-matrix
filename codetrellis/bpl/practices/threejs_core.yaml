  - id: THREEJS050
    title: "Use @react-three/xr for WebXR/VR/AR experiences"
    description: "R3F's XR package provides VR/AR support with controller tracking, hand tracking, and hit testing. Use <XR> provider, <Controllers>, and <Hands> components. Test with WebXR emulator extension."
    category: "threejs_xr"
    severity: "info"
    applicability:
      frameworks: ["threejs", "r3f"]
    tags: ["threejs", "xr", "vr", "ar", "webxr", "controllers"]
