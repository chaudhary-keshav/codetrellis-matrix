  - id: THREEJS041
    title: "Use drei's Perf or r3f-perf for performance monitoring"
    description: "Add performance monitors during development to track FPS, draw calls, triangles, and GPU memory. Remove or disable in production. r3f-perf provides detailed Three.js-specific metrics."
    category: "threejs_performance"
    severity: "info"
    applicability:
      frameworks: ["threejs", "r3f"]
    tags: ["threejs", "perf", "fps", "monitoring", "debug"]
    example: |
      // ✅ r3f-perf monitoring
      import { Perf } from 'r3f-perf';
      <Canvas>
        {process.env.NODE_ENV === 'development' && <Perf position="top-left" />}
        <Scene />
      </Canvas>

      // ✅ drei Stats
      import { Stats } from '@react-three/drei';
      <Stats />

  - id: THREEJS042
    title: "Use Level of Detail (LOD) for complex scenes"
    description: "Render high-detail models when close, low-detail when far. drei's <Detailed> component simplifies LOD setup. Essential for large outdoor scenes, terrain, and complex environments."
    category: "threejs_performance"
    severity: "warning"
    applicability:
      frameworks: ["threejs", "r3f"]
    tags: ["threejs", "lod", "detail", "distance", "optimization"]
    example: |
      // ✅ drei Detailed (LOD)
      import { Detailed } from '@react-three/drei';
      <Detailed distances={[0, 25, 50, 100]}>
        <HighDetailModel />
        <MediumDetailModel />
        <LowDetailModel />
        <BillboardModel />
      </Detailed>

  - id: THREEJS043
    title: "Use frustum culling (enabled by default, don't disable)"
    description: "Three.js automatically culls objects outside the camera frustum. Don't set frustumCulled=false unless you have a specific reason (e.g., custom shader displacement). For large scenes, also use spatial partitioning."
    category: "threejs_performance"
    severity: "warning"
    applicability:
      frameworks: ["threejs", "r3f"]
    tags: ["threejs", "frustum", "culling", "visibility", "optimization"]
    example: |
      // ✅ Default behavior (frustumCulled=true)
      <mesh>  {/* Automatically culled when off-screen */}
        <boxGeometry />
        <meshStandardMaterial />
      </mesh>

      // ⚠️ Only disable when needed (e.g., vertex displacement)
      <mesh frustumCulled={false}>
        <planeGeometry args={[100, 100, 128, 128]} />
        <displacementMaterial />  {/* Vertices move beyond bounding box */}
      </mesh>

  - id: THREEJS044
    title: "Merge static geometries to reduce draw calls"
    description: "Each mesh is a draw call. Merge static meshes with BufferGeometryUtils.mergeBufferGeometries() or drei's <Merged> component. Essential when draw calls exceed 100-200."
    category: "threejs_performance"
    severity: "warning"
    applicability:
      frameworks: ["threejs", "r3f"]
    tags: ["threejs", "merge", "drawcalls", "batch", "static"]
    example: |
      // ✅ drei Merged for GLTF nodes
      import { Merged, useGLTF } from '@react-three/drei';
      const { nodes } = useGLTF('/city.glb');
      <Merged meshes={nodes}>
        {(models) => (
          <>
            <models.Building position={[0, 0, 0]} />
            <models.Building position={[10, 0, 0]} />
            <models.Tree position={[5, 0, 3]} />
          </>
        )}
      </Merged>

  - id: THREEJS045
    title: "Use @react-three/rapier for physics simulation"
    description: "Rapier provides high-performance WASM-based physics. Use <RigidBody> for dynamic objects, <CuboidCollider>/<BallCollider> for collision shapes. Rapier handles continuous collision detection automatically."
    category: "threejs_physics"
    severity: "info"
    applicability:
      frameworks: ["threejs", "r3f", "rapier"]
    tags: ["threejs", "physics", "rapier", "rigidbody", "collider"]
    example: |
      // ✅ Rapier physics
      import { Physics, RigidBody } from '@react-three/rapier';

      <Physics gravity={[0, -9.81, 0]}>
        <RigidBody type="dynamic">
          <mesh><boxGeometry /><meshStandardMaterial /></mesh>
        </RigidBody>
        <RigidBody type="fixed">
          <mesh rotation={[-Math.PI / 2, 0, 0]}>
            <planeGeometry args={[50, 50]} />
            <meshStandardMaterial />
          </mesh>
        </RigidBody>
      </Physics>

  - id: THREEJS046
    title: "Use post-processing via @react-three/postprocessing"
    description: "R3F's postprocessing package wraps pmndrs/postprocessing for efficient multi-pass effects. Use EffectComposer with individual effect components. Effects are merged into fewer passes automatically."
    category: "threejs_postprocessing"
    severity: "info"
    applicability:
      frameworks: ["threejs", "r3f"]
    tags: ["threejs", "postprocessing", "effects", "bloom", "ssao"]
    example: |
      // ✅ Post-processing effects
      import { EffectComposer, Bloom, SSAO, Vignette } from '@react-three/postprocessing';

      <EffectComposer>
        <Bloom luminanceThreshold={0.9} intensity={1.5} />
        <SSAO radius={0.1} intensity={15} />
        <Vignette offset={0.3} darkness={0.7} />
      </EffectComposer>

  - id: THREEJS047
    title: "Use BVH (Bounding Volume Hierarchy) for raycasting performance"
    description: "drei's useBVH or <Bvh> component accelerates raycasting on complex meshes from O(n) to O(log n). Essential for scenes with >10k triangles that need mouse interaction."
    category: "threejs_performance"
    severity: "info"
    applicability:
      frameworks: ["threejs", "r3f", "drei"]
    tags: ["threejs", "bvh", "raycast", "performance", "spatial"]
    example: |
      // ✅ BVH acceleration
      import { Bvh } from '@react-three/drei';
      <Canvas>
        <Bvh firstHitOnly>
          <ComplexScene />  {/* All meshes get BVH acceleration */}
        </Bvh>
      </Canvas>

  - id: THREEJS048
    title: "Optimize GLTF models with gltf-transform or gltfjsx"
    description: "Optimize 3D models before bundling: compress with Draco/KTX2, remove unused data, merge meshes. Use @gltf-transform/cli or gltfjsx to generate typed React components from GLTF files."
    category: "threejs_performance"
    severity: "warning"
    applicability:
      frameworks: ["threejs", "r3f"]
    tags: ["threejs", "gltf", "optimize", "draco", "gltfjsx"]
    example: |
      # ✅ Optimize GLTF from CLI
      # npx gltf-transform optimize input.glb output.glb --compress draco --texture-compress ktx2

      # ✅ Generate typed React component
      # npx gltfjsx model.glb --types --transform

      // Generated component (auto-typed)
      export function Model(props: JSX.IntrinsicElements['group']) {
        const { nodes, materials } = useGLTF('/model-transformed.glb');
        return (
          <group {...props}>
            <mesh geometry={nodes.Body.geometry} material={materials.Skin} />
          </group>
        );
      }

