# Flask Best Practices Library
# Version: 1.0.0
# Flask Version: 2.3+ (with latest features)
# Total Practices: 20
# Coverage: Application Structure, Routing, Extensions, Request Handling, Testing

version: '1.0.0'
framework: flask
framework_version:
  min_version: '2.3'
description: 'Comprehensive Flask best practices for web application development'

practices:
  # ============================================================================
  # APPLICATION STRUCTURE (FLASK001-FLASK005)
  # ============================================================================

  - id: FLASK001
    title: 'Use Application Factory Pattern'
    category: architecture
    level: beginner
    priority: critical
    applicability:
      frameworks:
        - flask
    content:
      description: |
        Use the application factory pattern to create Flask apps. This enables
        testing with different configurations and running multiple instances.
      rationale: |
        Application factories make testing easier, allow multiple app instances,
        and enable proper configuration management.
      good_examples:
        - |
          # ✅ Application factory pattern
          # app/__init__.py
          from flask import Flask
          from flask_sqlalchemy import SQLAlchemy
          from flask_migrate import Migrate
          from flask_login import LoginManager

          db = SQLAlchemy()
          migrate = Migrate()
          login_manager = LoginManager()

          def create_app(config_name: str = 'default') -> Flask:
              """Create and configure Flask application."""
              app = Flask(__name__)

              # Load configuration
              config_mapping = {
                  'development': 'config.DevelopmentConfig',
                  'testing': 'config.TestingConfig',
                  'production': 'config.ProductionConfig',
                  'default': 'config.DevelopmentConfig',
              }
              app.config.from_object(config_mapping.get(config_name, config_mapping['default']))

              # Initialize extensions
              db.init_app(app)
              migrate.init_app(app, db)
              login_manager.init_app(app)
              login_manager.login_view = 'auth.login'

              # Register blueprints
              from app.main import bp as main_bp
              app.register_blueprint(main_bp)

              from app.auth import bp as auth_bp
              app.register_blueprint(auth_bp, url_prefix='/auth')

              from app.api import bp as api_bp
              app.register_blueprint(api_bp, url_prefix='/api/v1')

              # Register error handlers
              register_error_handlers(app)

              # Register CLI commands
              register_commands(app)

              return app

          def register_error_handlers(app: Flask) -> None:
              """Register error handlers."""
              @app.errorhandler(404)
              def not_found(error):
                  return {'error': 'Not found'}, 404

              @app.errorhandler(500)
              def internal_error(error):
                  db.session.rollback()
                  return {'error': 'Internal server error'}, 500
      bad_examples:
        - |
          # ❌ Global app without factory
          app = Flask(__name__)
          db = SQLAlchemy(app)

          @app.route('/')
          def index():
              return 'Hello'

          # Difficult to test and configure differently
      references:
        - 'https://flask.palletsprojects.com/en/2.3.x/patterns/appfactories/'
      tags:
        - application-factory
        - architecture
        - flask

  - id: FLASK002
    title: 'Use Blueprints for Modularity'
    category: architecture
    level: beginner
    priority: high
    applicability:
      frameworks:
        - flask
    content:
      description: |
        Organize routes into blueprints. Each feature or area of your
        application should have its own blueprint.
      rationale: |
        Blueprints enable modular application design, making code
        more maintainable and reusable.
      good_examples:
        - |
          # ✅ Blueprint organization
          # app/auth/__init__.py
          from flask import Blueprint

          bp = Blueprint('auth', __name__)

          from app.auth import routes  # noqa: F401, E402

          # app/auth/routes.py
          from flask import render_template, redirect, url_for, flash, request
          from flask_login import login_user, logout_user, login_required, current_user
          from app.auth import bp
          from app.auth.forms import LoginForm, RegisterForm
          from app.models import User
          from app import db

          @bp.route('/login', methods=['GET', 'POST'])
          def login():
              if current_user.is_authenticated:
                  return redirect(url_for('main.index'))

              form = LoginForm()
              if form.validate_on_submit():
                  user = User.query.filter_by(email=form.email.data).first()
                  if user and user.check_password(form.password.data):
                      login_user(user, remember=form.remember.data)
                      next_page = request.args.get('next')
                      return redirect(next_page or url_for('main.index'))
                  flash('Invalid email or password', 'error')

              return render_template('auth/login.html', form=form)

          @bp.route('/logout')
          @login_required
          def logout():
              logout_user()
              return redirect(url_for('main.index'))

          # app/api/__init__.py
          from flask import Blueprint

          bp = Blueprint('api', __name__)

          from app.api import users, articles  # noqa: F401, E402
      bad_examples:
        - |
          # ❌ All routes in one file
          @app.route('/login')
          def login():
              pass

          @app.route('/api/users')
          def api_users():
              pass

          @app.route('/admin')
          def admin():
              pass
          # Hundreds of routes in one file!
      references:
        - 'https://flask.palletsprojects.com/en/2.3.x/blueprints/'
      tags:
        - blueprints
        - modularity
        - architecture

  - id: FLASK003
    title: 'Follow Flask Project Structure'
    category: architecture
    level: beginner
    priority: high
    applicability:
      frameworks:
        - flask
    content:
      description: |
        Organize Flask projects with a clear structure: app factory,
        blueprints, models, templates, and static files.
      rationale: |
        Consistent structure makes projects navigable and follows
        community conventions.
      good_examples:
        - |
          # ✅ Recommended project structure
          """
          myproject/
          ├── app/                        # Application package
          │   ├── __init__.py            # App factory
          │   ├── extensions.py          # Extension instances
          │   ├── models/                # Database models
          │   │   ├── __init__.py
          │   │   ├── user.py
          │   │   └── article.py
          │   ├── auth/                  # Auth blueprint
          │   │   ├── __init__.py
          │   │   ├── routes.py
          │   │   └── forms.py
          │   ├── main/                  # Main blueprint
          │   │   ├── __init__.py
          │   │   └── routes.py
          │   ├── api/                   # API blueprint
          │   │   ├── __init__.py
          │   │   ├── v1/
          │   │   │   ├── __init__.py
          │   │   │   ├── users.py
          │   │   │   └── articles.py
          │   │   └── decorators.py
          │   ├── templates/             # Jinja2 templates
          │   │   ├── base.html
          │   │   ├── auth/
          │   │   └── main/
          │   ├── static/                # Static files
          │   │   ├── css/
          │   │   ├── js/
          │   │   └── images/
          │   └── utils/                 # Utility functions
          │       ├── __init__.py
          │       └── helpers.py
          ├── config.py                  # Configuration classes
          ├── migrations/                # Database migrations
          ├── tests/                     # Test package
          │   ├── __init__.py
          │   ├── conftest.py
          │   ├── test_auth.py
          │   └── test_api.py
          ├── requirements/
          │   ├── base.txt
          │   ├── dev.txt
          │   └── prod.txt
          ├── .env.example
          ├── .flaskenv
          ├── wsgi.py
          └── pytest.ini
          """

          # wsgi.py
          from app import create_app

          app = create_app()

          # .flaskenv
          """
          FLASK_APP=wsgi.py
          FLASK_ENV=development
          """
      bad_examples:
        - |
          # ❌ Flat structure
          """
          myproject/
          ├── app.py           # Everything in one file
          ├── templates/
          └── static/
          """
      references:
        - 'https://flask.palletsprojects.com/en/2.3.x/tutorial/layout/'
      tags:
        - project-structure
        - organization
        - flask

  - id: FLASK004
    title: 'Use Configuration Classes'
    category: configuration
    level: intermediate
    priority: high
    applicability:
      frameworks:
        - flask
    content:
      description: |
        Use configuration classes with inheritance for different environments.
        Load sensitive values from environment variables.
      rationale: |
        Configuration classes provide type safety, validation,
        and clear separation of environments.
      good_examples:
        - |
          # ✅ Configuration with classes
          # config.py
          import os
          from datetime import timedelta

          class Config:
              """Base configuration."""
              SECRET_KEY = os.environ.get('SECRET_KEY') or 'dev-secret-key-change-in-prod'

              SQLALCHEMY_TRACK_MODIFICATIONS = False
              SQLALCHEMY_ENGINE_OPTIONS = {
                  'pool_pre_ping': True,
                  'pool_recycle': 300,
              }

              # Session
              PERMANENT_SESSION_LIFETIME = timedelta(days=7)
              SESSION_COOKIE_SECURE = True
              SESSION_COOKIE_HTTPONLY = True
              SESSION_COOKIE_SAMESITE = 'Lax'

              # Mail
              MAIL_SERVER = os.environ.get('MAIL_SERVER', 'localhost')
              MAIL_PORT = int(os.environ.get('MAIL_PORT', 587))
              MAIL_USE_TLS = os.environ.get('MAIL_USE_TLS', 'true').lower() == 'true'

              @staticmethod
              def init_app(app):
                  """Initialize application-specific configuration."""
                  pass

          class DevelopmentConfig(Config):
              """Development configuration."""
              DEBUG = True
              SQLALCHEMY_DATABASE_URI = os.environ.get('DEV_DATABASE_URL') or \
                  'sqlite:///dev.db'
              SESSION_COOKIE_SECURE = False

          class TestingConfig(Config):
              """Testing configuration."""
              TESTING = True
              SQLALCHEMY_DATABASE_URI = 'sqlite:///:memory:'
              WTF_CSRF_ENABLED = False
              SESSION_COOKIE_SECURE = False

          class ProductionConfig(Config):
              """Production configuration."""
              SQLALCHEMY_DATABASE_URI = os.environ.get('DATABASE_URL')

              @classmethod
              def init_app(cls, app):
                  Config.init_app(app)

                  # Log to stderr in production
                  import logging
                  from logging import StreamHandler
                  handler = StreamHandler()
                  handler.setLevel(logging.INFO)
                  app.logger.addHandler(handler)
      bad_examples:
        - |
          # ❌ Hardcoded configuration
          app.config['SECRET_KEY'] = 'hardcoded-secret'
          app.config['DATABASE_URL'] = 'postgresql://user:pass@localhost/db'
      references:
        - 'https://flask.palletsprojects.com/en/2.3.x/config/'
      tags:
        - configuration
        - environment
        - security

  - id: FLASK005
    title: 'Initialize Extensions Properly'
    category: architecture
    level: intermediate
    priority: high
    applicability:
      frameworks:
        - flask
    content:
      description: |
        Initialize Flask extensions in a separate module and use init_app
        pattern for deferred initialization.
      rationale: |
        Proper extension initialization prevents circular imports
        and works with application factory pattern.
      good_examples:
        - |
          # ✅ Extension initialization
          # app/extensions.py
          from flask_sqlalchemy import SQLAlchemy
          from flask_migrate import Migrate
          from flask_login import LoginManager
          from flask_mail import Mail
          from flask_wtf.csrf import CSRFProtect
          from flask_limiter import Limiter
          from flask_limiter.util import get_remote_address
          from flask_caching import Cache

          # Initialize extensions without app
          db = SQLAlchemy()
          migrate = Migrate()
          login_manager = LoginManager()
          mail = Mail()
          csrf = CSRFProtect()
          limiter = Limiter(key_func=get_remote_address)
          cache = Cache()

          # Configure login manager
          login_manager.login_view = 'auth.login'
          login_manager.login_message = 'Please log in to access this page.'
          login_manager.login_message_category = 'info'

          @login_manager.user_loader
          def load_user(user_id):
              from app.models import User
              return User.query.get(int(user_id))

          # app/__init__.py
          from app.extensions import db, migrate, login_manager, mail, csrf, limiter, cache

          def create_app(config_name='default'):
              app = Flask(__name__)
              app.config.from_object(config_mapping[config_name])

              # Initialize all extensions with app
              db.init_app(app)
              migrate.init_app(app, db)
              login_manager.init_app(app)
              mail.init_app(app)
              csrf.init_app(app)
              limiter.init_app(app)
              cache.init_app(app)

              return app
      bad_examples:
        - |
          # ❌ Extensions tied to app at import time
          from flask import Flask
          from flask_sqlalchemy import SQLAlchemy

          app = Flask(__name__)
          db = SQLAlchemy(app)  # Can't use different configs!
      tags:
        - extensions
        - initialization
        - architecture

  # ============================================================================
  # REQUEST HANDLING (FLASK006-FLASK010)
  # ============================================================================

  - id: FLASK006
    title: 'Use Request Context Properly'
    category: patterns
    level: intermediate
    priority: high
    applicability:
      frameworks:
        - flask
    content:
      description: |
        Understand and use Flask's request context properly. Access
        request data through flask.request and use context locals correctly.
      rationale: |
        Proper request context handling prevents bugs and enables
        thread-safe request processing.
      good_examples:
        - |
          # ✅ Proper request context usage
          from flask import request, g, current_app

          @bp.route('/api/users', methods=['POST'])
          def create_user():
              # Access request data
              data = request.get_json()
              if not data:
                  return {'error': 'JSON body required'}, 400

              # Validate content type
              if not request.is_json:
                  return {'error': 'Content-Type must be application/json'}, 415

              # Access headers
              auth_token = request.headers.get('Authorization')

              # Access query parameters
              include_details = request.args.get('include_details', 'false') == 'true'

              # Use g for request-scoped data
              user = User(
                  email=data['email'],
                  created_by_ip=request.remote_addr,
              )

              return {'id': user.id}, 201

          # ✅ Using g for request-scoped data
          @bp.before_request
          def load_user():
              """Load user before each request."""
              token = request.headers.get('X-Auth-Token')
              if token:
                  g.current_user = User.query.filter_by(token=token).first()
              else:
                  g.current_user = None

          @bp.route('/profile')
          def profile():
              if not g.current_user:
                  return {'error': 'Unauthorized'}, 401
              return {'user': g.current_user.to_dict()}

          # ✅ Using current_app for app-level data
          @bp.route('/info')
          def app_info():
              return {
                  'version': current_app.config['VERSION'],
                  'debug': current_app.debug,
              }
      bad_examples:
        - |
          # ❌ Storing request data globally
          current_request_user = None  # Global variable!

          def get_user():
              global current_request_user
              return current_request_user
      references:
        - 'https://flask.palletsprojects.com/en/2.3.x/reqcontext/'
      tags:
        - request-context
        - g-object
        - flask

  - id: FLASK007
    title: 'Implement Input Validation'
    category: validation
    level: intermediate
    priority: critical
    applicability:
      frameworks:
        - flask
    content:
      description: |
        Validate all user input using WTForms for forms and marshmallow
        or pydantic for API data. Never trust client data.
      rationale: |
        Input validation prevents security vulnerabilities and
        ensures data integrity.
      good_examples:
        - |
          # ✅ WTForms for HTML forms
          from flask_wtf import FlaskForm
          from wtforms import StringField, PasswordField, BooleanField
          from wtforms.validators import DataRequired, Email, Length, EqualTo, ValidationError
          from app.models import User

          class RegistrationForm(FlaskForm):
              email = StringField('Email', validators=[
                  DataRequired(),
                  Email(),
                  Length(max=120),
              ])
              password = PasswordField('Password', validators=[
                  DataRequired(),
                  Length(min=8, message='Password must be at least 8 characters'),
              ])
              confirm_password = PasswordField('Confirm Password', validators=[
                  DataRequired(),
                  EqualTo('password', message='Passwords must match'),
              ])

              def validate_email(self, field):
                  if User.query.filter_by(email=field.data.lower()).first():
                      raise ValidationError('Email already registered.')

          # ✅ Marshmallow for API validation
          from marshmallow import Schema, fields, validate, validates, ValidationError

          class UserSchema(Schema):
              id = fields.Int(dump_only=True)
              email = fields.Email(required=True)
              username = fields.Str(required=True, validate=validate.Length(min=3, max=50))
              password = fields.Str(load_only=True, required=True, validate=validate.Length(min=8))
              created_at = fields.DateTime(dump_only=True)

              @validates('username')
              def validate_username(self, value):
                  if User.query.filter_by(username=value).first():
                      raise ValidationError('Username already taken.')

          @bp.route('/api/users', methods=['POST'])
          def create_user():
              schema = UserSchema()
              try:
                  data = schema.load(request.get_json())
              except ValidationError as err:
                  return {'errors': err.messages}, 400

              user = User(**data)
              db.session.add(user)
              db.session.commit()

              return schema.dump(user), 201
      bad_examples:
        - |
          # ❌ No validation
          @app.route('/api/users', methods=['POST'])
          def create_user():
              data = request.get_json()
              user = User(
                  email=data['email'],  # Could be anything!
                  password=data['password'],  # No length check!
              )
              db.session.add(user)
              db.session.commit()
      references:
        - 'https://flask-wtf.readthedocs.io/'
        - 'https://marshmallow.readthedocs.io/'
      tags:
        - validation
        - security
        - forms

  - id: FLASK008
    title: 'Handle Errors Gracefully'
    category: error_handling
    level: intermediate
    priority: high
    applicability:
      frameworks:
        - flask
    content:
      description: |
        Implement proper error handling with custom error pages and
        API error responses. Log errors appropriately.
      rationale: |
        Good error handling improves user experience and helps
        with debugging.
      good_examples:
        - |
          # ✅ Comprehensive error handling
          from flask import jsonify, render_template, request
          from werkzeug.exceptions import HTTPException

          class APIError(Exception):
              """Custom API exception."""
              def __init__(self, message, status_code=400, payload=None):
                  super().__init__()
                  self.message = message
                  self.status_code = status_code
                  self.payload = payload

              def to_dict(self):
                  rv = dict(self.payload or ())
                  rv['error'] = self.message
                  rv['status'] = self.status_code
                  return rv

          def register_error_handlers(app):
              """Register error handlers."""

              @app.errorhandler(APIError)
              def handle_api_error(error):
                  response = jsonify(error.to_dict())
                  response.status_code = error.status_code
                  return response

              @app.errorhandler(HTTPException)
              def handle_http_exception(error):
                  if request.path.startswith('/api/'):
                      return jsonify({
                          'error': error.description,
                          'status': error.code,
                      }), error.code
                  return render_template(f'errors/{error.code}.html'), error.code

              @app.errorhandler(Exception)
              def handle_exception(error):
                  app.logger.exception('Unhandled exception: %s', error)

                  if request.path.startswith('/api/'):
                      return jsonify({
                          'error': 'Internal server error',
                          'status': 500,
                      }), 500
                  return render_template('errors/500.html'), 500

              @app.errorhandler(404)
              def not_found(error):
                  if request.path.startswith('/api/'):
                      return jsonify({'error': 'Resource not found'}), 404
                  return render_template('errors/404.html'), 404

          # Usage in views
          @bp.route('/api/users/<int:user_id>')
          def get_user(user_id):
              user = User.query.get(user_id)
              if not user:
                  raise APIError('User not found', status_code=404)
              return user.to_dict()
      bad_examples:
        - |
          # ❌ No error handling
          @app.route('/api/users/<int:user_id>')
          def get_user(user_id):
              user = User.query.get(user_id)
              return user.to_dict()  # Crashes if user is None!
      references:
        - 'https://flask.palletsprojects.com/en/2.3.x/errorhandling/'
      tags:
        - error-handling
        - exceptions
        - logging

  - id: FLASK009
    title: 'Use Response Helpers'
    category: patterns
    level: beginner
    priority: medium
    applicability:
      frameworks:
        - flask
    content:
      description: |
        Use Flask's response helpers (jsonify, make_response, redirect)
        for proper response construction.
      rationale: |
        Response helpers ensure correct content types, headers,
        and status codes.
      good_examples:
        - |
          # ✅ Proper response construction
          from flask import jsonify, make_response, redirect, url_for, send_file

          @bp.route('/api/users')
          def list_users():
              users = User.query.all()
              return jsonify({
                  'users': [u.to_dict() for u in users],
                  'total': len(users),
              })

          @bp.route('/api/users', methods=['POST'])
          def create_user():
              # ... create user ...
              response = jsonify(user.to_dict())
              response.status_code = 201
              response.headers['Location'] = url_for('api.get_user', user_id=user.id)
              return response

          @bp.route('/api/users/<int:user_id>', methods=['DELETE'])
          def delete_user(user_id):
              # ... delete user ...
              return '', 204  # No content

          # Custom response with headers
          @bp.route('/api/export')
          def export_data():
              data = generate_csv()
              response = make_response(data)
              response.headers['Content-Type'] = 'text/csv'
              response.headers['Content-Disposition'] = 'attachment; filename=export.csv'
              return response

          # File download
          @bp.route('/download/<int:file_id>')
          def download_file(file_id):
              file = File.query.get_or_404(file_id)
              return send_file(
                  file.path,
                  as_attachment=True,
                  download_name=file.original_name,
              )

          # Redirect
          @bp.route('/old-path')
          def old_path():
              return redirect(url_for('main.new_path'), code=301)
      bad_examples:
        - |
          # ❌ Manual JSON without proper content type
          import json

          @app.route('/api/users')
          def list_users():
              users = User.query.all()
              return json.dumps([u.to_dict() for u in users])  # Wrong content type!
      tags:
        - response
        - jsonify
        - helpers

  - id: FLASK010
    title: 'Implement Rate Limiting'
    category: security
    level: intermediate
    priority: high
    applicability:
      frameworks:
        - flask
    content:
      description: |
        Use Flask-Limiter to protect endpoints from abuse. Apply
        different limits to different endpoints.
      rationale: |
        Rate limiting prevents abuse, protects resources, and
        mitigates DoS attacks.
      good_examples:
        - |
          # ✅ Rate limiting with Flask-Limiter
          from flask_limiter import Limiter
          from flask_limiter.util import get_remote_address

          limiter = Limiter(
              key_func=get_remote_address,
              default_limits=['200 per day', '50 per hour'],
              storage_uri='redis://localhost:6379/0',
          )

          # In app factory
          def create_app():
              app = Flask(__name__)
              limiter.init_app(app)
              return app

          # Apply to specific endpoints
          @bp.route('/api/login', methods=['POST'])
          @limiter.limit('5 per minute')
          def login():
              # Strict limit on login attempts
              pass

          @bp.route('/api/search')
          @limiter.limit('30 per minute')
          def search():
              # Moderate limit on expensive operation
              pass

          @bp.route('/api/data')
          @limiter.limit('100 per minute', key_func=lambda: current_user.id)
          def get_data():
              # Per-user rate limiting
              pass

          # Blueprint-level limit
          @bp.before_request
          @limiter.limit('1000 per hour')
          def before_request():
              pass

          # Exempt certain endpoints
          @bp.route('/health')
          @limiter.exempt
          def health_check():
              return {'status': 'healthy'}

          # Custom error handler for rate limit exceeded
          @app.errorhandler(429)
          def ratelimit_handler(e):
              return jsonify({
                  'error': 'Rate limit exceeded',
                  'retry_after': e.description,
              }), 429
      bad_examples:
        - |
          # ❌ No rate limiting
          @app.route('/api/login', methods=['POST'])
          def login():
              # Can be brute-forced!
              pass
      references:
        - 'https://flask-limiter.readthedocs.io/'
