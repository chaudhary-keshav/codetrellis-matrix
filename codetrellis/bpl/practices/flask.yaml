  - id: FLASK015
    title: 'Implement Authentication Securely'
    category: security
    level: intermediate
    priority: critical
    applicability:
      frameworks:
        - flask
    content:
      description: |
        Use Flask-Login for session authentication or JWT for API
        authentication. Hash passwords properly.
      rationale: |
        Secure authentication protects user accounts and
        prevents unauthorized access.
      good_examples:
        - |
          # ✅ Flask-Login setup
          from flask_login import UserMixin
          from werkzeug.security import generate_password_hash, check_password_hash

          class User(UserMixin, db.Model):
              id = db.Column(db.Integer, primary_key=True)
              email = db.Column(db.String(120), unique=True, nullable=False)
              password_hash = db.Column(db.String(256), nullable=False)

              def set_password(self, password):
                  self.password_hash = generate_password_hash(password)

              def check_password(self, password):
                  return check_password_hash(self.password_hash, password)

          # ✅ JWT authentication for APIs
          from flask_jwt_extended import (
              JWTManager, create_access_token, create_refresh_token,
              jwt_required, get_jwt_identity
          )

          jwt = JWTManager()

          @bp.route('/api/auth/login', methods=['POST'])
          def api_login():
              data = request.get_json()
              user = User.query.filter_by(email=data.get('email')).first()

              if not user or not user.check_password(data.get('password')):
                  return {'error': 'Invalid credentials'}, 401

              access_token = create_access_token(identity=user.id)
              refresh_token = create_refresh_token(identity=user.id)

              return {
                  'access_token': access_token,
                  'refresh_token': refresh_token,
              }

          @bp.route('/api/protected')
          @jwt_required()
          def protected():
              user_id = get_jwt_identity()
              return {'user_id': user_id}
      bad_examples:
        - |
          # ❌ Plain text passwords
          class User(db.Model):
              password = db.Column(db.String(100))  # Plain text!

              def check_password(self, password):
                  return self.password == password
      references:
        - 'https://flask-login.readthedocs.io/'
        - 'https://flask-jwt-extended.readthedocs.io/'
      tags:
        - authentication
        - security
        - jwt

  - id: FLASK016
    title: 'Protect Against CSRF'
    category: security
    level: beginner
    priority: critical
    applicability:
      frameworks:
        - flask
    content:
      description: |
        Use Flask-WTF's CSRF protection for all forms. Handle CSRF
        tokens in AJAX requests properly.
      rationale: |
        CSRF protection prevents attackers from tricking users
        into performing unwanted actions.
      good_examples:
        - |
          # ✅ CSRF protection setup
          from flask_wtf.csrf import CSRFProtect

          csrf = CSRFProtect()

          def create_app():
              app = Flask(__name__)
              csrf.init_app(app)
              return app

          # ✅ In templates
          """
          <form method="post">
              {{ form.csrf_token }}
              <!-- or -->
              <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
              {{ form.email.label }} {{ form.email() }}
              <button type="submit">Submit</button>
          </form>
          """

          # ✅ AJAX with CSRF
          """
          <meta name="csrf-token" content="{{ csrf_token() }}">

          <script>
          const csrfToken = document.querySelector('meta[name="csrf-token"]').content;

          fetch('/api/data', {
              method: 'POST',
              headers: {
                  'Content-Type': 'application/json',
                  'X-CSRFToken': csrfToken,
              },
              body: JSON.stringify(data),
          });
          </script>
          """

          # ✅ Exempt API endpoints using JWT
          @csrf.exempt
          @bp.route('/api/webhook', methods=['POST'])
          def webhook():
              # External webhook - verify differently
              signature = request.headers.get('X-Signature')
              # ... verify signature ...
              pass
      bad_examples:
        - |
          # ❌ CSRF disabled globally
          WTF_CSRF_ENABLED = False

          # ❌ Form without CSRF token
          """
          <form method="post">
              <input name="email" type="email">
              <button type="submit">Submit</button>
          </form>
          """
      references:
        - 'https://flask-wtf.readthedocs.io/en/latest/csrf.html'
      tags:
        - csrf
        - security
        - forms

  - id: FLASK017
    title: 'Secure File Uploads'
    category: security
    level: intermediate
    priority: high
    applicability:
      frameworks:
        - flask
    content:
      description: |
        Validate file uploads: check file types, limit sizes,
        sanitize filenames, and store securely.
      rationale: |
        Insecure file uploads can lead to code execution and
        other security vulnerabilities.
      good_examples:
        - |
          # ✅ Secure file upload handling
          import os
          from werkzeug.utils import secure_filename
          from flask import current_app

          ALLOWED_EXTENSIONS = {'png', 'jpg', 'jpeg', 'gif', 'pdf'}
          MAX_CONTENT_LENGTH = 16 * 1024 * 1024  # 16MB

          def allowed_file(filename):
              return '.' in filename and \
                  filename.rsplit('.', 1)[1].lower() in ALLOWED_EXTENSIONS

          @bp.route('/upload', methods=['POST'])
          @login_required
          def upload_file():
              if 'file' not in request.files:
                  return {'error': 'No file provided'}, 400

              file = request.files['file']

              if file.filename == '':
                  return {'error': 'No file selected'}, 400

              if not allowed_file(file.filename):
                  return {'error': 'File type not allowed'}, 400

              # Secure the filename
              filename = secure_filename(file.filename)

              # Add unique prefix to prevent overwrites
              unique_filename = f'{uuid.uuid4().hex}_{filename}'

              # Store in designated upload folder
              upload_path = os.path.join(
                  current_app.config['UPLOAD_FOLDER'],
                  unique_filename
              )
              file.save(upload_path)

              # Verify file content (magic bytes)
              import magic
              mime = magic.from_file(upload_path, mime=True)
              allowed_mimes = {'image/png', 'image/jpeg', 'image/gif', 'application/pdf'}

              if mime not in allowed_mimes:
                  os.remove(upload_path)
                  return {'error': 'Invalid file content'}, 400

              return {'filename': unique_filename}, 201

          # Configuration
          app.config['MAX_CONTENT_LENGTH'] = MAX_CONTENT_LENGTH
          app.config['UPLOAD_FOLDER'] = '/var/www/uploads'
      bad_examples:
        - |
          # ❌ Insecure upload
          @app.route('/upload', methods=['POST'])
          def upload():
              file = request.files['file']
              file.save(f'/uploads/{file.filename}')  # Path traversal!
              return 'Uploaded'
      references:
        - 'https://flask.palletsprojects.com/en/2.3.x/patterns/fileuploads/'
      tags:
        - file-upload
        - security
        - validation

  - id: FLASK018
    title: 'Write Comprehensive Tests'
    category: testing
    level: intermediate
    priority: high
    applicability:
      frameworks:
        - flask
    content:
      description: |
        Write unit and integration tests using pytest. Use fixtures
        for test data and app instances.
      rationale: |
        Tests catch bugs, document behavior, and enable confident
        refactoring.
      good_examples:
        - |
          # ✅ Test configuration
          # tests/conftest.py
          import pytest
          from app import create_app, db
          from app.models import User

          @pytest.fixture(scope='session')
          def app():
              """Create application for testing."""
              app = create_app('testing')

              with app.app_context():
                  db.create_all()
                  yield app
                  db.drop_all()

          @pytest.fixture
          def client(app):
              """Test client."""
              return app.test_client()

          @pytest.fixture
          def runner(app):
              """CLI runner."""
              return app.test_cli_runner()

          @pytest.fixture
          def user(app):
              """Create test user."""
              with app.app_context():
                  user = User(email='test@example.com', username='testuser')
                  user.set_password('password123')
                  db.session.add(user)
                  db.session.commit()
                  yield user
                  db.session.delete(user)
                  db.session.commit()

          @pytest.fixture
          def auth_client(client, user):
              """Authenticated test client."""
              client.post('/auth/login', data={
                  'email': user.email,
                  'password': 'password123',
              })
              return client

          # tests/test_auth.py
          def test_login_success(client, user):
              response = client.post('/auth/login', data={
                  'email': 'test@example.com',
                  'password': 'password123',
              })
              assert response.status_code == 302
              assert '/dashboard' in response.headers['Location']

          def test_login_invalid_password(client, user):
              response = client.post('/auth/login', data={
                  'email': 'test@example.com',
                  'password': 'wrongpassword',
              })
              assert response.status_code == 200
              assert b'Invalid' in response.data

          def test_protected_route_requires_login(client):
              response = client.get('/dashboard')
              assert response.status_code == 302
              assert 'login' in response.headers['Location']
      bad_examples:
        - |
          # ❌ No tests or minimal tests
          def test_app():
              assert True  # Useless!
      references:
        - 'https://flask.palletsprojects.com/en/2.3.x/testing/'
      tags:
        - testing
        - pytest
        - fixtures

  - id: FLASK019
    title: 'Implement Background Tasks'
    category: async_patterns
    level: intermediate
    priority: medium
    applicability:
      frameworks:
        - flask
    content:
      description: |
        Use Celery or RQ for background task processing. Don't block
        requests with long-running operations.
      rationale: |
        Background tasks improve response times and handle
        unreliable operations gracefully.
      good_examples:
        - |
          # ✅ Celery integration
          # app/celery.py
          from celery import Celery

          celery = Celery(__name__)

          def init_celery(app):
              """Initialize Celery with Flask app context."""
              celery.conf.update(app.config)

              class ContextTask(celery.Task):
                  def __call__(self, *args, **kwargs):
                      with app.app_context():
                          return self.run(*args, **kwargs)

              celery.Task = ContextTask
              return celery

          # app/tasks.py
          from app.celery import celery
          from app.extensions import db, mail
          from app.models import User

          @celery.task(bind=True, max_retries=3)
          def send_welcome_email(self, user_id):
              """Send welcome email to new user."""
              try:
                  user = User.query.get(user_id)
                  if not user:
                      return

                  msg = Message(
                      subject='Welcome!',
                      recipients=[user.email],
                      body=f'Welcome {user.username}!',
                  )
                  mail.send(msg)
              except Exception as exc:
                  self.retry(exc=exc, countdown=60)

          @celery.task
          def generate_report(report_id):
              """Generate report in background."""
              report = Report.query.get(report_id)
              report.status = 'processing'
              db.session.commit()

              try:
                  data = process_data(report)
                  report.file_path = save_report(data)
                  report.status = 'completed'
              except Exception as e:
                  report.status = 'failed'
                  report.error = str(e)
              finally:
                  db.session.commit()

          # In views
          @bp.route('/register', methods=['POST'])
          def register():
              user = create_user(request.form)
              send_welcome_email.delay(user.id)  # Non-blocking
              return redirect(url_for('main.index'))
      bad_examples:
        - |
          # ❌ Blocking request with slow operation
          @app.route('/register', methods=['POST'])
          def register():
              user = create_user(request.form)
              send_email(user.email)  # Blocks for seconds!
              generate_welcome_pdf(user)  # Even longer!
              return redirect(url_for('main.index'))
      references:
        - 'https://flask.palletsprojects.com/en/2.3.x/patterns/celery/'
      tags:
        - celery
        - background-tasks
        - async

  - id: FLASK020
    title: 'Implement Logging and Monitoring'
    category: monitoring
    level: intermediate
    priority: high
    applicability:
      frameworks:
        - flask
    content:
      description: |
        Configure structured logging and monitoring. Include request
        context in logs and implement health checks.
      rationale: |
        Good logging enables debugging and monitoring, while
        health checks enable automated failover.
      good_examples:
        - |
          # ✅ Logging configuration
          import logging
          from logging.handlers import RotatingFileHandler
          from flask import request, g
          import time

          def configure_logging(app):
              """Configure application logging."""

              # Remove default handler
              app.logger.handlers.clear()

              # Format
              formatter = logging.Formatter(
                  '[%(asctime)s] %(levelname)s in %(module)s: %(message)s'
              )

              # File handler
              file_handler = RotatingFileHandler(
                  'logs/app.log',
                  maxBytes=10 * 1024 * 1024,
                  backupCount=10,
              )
              file_handler.setFormatter(formatter)
              file_handler.setLevel(logging.INFO)

              app.logger.addHandler(file_handler)
              app.logger.setLevel(logging.INFO)

          # ✅ Request logging middleware
          @app.before_request
          def before_request():
              g.start_time = time.time()
              g.request_id = request.headers.get('X-Request-ID', str(uuid.uuid4()))

          @app.after_request
          def after_request(response):
              duration = time.time() - g.start_time
              app.logger.info(
                  '%s %s %s %s %.3fs',
                  g.request_id,
                  request.method,
                  request.path,
                  response.status_code,
                  duration,
              )
              response.headers['X-Request-ID'] = g.request_id
              return response

          # ✅ Health check endpoint
          @bp.route('/health')
          def health_check():
              checks = {
                  'database': check_database(),
                  'cache': check_cache(),
              }

              status = 'healthy' if all(checks.values()) else 'unhealthy'
              code = 200 if status == 'healthy' else 503

              return {'status': status, 'checks': checks}, code

          def check_database():
              try:
                  db.session.execute('SELECT 1')
                  return True
              except Exception:
                  return False
      bad_examples:
        - |
          # ❌ Using print for logging
          @app.route('/api/data')
          def get_data():
              print('Getting data...')  # Not production-ready!
              return {'data': []}
      references:
        - 'https://flask.palletsprojects.com/en/2.3.x/logging/'
      tags:
        - logging
        - monitoring
        - health-checks
