  # ============================================================================
  # DATABASE & MODELS (FLASK011-FLASK014)
  # ============================================================================

  - id: FLASK011
    title: 'Use Flask-SQLAlchemy Best Practices'
    category: database
    level: intermediate
    priority: high
    applicability:
      frameworks:
        - flask
    content:
      description: |
        Follow Flask-SQLAlchemy best practices: model mixins, query
        optimization, and proper session management.
      rationale: |
        Good database practices prevent performance issues and
        ensure data integrity.
      good_examples:
        - |
          # ✅ Model with mixins and best practices
          from datetime import datetime
          from app.extensions import db

          class TimestampMixin:
              """Mixin for created_at and updated_at."""
              created_at = db.Column(db.DateTime, default=datetime.utcnow, nullable=False)
              updated_at = db.Column(
                  db.DateTime,
                  default=datetime.utcnow,
                  onupdate=datetime.utcnow,
                  nullable=False,
              )

          class SoftDeleteMixin:
              """Mixin for soft delete."""
              deleted_at = db.Column(db.DateTime, nullable=True, index=True)

              @property
              def is_deleted(self):
                  return self.deleted_at is not None

              def soft_delete(self):
                  self.deleted_at = datetime.utcnow()
                  db.session.commit()

          class User(TimestampMixin, SoftDeleteMixin, db.Model):
              __tablename__ = 'users'

              id = db.Column(db.Integer, primary_key=True)
              email = db.Column(db.String(120), unique=True, nullable=False, index=True)
              username = db.Column(db.String(50), unique=True, nullable=False)
              password_hash = db.Column(db.String(256), nullable=False)

              # Relationships with lazy loading control
              articles = db.relationship(
                  'Article',
                  backref=db.backref('author', lazy='joined'),
                  lazy='dynamic',
                  cascade='all, delete-orphan',
              )

              def __repr__(self):
                  return f'<User {self.username}>'

              def to_dict(self):
                  return {
                      'id': self.id,
                      'email': self.email,
                      'username': self.username,
                      'created_at': self.created_at.isoformat(),
                  }

          # ✅ Query optimization
          # Eager loading
          users = User.query.options(
              db.joinedload(User.articles)
          ).all()

          # Pagination
          page = request.args.get('page', 1, type=int)
          users = User.query.paginate(page=page, per_page=20, error_out=False)
      bad_examples:
        - |
          # ❌ N+1 query problem
          users = User.query.all()
          for user in users:
              print(user.articles.count())  # Query per user!
      references:
        - 'https://flask-sqlalchemy.palletsprojects.com/'
      tags:
        - sqlalchemy
        - database
        - models

  - id: FLASK012
    title: 'Manage Database Sessions Properly'
    category: database
    level: intermediate
    priority: high
    applicability:
      frameworks:
        - flask
    content:
      description: |
        Manage database sessions properly: commit/rollback, handle
        exceptions, and understand session scope.
      rationale: |
        Proper session management prevents data corruption and
        connection leaks.
      good_examples:
        - |
          # ✅ Proper session management
          from app.extensions import db

          @bp.route('/api/users', methods=['POST'])
          def create_user():
              data = request.get_json()

              try:
                  user = User(**data)
                  db.session.add(user)
                  db.session.commit()
                  return user.to_dict(), 201
              except IntegrityError:
                  db.session.rollback()
                  return {'error': 'User already exists'}, 409
              except Exception as e:
                  db.session.rollback()
                  current_app.logger.exception('Failed to create user')
                  raise

          # ✅ Context manager for complex operations
          from contextlib import contextmanager

          @contextmanager
          def transaction():
              """Context manager for database transactions."""
              try:
                  yield db.session
                  db.session.commit()
              except Exception:
                  db.session.rollback()
                  raise

          def transfer_funds(from_id, to_id, amount):
              with transaction():
                  from_account = Account.query.get(from_id)
                  to_account = Account.query.get(to_id)

                  from_account.balance -= amount
                  to_account.balance += amount

          # ✅ Teardown handler
          @app.teardown_appcontext
          def shutdown_session(exception=None):
              db.session.remove()
      bad_examples:
        - |
          # ❌ No error handling
          @app.route('/api/users', methods=['POST'])
          def create_user():
              user = User(**request.get_json())
              db.session.add(user)
              db.session.commit()  # No rollback if this fails!
              return user.to_dict()
      tags:
        - session
        - transaction
        - database

  - id: FLASK013
    title: 'Use Database Migrations'
    category: database
    level: beginner
    priority: critical
    applicability:
      frameworks:
        - flask
    content:
      description: |
        Use Flask-Migrate (Alembic) for database migrations. Version
        control your schema changes.
      rationale: |
        Migrations track schema changes, enable rollbacks, and
        ensure consistent deployments.
      good_examples:
        - |
          # ✅ Flask-Migrate setup
          # app/__init__.py
          from flask_migrate import Migrate

          migrate = Migrate()

          def create_app():
              app = Flask(__name__)
              db.init_app(app)
              migrate.init_app(app, db)
              return app

          # ✅ Migration commands
          """
          # Initialize migrations
          flask db init

          # Generate migration after model changes
          flask db migrate -m "Add user email verified field"

          # Apply migrations
          flask db upgrade

          # Rollback last migration
          flask db downgrade

          # Show migration history
          flask db history
          """

          # ✅ Custom migration with data
          # migrations/versions/xxx_add_slug.py
          """
          def upgrade():
              # Add column
              op.add_column('articles', sa.Column('slug', sa.String(200)))

              # Populate data
              connection = op.get_bind()
              articles = connection.execute(text('SELECT id, title FROM articles'))
              for article in articles:
                  slug = slugify(article.title)
                  connection.execute(
                      text('UPDATE articles SET slug = :slug WHERE id = :id'),
                      {'slug': slug, 'id': article.id}
                  )

              # Make non-nullable and add index
              op.alter_column('articles', 'slug', nullable=False)
              op.create_index('ix_articles_slug', 'articles', ['slug'], unique=True)

          def downgrade():
              op.drop_index('ix_articles_slug', 'articles')
              op.drop_column('articles', 'slug')
          """
      bad_examples:
        - |
          # ❌ Manual schema changes
          db.create_all()  # Doesn't track changes!

          # ❌ Direct SQL without migrations
          cursor.execute('ALTER TABLE users ADD COLUMN phone VARCHAR(20)')
      references:
        - 'https://flask-migrate.readthedocs.io/'
      tags:
        - migrations
        - alembic
        - database

  - id: FLASK014
    title: 'Implement Query Scopes'
    category: patterns
    level: intermediate
    priority: medium
    applicability:
      frameworks:
        - flask
    content:
      description: |
        Create query scopes as class methods or custom query classes
        for reusable, chainable queries.
      rationale: |
        Query scopes encapsulate common query logic, making code
        DRY and more readable.
      good_examples:
        - |
          # ✅ Query scopes with custom query class
          from flask_sqlalchemy import BaseQuery

          class ArticleQuery(BaseQuery):
              """Custom query class for Article."""

              def published(self):
                  return self.filter(Article.status == 'published')

              def by_author(self, user):
                  return self.filter(Article.author_id == user.id)

              def recent(self, days=7):
                  cutoff = datetime.utcnow() - timedelta(days=days)
                  return self.filter(Article.created_at >= cutoff)

              def search(self, query):
                  return self.filter(
                      db.or_(
                          Article.title.ilike(f'%{query}%'),
                          Article.content.ilike(f'%{query}%'),
                      )
                  )

          class Article(db.Model):
              query_class = ArticleQuery

              id = db.Column(db.Integer, primary_key=True)
              title = db.Column(db.String(200), nullable=False)
              content = db.Column(db.Text)
              status = db.Column(db.String(20), default='draft')
              author_id = db.Column(db.Integer, db.ForeignKey('users.id'))
              created_at = db.Column(db.DateTime, default=datetime.utcnow)

          # ✅ Usage with chaining
          articles = (
              Article.query
              .published()
              .by_author(current_user)
              .recent(30)
              .order_by(Article.created_at.desc())
              .paginate(page=1, per_page=10)
          )

          # ✅ Alternative: class methods
          class User(db.Model):
              @classmethod
              def find_by_email(cls, email):
                  return cls.query.filter_by(email=email.lower()).first()

              @classmethod
              def active_users(cls):
                  return cls.query.filter_by(is_active=True)
      bad_examples:
        - |
          # ❌ Repeated query logic
          # In view 1:
          articles = Article.query.filter(
              Article.status == 'published',
              Article.created_at >= cutoff
          ).all()

          # In view 2: (same query repeated)
          articles = Article.query.filter(
              Article.status == 'published',
              Article.created_at >= cutoff
          ).all()
      tags:
        - query-scopes
        - patterns
        - database

