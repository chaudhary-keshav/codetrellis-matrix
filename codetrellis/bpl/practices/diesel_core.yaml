# Diesel Best Practices for CodeTrellis BPL v1.0
# Part of CodeTrellis v5.4 - Rust Framework Support
# Practice IDs: DIESEL001-DIESEL010
# Category: diesel
# Frameworks: diesel

practices:
  - id: DIESEL001
    title: "Use diesel_migrations for schema management"
    description: "Use diesel_migrations crate with embed_migrations! macro for embedded migrations. Run migrations on app startup for production safety."
    category: "database"
    severity: "critical"
    applicability:
      frameworks: ["diesel"]
    tags: ["diesel", "migrations", "schema"]

  - id: DIESEL002
    title: "Separate schema types from domain models"
    description: "Define Queryable/Insertable structs separate from domain models. Use From/Into conversions between database types and business types."
    category: "architecture"
    severity: "recommended"
    applicability:
      frameworks: ["diesel"]
    tags: ["diesel", "models", "separation"]

  - id: DIESEL003
    title: "Use connection pooling with r2d2 or deadpool"
    description: "Never create raw database connections per request. Use r2d2 (sync) or deadpool-diesel (async) connection pools for production."
    category: "performance"
    severity: "critical"
    applicability:
      frameworks: ["diesel"]
    tags: ["diesel", "pooling", "r2d2"]

  - id: DIESEL004
    title: "Use AsChangeset for partial updates"
    description: "Derive AsChangeset on update structs with Option<T> fields. Only non-None fields are included in the UPDATE statement."
    category: "database"
    severity: "recommended"
    applicability:
      frameworks: ["diesel"]
    tags: ["diesel", "update", "changeset"]

  - id: DIESEL005
    title: "Use transactions for multi-step operations"
    description: "Wrap related database operations in conn.transaction(|conn| { ... }). Diesel transactions automatically rollback on error."
    category: "database"
    severity: "critical"
    applicability:
      frameworks: ["diesel"]
    tags: ["diesel", "transactions", "safety"]

  - id: DIESEL006
    title: "Let diesel CLI manage schema.rs"
    description: "Run 'diesel print-schema > src/schema.rs' or use diesel.toml's print_schema settings. Never hand-edit schema.rs generated by the table! macro."
    category: "convention"
    severity: "critical"
    applicability:
      frameworks: ["diesel"]
    tags: ["diesel", "schema", "cli"]

  - id: DIESEL007
    title: "Use .select() to limit returned columns"
    description: "Use .select() to return only needed columns instead of loading all columns. This reduces data transfer and improves query performance."
    category: "performance"
    severity: "recommended"
    applicability:
      frameworks: ["diesel"]
    tags: ["diesel", "query", "select"]

  - id: DIESEL008
    title: "Use BoxableExpression for dynamic queries"
    description: "Use .into_boxed() for conditionally built queries (dynamic filters, optional sorts). This erases the query type for runtime flexibility."
    category: "api_design"
    severity: "recommended"
    applicability:
      frameworks: ["diesel"]
    tags: ["diesel", "query", "dynamic"]

  - id: DIESEL009
    title: "Use belonging_to for association queries"
    description: "Use Diesel's belonging_to() and grouped_by() for efficient association loading instead of N+1 manual queries."
    category: "database"
    severity: "recommended"
    applicability:
      frameworks: ["diesel"]
    tags: ["diesel", "associations", "relations"]

  - id: DIESEL010
    title: "Define custom SQL types for Postgres enums"
    description: "Map Postgres custom types (enums, composites) using #[derive(SqlType)] and DbEnum. Register types in diesel.toml for schema generation."
    category: "database"
    severity: "recommended"
    applicability:
      frameworks: ["diesel"]
    tags: ["diesel", "custom-types", "postgres"]
