      var order = await service.GetOrderAsync(1);
      order.Should().NotBeNull();
      order.Id.Should().Be(1);
      order.Items.Should().HaveCount(3)
          .And.OnlyContain(i => i.Price > 0);

  # ── Security ────────────────────────────────────────────────────

  - id: CS041
    title: "Use data protection API for sensitive data"
    description: "Use IDataProtector for encrypting sensitive data at rest. Use purpose strings for key isolation between features."
    category: "security"
    severity: "critical"
    applicability:
      frameworks: ["aspnet_core"]
    tags: ["aspnet", "security", "encryption"]
    example: |
      public class TokenService(IDataProtectionProvider provider)
      {
          private readonly IDataProtector _protector =
              provider.CreateProtector("TokenService.v1");
          public string Protect(string token) => _protector.Protect(token);
          public string Unprotect(string token) => _protector.Unprotect(token);
      }

  - id: CS042
    title: "Use policy-based authorization"
    description: "Define authorization policies with requirements and handlers. Prefer policies over role-based [Authorize(Roles)] for flexible, testable authorization."
    category: "security"
    severity: "recommended"
    applicability:
      frameworks: ["aspnet_core"]
    tags: ["aspnet", "security", "authorization"]
    example: |
      // Policy registration
      builder.Services.AddAuthorization(o =>
      {
          o.AddPolicy("OrderOwner", p =>
              p.AddRequirements(new OrderOwnerRequirement()));
      });
      // Requirement handler
      public class OrderOwnerHandler(AppDbContext context)
          : AuthorizationHandler<OrderOwnerRequirement, Order>
      {
          protected override async Task HandleRequirementAsync(
              AuthorizationHandlerContext ctx,
              OrderOwnerRequirement req, Order order)
          {
              var userId = ctx.User.FindFirst(ClaimTypes.NameIdentifier)?.Value;
              if (order.BuyerId.ToString() == userId)
                  ctx.Succeed(req);
          }
      }

  - id: CS043
    title: "Validate all input with FluentValidation"
    description: "Use FluentValidation for complex input validation. Register validators in DI and use them in pipeline behaviors or endpoint filters."
    category: "security"
    severity: "critical"
    applicability:
      frameworks: ["aspnet_core", "csharp"]
    tags: ["csharp", "validation", "fluent-validation", "security"]
    example: |
      public class CreateOrderValidator : AbstractValidator<CreateOrderCommand>
      {
          public CreateOrderValidator()
          {
              RuleFor(x => x.Description).NotEmpty().MaximumLength(200);
              RuleFor(x => x.Items).NotEmpty();
              RuleForEach(x => x.Items).ChildRules(item =>
              {
                  item.RuleFor(i => i.Quantity).GreaterThan(0);
                  item.RuleFor(i => i.Price).GreaterThan(0);
              });
          }
      }

  # ── Performance & Observability ─────────────────────────────────

  - id: CS044
    title: "Use Span<T> and Memory<T> for zero-allocation parsing"
    description: "Use Span<T> and ReadOnlySpan<T> for string slicing, binary parsing, and buffer manipulation without allocations. Use stackalloc for small fixed-size buffers."
    category: "performance"
    severity: "recommended"
    applicability:
      frameworks: ["csharp"]
    tags: ["csharp", "performance", "span", "memory"]
    example: |
      // Good: zero-allocation string parsing
      public static (ReadOnlySpan<char> Key, ReadOnlySpan<char> Value) ParseHeader(
          ReadOnlySpan<char> header)
      {
          var idx = header.IndexOf(':');
          return (header[..idx].Trim(), header[(idx + 1)..].Trim());
      }

  - id: CS045
    title: "Use OpenTelemetry for distributed tracing"
    description: "Instrument services with OpenTelemetry for traces, metrics, and logs. Use Activity for custom spans. Export to Jaeger, Zipkin, or OTLP."
    category: "devops"
    severity: "recommended"
    applicability:
      frameworks: ["aspnet_core", "csharp"]
    tags: ["csharp", "observability", "tracing", "opentelemetry"]
    example: |
      builder.Services.AddOpenTelemetry()
          .WithTracing(t => t
              .AddAspNetCoreInstrumentation()
              .AddHttpClientInstrumentation()
              .AddEntityFrameworkCoreInstrumentation()
              .AddSource("MyApp")
              .AddOtlpExporter())
          .WithMetrics(m => m
              .AddAspNetCoreInstrumentation()
              .AddRuntimeInstrumentation()
              .AddOtlpExporter());

  - id: CS046
    title: "Use structured logging with Serilog or built-in ILogger"
    description: "Use structured logging with named parameters (not string interpolation). Configure log levels per namespace. Use scopes for correlation."
    category: "devops"
    severity: "recommended"
    applicability:
      frameworks: ["aspnet_core", "csharp"]
    tags: ["csharp", "logging", "structured-logging"]
    example: |
      // Good: structured parameters
      _logger.LogInformation("Order {OrderId} created for {BuyerId} with {ItemCount} items",
          order.Id, order.BuyerId, order.Items.Count);
      // Good: log scope
      using (_logger.BeginScope(new Dictionary<string, object>
          { ["OrderId"] = orderId, ["CorrelationId"] = correlationId }))
      {
          await ProcessOrderAsync(orderId);
      }

