          [CascadingParameter] public Theme Theme { get; set; } = default!;
      }

  - id: CS048
    title: "Use virtualization for large lists in Blazor"
    description: "Use <Virtualize> component for rendering large lists efficiently. Only renders visible items, dramatically reducing DOM size."
    category: "performance"
    severity: "recommended"
    applicability:
      frameworks: ["blazor"]
    tags: ["blazor", "performance", "virtualization"]
    example: |
      <Virtualize Items="@orders" Context="order" ItemSize="50">
          <ItemContent>
              <div class="order-row">@order.Id — @order.Description</div>
          </ItemContent>
          <Placeholder>
              <div class="loading-row">Loading...</div>
          </Placeholder>
      </Virtualize>

