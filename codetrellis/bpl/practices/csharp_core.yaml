      }

  - id: CS039
    title: "Use NSubstitute or Moq for unit test mocking"
    description: "Use NSubstitute (preferred) or Moq for creating test doubles. Mock at interface boundaries, not concrete classes."
    category: "testing"
    severity: "recommended"
    applicability:
      frameworks: ["csharp"]
    tags: ["csharp", "testing", "mocking"]
    example: |
      // NSubstitute
      var repo = Substitute.For<IOrderRepository>();
      repo.GetByIdAsync(1, Arg.Any<CancellationToken>())
          .Returns(new Order { Id = 1, Description = "Test" });
      var svc = new OrderService(repo);
      var result = await svc.GetOrderAsync(1);
      Assert.Equal("Test", result.Description);
      await repo.Received(1).GetByIdAsync(1, Arg.Any<CancellationToken>());

  - id: CS040
    title: "Use FluentAssertions for readable test assertions"
    description: "Use FluentAssertions for expressive, readable test assertions. Chain assertions for complex object validation."
    category: "testing"
    severity: "recommended"
    applicability:
      frameworks: ["csharp"]
    tags: ["csharp", "testing", "assertions"]
