  - id: CS049
    title: "Use collection expressions (C# 12+)"
    description: "Use collection expressions ([]) and spread operator (..) for concise collection initialization. Works with arrays, lists, spans, and custom collection types."
    category: "best_practices"
    severity: "recommended"
    applicability:
      frameworks: ["csharp"]
    tags: ["csharp", "collections", "csharp12"]
