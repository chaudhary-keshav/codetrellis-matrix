  - id: CS047
    title: "Use CascadingValue for shared state in Blazor"
    description: "Use CascadingValue/CascadingParameter for deeply nested state like theme, user info, and settings. Prefer fixed values for performance."
    category: "best_practices"
    severity: "recommended"
