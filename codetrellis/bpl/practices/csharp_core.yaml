      public class DatabaseFixture : IAsyncLifetime
      {
          private readonly PostgreSqlContainer _postgres = new PostgreSqlBuilder()
              .WithImage("postgres:16-alpine").Build();
          public string ConnectionString => _postgres.GetConnectionString();
          public Task InitializeAsync() => _postgres.StartAsync();
          public Task DisposeAsync() => _postgres.DisposeAsync().AsTask();
      }

  - id: CS038
    title: "Use Verify for snapshot testing"
    description: "Use Verify for snapshot testing of complex objects, API responses, and serialization output. Reduces assertion boilerplate for large object graphs."
    category: "testing"
    severity: "recommended"
    applicability:
      frameworks: ["csharp"]
    tags: ["csharp", "testing", "snapshots"]
    example: |
