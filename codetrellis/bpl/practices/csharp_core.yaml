  - id: CS050
    title: "Use source generators instead of runtime reflection"
    description: "Prefer compile-time source generators over runtime reflection for serialization, validation, and DI. System.Text.Json source generation eliminates reflection-based serialization overhead."
    category: "performance"
    severity: "recommended"
    applicability:
      frameworks: ["csharp"]
    tags: ["csharp", "source-generators", "performance", "aot"]
    example: |
      // Good: JSON source generation
      [JsonSerializable(typeof(OrderDto))]
      [JsonSerializable(typeof(List<OrderDto>))]
      internal partial class AppJsonContext : JsonSerializerContext { }
      // Usage
      builder.Services.ConfigureHttpJsonOptions(o =>
          o.SerializerOptions.TypeInfoResolverChain.Insert(0, AppJsonContext.Default));
