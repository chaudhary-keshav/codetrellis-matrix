  # ============================================================================

  - id: REMIX046
    title: "Use strict TypeScript types for loader and action args"
    description: "Always type loader and action function arguments. Use LoaderFunctionArgs/ActionFunctionArgs from @remix-run/node or Route types in React Router v7."
    category: "remix_typescript"
    severity: "critical"
    applicability:
      frameworks: ["remix"]
    tags: ["remix", "typescript", "type-safety", "loader-types"]
    example: |
      import type { LoaderFunctionArgs, ActionFunctionArgs } from '@remix-run/node';
      // Or in React Router v7:
      import type { Route } from './+types/my-route';
      export async function loader({ request, params, context }: Route.LoaderArgs) { ... }

  - id: REMIX047
    title: "Use environment variables safely with process.env"
    description: "Access environment variables only in server code (loaders, actions, entry.server). Never expose secrets to client bundles. Use a shared env.server.ts module for validation."
    category: "remix_patterns"
    severity: "critical"
    applicability:
      frameworks: ["remix"]
    tags: ["remix", "env-vars", "security", "server-only"]
    example: |
      // app/env.server.ts
      import { z } from 'zod';
      const envSchema = z.object({
        DATABASE_URL: z.string().url(),
        SESSION_SECRET: z.string().min(32),
        STRIPE_SECRET_KEY: z.string().startsWith('sk_'),
      });
      export const env = envSchema.parse(process.env);

  - id: REMIX048
    title: "Organize utility modules in app/utils or app/lib"
    description: "Keep shared utilities, database clients, session helpers, and validation schemas in app/utils/ or app/lib/. Use .server.ts suffix for server-only modules."
    category: "remix_patterns"
    severity: "important"
    applicability:
      frameworks: ["remix"]
    tags: ["remix", "project-structure", "organization", "conventions"]
    example: |
      # Recommended structure:
      # app/
      #   routes/           - Route modules
      #   components/        - Shared React components
      #   utils/
      #     db.server.ts     - Database client (server-only)
      #     session.server.ts - Session management (server-only)
      #     env.server.ts    - Environment validation (server-only)
      #     validation.ts    - Shared Zod schemas
      #   styles/            - CSS files

  - id: REMIX049
    title: "Use .server.ts suffix for server-only modules"
    description: "Suffix files with .server.ts to ensure they are never bundled into client code. Remix enforces this boundary, preventing accidental secret leakage."
    category: "remix_patterns"
    severity: "critical"
    applicability:
      frameworks: ["remix"]
    tags: ["remix", "server-only", "security", "bundling"]
    example: |
      // app/utils/db.server.ts - ONLY available in loaders/actions
      import { PrismaClient } from '@prisma/client';
      export const db = new PrismaClient();

      // app/utils/auth.server.ts
      import { createCookieSessionStorage } from '@remix-run/node';
      export const { getSession, commitSession } = createCookieSessionStorage({ ... });

  - id: REMIX050
    title: "Test loaders and actions with createRemixStub or integration tests"
    description: "Use createRemixStub for unit testing routes with loaders/actions. Use Playwright or Cypress for end-to-end testing of full page interactions and form submissions."
    category: "remix_patterns"
    severity: "important"
    applicability:
      frameworks: ["remix"]
    tags: ["remix", "testing", "createRemixStub", "e2e"]
    example: |
      import { createRemixStub } from '@remix-run/testing';
      import { render, screen } from '@testing-library/react';

      test('renders user profile', async () => {
        const RemixStub = createRemixStub([
          {
            path: '/user/:id',
            Component: UserProfile,
            loader: () => ({ user: { name: 'Alice' } }),
          },
        ]);
        render(<RemixStub initialEntries={['/user/1']} />);
        expect(await screen.findByText('Alice')).toBeInTheDocument();
      });
