      frameworks: ["jotai", "react"]
    tags: ["jotai", "migration", "incremental", "useState", "redux"]
    example: |
      // Step 1: Identify prop-drilled state
      // Step 2: Create atom: const themeAtom = atom('light');
      // Step 3: Replace prop drilling with useAtomValue(themeAtom)
      // Step 4: Remove context providers for migrated state
