  - id: LEAFLET031
    title: "Use the style function for dynamic GeoJSON styling"
    description: "Pass a style function to L.geoJSON that receives each feature and returns style options. This enables choropleth maps and data-driven styling. For Mapbox GL, use data-driven expressions."
    category: "leaflet_geojson"
    severity: "warning"
    applicability:
      frameworks: ["leaflet", "react-leaflet", "mapbox-gl"]
    tags: ["leaflet", "geojson", "styling", "choropleth", "data-driven"]
    example: |
      // ✅ Choropleth styling function
      function getColor(density) {
        return density > 1000 ? '#800026' :
               density > 500  ? '#BD0026' :
               density > 200  ? '#E31A1C' :
               density > 100  ? '#FC4E2A' :
               density > 50   ? '#FD8D3C' :
               density > 20   ? '#FEB24C' :
               density > 10   ? '#FED976' : '#FFEDA0';
      }

      L.geoJSON(geojsonData, {
        style: (feature) => ({
          fillColor: getColor(feature.properties.density),
          weight: 2,
          opacity: 1,
          color: 'white',
          fillOpacity: 0.7,
        }),
      }).addTo(map);

  - id: LEAFLET032
    title: "Use pointToLayer for custom GeoJSON point rendering"
    description: "The pointToLayer option lets you control how GeoJSON points are rendered. Return L.marker, L.circleMarker, or L.divIcon for custom point visualizations instead of default markers."
    category: "leaflet_geojson"
    severity: "info"
