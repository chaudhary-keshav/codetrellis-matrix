  # ============================================================================
  # EVENTS (LEAFLET026-LEAFLET030)
  # ============================================================================

  - id: LEAFLET026
    title: "Use proper event delegation for GeoJSON layers"
    description: "Use onEachFeature to bind events to individual GeoJSON features rather than the GeoJSON layer. This gives access to feature properties and individual layer references. Handle click, mouseover, mouseout events."
    category: "leaflet_events"
    severity: "warning"
    applicability:
      frameworks: ["leaflet", "react-leaflet"]
    tags: ["leaflet", "events", "geojson", "delegation", "features"]
    example: |
      // ✅ Event delegation via onEachFeature
      L.geoJSON(geojsonData, {
        onEachFeature: (feature, layer) => {
          layer.on({
            click: (e) => showDetails(feature.properties),
            mouseover: (e) => highlightFeature(e),
            mouseout: (e) => resetHighlight(e),
          });
          layer.bindPopup(feature.properties.name);
        },
      }).addTo(map);

      function highlightFeature(e) {
        const layer = e.target;
        layer.setStyle({ weight: 3, color: '#666', fillOpacity: 0.7 });
        layer.bringToFront();
      }

  - id: LEAFLET027
    title: "Remove event listeners when cleaning up"
    description: "Always remove event listeners when removing layers or destroying the map. Use off() to unbind specific events or all events. Memory leaks occur when listeners persist after layer removal."
    category: "leaflet_events"
    severity: "warning"
    applicability:
      frameworks: ["leaflet", "react-leaflet", "mapbox-gl"]
    tags: ["leaflet", "events", "cleanup", "memory-leak", "lifecycle"]
    example: |
      // ✅ Remove specific listener
      function onClick(e) { /* handler */ }
      map.on('click', onClick);
      // Later:
      map.off('click', onClick);

      // ✅ React cleanup
      useEffect(() => {
        map.on('moveend', handleMoveEnd);
        return () => map.off('moveend', handleMoveEnd);
      }, [map]);

      // ✅ Mapbox GL cleanup
      map.on('click', 'layer-id', handleClick);
      // Later:
      map.off('click', 'layer-id', handleClick);

  - id: LEAFLET028
    title: "Debounce moveend and zoomend events for data loading"
    description: "The moveend and zoomend events fire frequently during map interaction. Debounce these when they trigger data fetching to avoid excessive API calls. Use a reasonable delay (200-500ms)."
    category: "leaflet_events"
    severity: "warning"
    applicability:
      frameworks: ["leaflet", "react-leaflet", "mapbox-gl", "maplibre-gl"]
    tags: ["leaflet", "events", "debounce", "performance", "data-loading"]
    example: |
      // ✅ Debounced data loading on map move
      import { debounce } from 'lodash';

      const loadData = debounce(() => {
        const bounds = map.getBounds();
        fetchPointsInBounds(bounds).then(addToMap);
      }, 300);

      map.on('moveend', loadData);

      // ✅ React hook pattern
      useEffect(() => {
        const handler = debounce(() => {
          const bounds = map.getBounds();
          fetchData(bounds);
        }, 300);
        map.on('moveend', handler);
        return () => map.off('moveend', handler);
      }, [map]);

  - id: LEAFLET029
    title: "Prevent event propagation through overlapping elements"
    description: "Use L.DomEvent.disableClickPropagation() and L.DomEvent.disableScrollPropagation() on custom controls and overlays to prevent map interactions when clicking on UI elements above the map."
    category: "leaflet_events"
    severity: "info"
    applicability:
      frameworks: ["leaflet", "react-leaflet"]
    tags: ["leaflet", "events", "propagation", "controls", "overlay"]
    example: |
      // ✅ Prevent clicks through control panel
      const panel = document.getElementById('sidebar');
      L.DomEvent.disableClickPropagation(panel);
      L.DomEvent.disableScrollPropagation(panel);

      // ✅ In a custom control
      onAdd(map) {
        const div = L.DomUtil.create('div', 'my-control');
        L.DomEvent.disableClickPropagation(div);
        L.DomEvent.disableScrollPropagation(div);
        return div;
      }

  - id: LEAFLET030
    title: "Use Leaflet's built-in event types for consistent handling"
    description: "Use Leaflet's documented event types (click, dblclick, mouseover, mouseout, moveend, zoomend, etc.) for consistent cross-browser behavior. Leaflet normalizes touch and mouse events."
    category: "leaflet_events"
    severity: "info"
    applicability:
      frameworks: ["leaflet", "react-leaflet"]
    tags: ["leaflet", "events", "types", "cross-browser", "touch"]
    example: |
