# Leaflet/Mapbox Core Best Practices for CodeTrellis BPL v1.0
# Part of CodeTrellis v4.75 - Leaflet/Mapbox Mapping Framework Support
# Practice IDs: LEAFLET001-LEAFLET050
# Coverage: Maps, Layers, Markers, Controls, Popups, Events,
#           GeoJSON, Plugins, Performance, Ecosystem
# Versions: Leaflet v0.7-v1.9+, Mapbox GL JS v1-v3+, MapLibre GL JS,
#           React-Leaflet, Vue-Leaflet, react-map-gl, deck.gl

practices:
  # ============================================================================
  # MAPS (LEAFLET001-LEAFLET005)
  # ============================================================================

  - id: LEAFLET001
    title: "Always set initial view with center and zoom level"
    description: "Every Leaflet map requires an initial view. Use setView() with center coordinates [lat, lng] and zoom level, or pass center/zoom in the map options. Without an initial view, the map renders as a grey box. Mapbox GL uses center [lng, lat] (reversed order)."
    category: "leaflet_maps"
    severity: "error"
    applicability:
      frameworks: ["leaflet", "react-leaflet", "mapbox-gl", "maplibre-gl"]
    tags: ["leaflet", "map", "initialization", "center", "zoom", "setup"]
    example: |
      // ✅ Leaflet: set initial view
      const map = L.map('map').setView([51.505, -0.09], 13);

      // ✅ Leaflet: options object
      const map = L.map('map', { center: [51.505, -0.09], zoom: 13 });

      // ✅ React-Leaflet
      <MapContainer center={[51.505, -0.09]} zoom={13}>
        <TileLayer url="https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png" />
      </MapContainer>

      // ✅ Mapbox GL (note: [lng, lat] order)
      const map = new mapboxgl.Map({
        container: 'map',
        center: [-0.09, 51.505],
        zoom: 13,
      });

      // ❌ No initial view set
      const map = L.map('map');  // Grey box!

  - id: LEAFLET002
    title: "Add a tile layer immediately after map creation"
    description: "A map without a tile layer shows empty grey tiles. Always add a tile layer (OSM, Mapbox, etc.) immediately after creating the map. Include proper attribution as required by tile providers' terms of service."
    category: "leaflet_maps"
    severity: "warning"
    applicability:
      frameworks: ["leaflet", "react-leaflet"]
    tags: ["leaflet", "tiles", "layer", "osm", "attribution", "setup"]
    example: |
      // ✅ Add OpenStreetMap tiles with attribution
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
        maxZoom: 19,
      }).addTo(map);

      // ✅ React-Leaflet
      <MapContainer center={center} zoom={13}>
        <TileLayer
          url="https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png"
          attribution='&copy; OpenStreetMap contributors'
        />
      </MapContainer>

      // ❌ No tile layer - map shows grey squares
      const map = L.map('map').setView([51.505, -0.09], 13);
      // Missing L.tileLayer(...)

  - id: LEAFLET003
    title: "Use appropriate CRS for your projection needs"
    description: "Leaflet defaults to EPSG:3857 (Web Mercator). Use L.CRS.EPSG4326 for geographic coordinates, L.CRS.Simple for flat images/game maps. For custom projections use proj4leaflet. Mapbox GL only supports Mercator."
    category: "leaflet_maps"
    severity: "info"
    applicability:
      frameworks: ["leaflet", "react-leaflet"]
    tags: ["leaflet", "crs", "projection", "coordinate-system", "advanced"]
    example: |
      // ✅ Custom CRS for WMS layers in national grid
      import 'proj4leaflet';
      const crs = new L.Proj.CRS('EPSG:27700', '+proj=tmerc ...', {
        resolutions: [896, 448, 224, 112, 56, 28, 14, 7, 3.5],
      });
      const map = L.map('map', { crs: crs });

      // ✅ Simple CRS for non-geographic images
      const map = L.map('map', {
        crs: L.CRS.Simple,
        minZoom: -5,
      });

  - id: LEAFLET004
    title: "Set maxBounds to restrict map panning area"
    description: "Use maxBounds to restrict the viewable area. This prevents users from panning outside your area of interest. Combine with minZoom and maxZoom for complete viewport control."
    category: "leaflet_maps"
    severity: "info"
    applicability:
      frameworks: ["leaflet", "react-leaflet", "mapbox-gl", "maplibre-gl"]
    tags: ["leaflet", "bounds", "panning", "viewport", "restriction"]
    example: |
      // ✅ Restrict to specific bounds
      const bounds = L.latLngBounds(
        L.latLng(49.5, -11.0),  // SW corner
        L.latLng(61.0, 2.0)     // NE corner
      );
      const map = L.map('map', {
        maxBounds: bounds,
        maxBoundsViscosity: 1.0,
        minZoom: 5,
        maxZoom: 18,
      });

      // ✅ Mapbox GL equivalent
      map.setMaxBounds([[-11.0, 49.5], [2.0, 61.0]]);

  - id: LEAFLET005
    title: "Properly size the map container with CSS"
    description: "The map container must have explicit width and height set via CSS. Without dimensions, the map renders as 0x0 pixels. Use 100vh for full-screen maps, or set explicit pixel/percentage dimensions. Call invalidateSize() if the container changes size dynamically."
    category: "leaflet_maps"
    severity: "error"
    applicability:
      frameworks: ["leaflet", "react-leaflet", "mapbox-gl", "maplibre-gl"]
    tags: ["leaflet", "container", "css", "sizing", "layout", "render"]
    example: |
      /* ✅ Explicit height */
      #map { height: 400px; width: 100%; }

      /* ✅ Full-screen map */
      #map { height: 100vh; width: 100vw; }

      // ✅ Resize handler
      window.addEventListener('resize', () => map.invalidateSize());

      // ✅ After showing a hidden map
      document.querySelector('.tab').addEventListener('shown', () => {
        map.invalidateSize();
      });

      /* ❌ No height - map invisible */
      #map { width: 100%; }

  # ============================================================================
  # LAYERS (LEAFLET006-LEAFLET010)
  # ============================================================================

  - id: LEAFLET006
    title: "Use layer groups and feature groups for organized layer management"
    description: "Group related layers using L.layerGroup or L.featureGroup. FeatureGroup extends LayerGroup with getBounds() and event propagation. Use layer groups with L.control.layers for toggle functionality."
    category: "leaflet_layers"
    severity: "warning"
    applicability:
      frameworks: ["leaflet", "react-leaflet"]
    tags: ["leaflet", "layers", "groups", "organization", "toggle"]
    example: |
      // ✅ Organized layer groups with control
      const restaurants = L.layerGroup([marker1, marker2]);
      const parks = L.layerGroup([marker3, marker4]);

      L.control.layers(
        { 'OSM': osmLayer, 'Satellite': satLayer },  // base layers
        { 'Restaurants': restaurants, 'Parks': parks }  // overlays
      ).addTo(map);

      // ✅ FeatureGroup for fitBounds
      const group = L.featureGroup([marker1, marker2, polygon]);
      map.fitBounds(group.getBounds().pad(0.1));

  - id: LEAFLET007
    title: "Use vector tiles and WebGL rendering for large datasets"
    description: "For datasets with thousands of features, use Mapbox GL's vector tiles instead of Leaflet's SVG/Canvas rendering. Alternatively, use Leaflet plugins like leaflet-mapbox-gl or L.canvas for better performance. Mapbox GL renders using WebGL natively."
    category: "leaflet_layers"
    severity: "info"
    applicability:
      frameworks: ["leaflet", "mapbox-gl", "maplibre-gl"]
    tags: ["leaflet", "performance", "vector-tiles", "webgl", "large-data"]
    example: |
      // ✅ Mapbox GL with vector tiles
      map.addSource('points', {
        type: 'vector',
        url: 'mapbox://mapbox.mapbox-streets-v8',
      });
      map.addLayer({
        id: 'points-layer',
        type: 'circle',
        source: 'points',
        'source-layer': 'poi_label',
      });

      // ✅ Leaflet Canvas renderer for better perf
      const map = L.map('map', { renderer: L.canvas() });

  - id: LEAFLET008
    title: "Set appropriate z-index for layer ordering"
    description: "Control layer stacking order using pane z-index or layer options. Create custom panes for fine-grained z-index control. Default panes: tile (200), overlay (400), shadow (500), marker (600), tooltip (650), popup (700)."
    category: "leaflet_layers"
    severity: "info"
    applicability:
      frameworks: ["leaflet", "react-leaflet"]
    tags: ["leaflet", "z-index", "panes", "ordering", "stacking"]
    example: |
      // ✅ Custom pane for labels above markers
      map.createPane('labels');
      map.getPane('labels').style.zIndex = 650;
      L.tileLayer('https://{s}.tiles.example.com/labels/{z}/{x}/{y}.png', {
        pane: 'labels',
      }).addTo(map);

      // ✅ Custom pane in React-Leaflet
      <Pane name="custom" style={{ zIndex: 500 }}>
        <GeoJSON data={data} />
      </Pane>

  - id: LEAFLET009
    title: "Handle tile loading errors and fallback gracefully"
    description: "Add error handling for tile loading failures. Provide fallback tile layers or show user-friendly error messages. Handle network issues, expired API tokens, and rate limiting."
    category: "leaflet_layers"
    severity: "warning"
    applicability:
      frameworks: ["leaflet", "react-leaflet", "mapbox-gl"]
    tags: ["leaflet", "tiles", "error-handling", "fallback", "network"]
    example: |
      // ✅ Tile error handling with fallback
      const primary = L.tileLayer('https://api.mapbox.com/...', {
        errorTileUrl: '/images/tile-error.png',
      });

      primary.on('tileerror', (error) => {
        console.warn('Tile load failed, switching to OSM');
        primary.remove();
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
          .addTo(map);
      });

      // ✅ Mapbox GL error handling
      map.on('error', (e) => {
        if (e.error?.status === 401) {
          console.error('Invalid Mapbox token');
        }
      });

  - id: LEAFLET010
    title: "Remove layers properly to prevent memory leaks"
    description: "Always remove layers using remove() or removeFrom(map). Clear layer groups with clearLayers(). Don't just hide layers - remove them when no longer needed. Clean up event listeners on layer removal."
    category: "leaflet_layers"
    severity: "warning"
    applicability:
      frameworks: ["leaflet", "react-leaflet", "mapbox-gl"]
    tags: ["leaflet", "cleanup", "memory", "remove", "lifecycle"]
    example: |
      // ✅ Proper layer cleanup
      marker.remove();          // or marker.removeFrom(map);
      layerGroup.clearLayers(); // remove all children

      // ✅ React-Leaflet cleanup via component lifecycle
      useEffect(() => {
        return () => {
          layerGroup.clearLayers();
        };
      }, []);

      // ✅ Mapbox GL cleanup
      map.removeLayer('my-layer');
      map.removeSource('my-source');

  # ============================================================================
  # MARKERS (LEAFLET011-LEAFLET015)
  # ============================================================================

  - id: LEAFLET011
    title: "Use marker clustering for dense marker datasets"
    description: "When displaying hundreds or thousands of markers, use leaflet.markercluster to group nearby markers into clusters. This dramatically improves performance and usability. For Mapbox GL, use Supercluster or the built-in cluster source option."
    category: "leaflet_markers"
    severity: "warning"
    applicability:
      frameworks: ["leaflet", "react-leaflet", "mapbox-gl", "maplibre-gl"]
    tags: ["leaflet", "markers", "clustering", "performance", "markercluster"]
    example: |
      // ✅ Leaflet MarkerCluster
      import 'leaflet.markercluster';
      const markers = L.markerClusterGroup({
        chunkedLoading: true,
        maxClusterRadius: 50,
        spiderfyOnMaxZoom: true,
      });
      data.forEach(d => markers.addLayer(L.marker([d.lat, d.lng])));
      map.addLayer(markers);

      // ✅ React-Leaflet MarkerCluster
      <MarkerClusterGroup chunkedLoading>
        {points.map(p => <Marker key={p.id} position={p.latlng} />)}
      </MarkerClusterGroup>

      // ✅ Mapbox GL clustering
      map.addSource('earthquakes', {
        type: 'geojson',
        data: geojsonData,
        cluster: true,
        clusterMaxZoom: 14,
        clusterRadius: 50,
      });

  - id: LEAFLET012
    title: "Use custom icons with proper anchor points and retina support"
    description: "Create custom marker icons using L.icon or L.divIcon. Always set iconAnchor (tip of icon), popupAnchor (popup position relative to icon), and provide retina (2x) versions. Use divIcon for HTML-based markers."
    category: "leaflet_markers"
    severity: "info"
    applicability:
      frameworks: ["leaflet", "react-leaflet"]
    tags: ["leaflet", "markers", "icons", "custom", "retina", "anchor"]
    example: |
      // ✅ Custom icon with proper anchors and retina
      const customIcon = L.icon({
        iconUrl: '/icons/marker.png',
        iconRetinaUrl: '/icons/marker-2x.png',
        iconSize: [25, 41],
        iconAnchor: [12, 41],   // bottom center of icon
        popupAnchor: [1, -34],  // above the icon
        shadowUrl: '/icons/marker-shadow.png',
        shadowSize: [41, 41],
      });
      L.marker([51.5, -0.09], { icon: customIcon }).addTo(map);

      // ✅ DivIcon for HTML markers
      const divIcon = L.divIcon({
        className: 'custom-marker',
        html: '<div class="marker-pin"></div>',
        iconSize: [30, 42],
        iconAnchor: [15, 42],
      });

  - id: LEAFLET013
    title: "Optimize marker rendering with Canvas renderer"
    description: "For many simple markers (circles), use L.circleMarker with the Canvas renderer instead of SVG. Canvas rendering is significantly faster for large numbers of simple shapes. Use preferCanvas map option."
    category: "leaflet_markers"
    severity: "info"
    applicability:
      frameworks: ["leaflet"]
    tags: ["leaflet", "markers", "canvas", "performance", "rendering"]
    example: |
      // ✅ Canvas renderer for circle markers
      const map = L.map('map', { preferCanvas: true });

      data.forEach(d => {
        L.circleMarker([d.lat, d.lng], {
          radius: 5,
          fillColor: d.color,
          fillOpacity: 0.8,
          weight: 1,
        }).addTo(map);
      });

      // ✅ Explicit Canvas renderer
      const canvasRenderer = L.canvas({ padding: 0.5 });
      L.circleMarker([51.5, -0.09], {
        renderer: canvasRenderer,
        radius: 5,
      }).addTo(map);

  - id: LEAFLET014
    title: "Make markers draggable with proper event handling"
    description: "Enable marker dragging with the draggable option. Listen to dragstart, drag, and dragend events. Update your data store on dragend, not during drag (performance). Use drag constraints if needed."
    category: "leaflet_markers"
    severity: "info"
    applicability:
      frameworks: ["leaflet", "react-leaflet", "mapbox-gl"]
    tags: ["leaflet", "markers", "draggable", "events", "interaction"]
    example: |
      // ✅ Draggable marker with event handling
      const marker = L.marker([51.5, -0.09], { draggable: true });
      marker.on('dragend', (e) => {
        const pos = e.target.getLatLng();
        updatePosition(pos.lat, pos.lng);
      });

      // ✅ React-Leaflet draggable marker
      <Marker
        position={position}
        draggable
        eventHandlers={{
          dragend: (e) => setPosition(e.target.getLatLng()),
        }}
      />

  - id: LEAFLET015
    title: "Batch marker operations for better performance"
    description: "When adding many markers at once, add them to a layer group first, then add the group to the map. This triggers only one DOM update. Use chunkedLoading with MarkerCluster for gradual rendering."
    category: "leaflet_markers"
    severity: "warning"
    applicability:
      frameworks: ["leaflet", "react-leaflet"]
    tags: ["leaflet", "markers", "batch", "performance", "layer-group"]
    example: |
      // ✅ Batch add to layer group
      const group = L.layerGroup();
      for (const point of points) {
        L.marker([point.lat, point.lng]).addTo(group);
      }
      group.addTo(map);  // Single DOM update

      // ❌ Adding markers one by one to map
      for (const point of points) {
        L.marker([point.lat, point.lng]).addTo(map);  // N DOM updates
      }

  # ============================================================================
  # CONTROLS (LEAFLET016-LEAFLET020)
  # ============================================================================

  - id: LEAFLET016
    title: "Position controls appropriately using corner options"
    description: "Place controls in one of four corners: topleft, topright, bottomleft, bottomright. Avoid stacking too many controls in the same corner. Consider mobile responsiveness when placing controls."
    category: "leaflet_controls"
    severity: "info"
    applicability:
      frameworks: ["leaflet", "react-leaflet", "mapbox-gl"]
    tags: ["leaflet", "controls", "position", "layout", "ui"]
    example: |
      // ✅ Controls in different corners
      L.control.zoom({ position: 'topright' }).addTo(map);
      L.control.layers(baseLayers, overlays, { position: 'topleft' }).addTo(map);
      L.control.scale({ position: 'bottomleft' }).addTo(map);

      // ✅ Mapbox GL control positioning
      map.addControl(new mapboxgl.NavigationControl(), 'top-right');
      map.addControl(new mapboxgl.ScaleControl(), 'bottom-left');

  - id: LEAFLET017
    title: "Create custom controls by extending L.Control"
    description: "Build custom controls by extending L.Control with onAdd() and onRemove() methods. onAdd must return a DOM element. Use L.DomUtil.create for element creation and L.DomEvent to prevent map interaction through controls."
    category: "leaflet_controls"
    severity: "info"
    applicability:
      frameworks: ["leaflet", "react-leaflet"]
    tags: ["leaflet", "controls", "custom", "extend", "dom"]
    example: |
      // ✅ Custom control
      const InfoControl = L.Control.extend({
        onAdd(map) {
          const div = L.DomUtil.create('div', 'info-control');
          div.innerHTML = '<h4>Legend</h4>';
          L.DomEvent.disableClickPropagation(div);
          return div;
        },
        onRemove(map) { /* cleanup */ },
      });
      new InfoControl({ position: 'bottomright' }).addTo(map);

      // ✅ Mapbox GL custom control
      class MyControl {
        onAdd(map) {
          this._container = document.createElement('div');
          this._container.className = 'mapboxgl-ctrl';
          return this._container;
        }
        onRemove() { this._container.remove(); }
      }

  - id: LEAFLET018
    title: "Use scale control for distance reference"
    description: "Add L.control.scale() to show a distance scale bar. Set metric and imperial options based on your audience. The scale bar updates automatically as the user zooms."
    category: "leaflet_controls"
    severity: "info"
    applicability:
      frameworks: ["leaflet", "react-leaflet", "mapbox-gl"]
    tags: ["leaflet", "controls", "scale", "distance", "reference"]
    example: |
      // ✅ Scale control with options
      L.control.scale({
        maxWidth: 200,
        metric: true,
        imperial: false,
        position: 'bottomleft',
      }).addTo(map);

      // ✅ React-Leaflet
      <ScaleControl position="bottomleft" metric imperial={false} />

  - id: LEAFLET019
    title: "Implement geocoding search with proper error handling"
    description: "Use geocoding plugins (leaflet-control-geocoder, mapbox-geocoder) for address search. Handle no-results gracefully. Debounce search input. Restrict results to relevant geographic areas."
    category: "leaflet_controls"
    severity: "info"
    applicability:
      frameworks: ["leaflet", "mapbox-gl"]
    tags: ["leaflet", "geocoding", "search", "address", "control"]
    example: |
      // ✅ Leaflet geocoder control
      import 'leaflet-control-geocoder';
      L.Control.geocoder({
        defaultMarkGeocode: false,
        geocoder: L.Control.Geocoder.nominatim({
          geocodingQueryParams: { countrycodes: 'us' },
        }),
      })
      .on('markgeocode', (e) => {
        map.fitBounds(e.geocode.bbox);
      })
      .addTo(map);

      // ✅ Mapbox GL geocoder
      map.addControl(
        new MapboxGeocoder({
          accessToken: mapboxgl.accessToken,
          mapboxgl: mapboxgl,
          bbox: [-74.1, 40.6, -73.8, 40.9],  // restrict to NYC
        })
      );

  - id: LEAFLET020
    title: "Implement fullscreen control for immersive map experience"
    description: "Add fullscreen capability using leaflet-fullscreen or browser Fullscreen API. Handle the fullscreen change event to resize the map properly. Ensure controls remain accessible in fullscreen mode."
    category: "leaflet_controls"
    severity: "info"
    applicability:
      frameworks: ["leaflet", "mapbox-gl"]
    tags: ["leaflet", "controls", "fullscreen", "ui", "responsive"]
    example: |
      // ✅ Leaflet fullscreen
      import 'leaflet.fullscreen';
      const map = L.map('map', { fullscreenControl: true });

      map.on('fullscreenchange', () => {
        map.invalidateSize();
      });

      // ✅ Mapbox GL fullscreen
      map.addControl(new mapboxgl.FullscreenControl());

  # ============================================================================
  # POPUPS (LEAFLET021-LEAFLET025)
  # ============================================================================

  - id: LEAFLET021
    title: "Bind popups to layers instead of creating standalone popups"
    description: "Use the bindPopup() method to attach popups to markers and layers. This handles open/close lifecycle automatically. Use standalone L.popup only for map-level popups not tied to features."
    category: "leaflet_popups"
    severity: "warning"
    applicability:
      frameworks: ["leaflet", "react-leaflet"]
    tags: ["leaflet", "popups", "bind", "lifecycle", "interaction"]
    example: |
      // ✅ Bind popup to marker
      marker.bindPopup('<strong>Hello!</strong><br>I am a popup.').openPopup();

      // ✅ Popup with options
      marker.bindPopup(content, {
        maxWidth: 300,
        minWidth: 100,
        closeButton: true,
        autoClose: true,
        className: 'custom-popup',
      });

      // ✅ React-Leaflet
      <Marker position={pos}>
        <Popup maxWidth={300}>
          <div><h3>Title</h3><p>Content</p></div>
        </Popup>
      </Marker>

  - id: LEAFLET022
    title: "Use dynamic popup content with functions or React components"
    description: "For dynamic content, pass a function to bindPopup() that receives the layer. In React-Leaflet, use JSX children. Avoid inline HTML strings for complex popups - use templates or components."
    category: "leaflet_popups"
    severity: "info"
    applicability:
      frameworks: ["leaflet", "react-leaflet", "mapbox-gl"]
    tags: ["leaflet", "popups", "dynamic", "content", "react", "templates"]
    example: |
      // ✅ Dynamic content function
      markers.bindPopup((layer) => {
        return `<div>
          <h3>${layer.feature.properties.name}</h3>
          <p>Population: ${layer.feature.properties.pop.toLocaleString()}</p>
        </div>`;
      });

      // ✅ React-Leaflet dynamic popup
      <GeoJSON data={geojson} onEachFeature={(feature, layer) => {
        layer.bindPopup(`<strong>${feature.properties.name}</strong>`);
      }} />

      // ✅ Mapbox GL popup
      map.on('click', 'points', (e) => {
        new mapboxgl.Popup()
          .setLngLat(e.lngLat)
          .setHTML(`<h3>${e.features[0].properties.title}</h3>`)
          .addTo(map);
      });

  - id: LEAFLET023
    title: "Style popups with CSS classes instead of inline styles"
    description: "Use the className option to add custom CSS classes to popups. Override default Leaflet popup styles with your own CSS. This keeps styling consistent and maintainable."
    category: "leaflet_popups"
    severity: "info"
    applicability:
      frameworks: ["leaflet", "react-leaflet", "mapbox-gl"]
    tags: ["leaflet", "popups", "styling", "css", "className"]
    example: |
      // ✅ Custom popup class
      marker.bindPopup(content, { className: 'my-popup' });

      /* CSS */
      .my-popup .leaflet-popup-content-wrapper {
        background: #333;
        color: white;
        border-radius: 8px;
      }
      .my-popup .leaflet-popup-tip { background: #333; }

      // ✅ Mapbox GL popup styling
      new mapboxgl.Popup({ className: 'my-popup' })
        .setHTML(content)
        .addTo(map);

  - id: LEAFLET024
    title: "Handle popup events for analytics and cleanup"
    description: "Listen to popupopen and popupclose events for tracking user interactions, loading lazy content, or cleaning up resources. Use popupopen to initialize interactive elements inside popups."
    category: "leaflet_popups"
    severity: "info"
    applicability:
      frameworks: ["leaflet", "react-leaflet", "mapbox-gl"]
    tags: ["leaflet", "popups", "events", "analytics", "lifecycle"]
    example: |
      // ✅ Popup event handling
      marker.on('popupopen', (e) => {
        trackEvent('popup_opened', marker.feature.properties.id);
        // Initialize interactive elements
        e.popup.getElement().querySelector('.details-btn')
          .addEventListener('click', loadDetails);
      });

      marker.on('popupclose', (e) => {
        // Clean up any resources
        cancelPendingRequests();
      });

  - id: LEAFLET025
    title: "Use tooltips for hover information, popups for click details"
    description: "Bind tooltips for brief hover information (labels, names). Use popups for detailed click interactions. Tooltips auto-close on mouseout. Set permanent: true for always-visible labels."
    category: "leaflet_popups"
