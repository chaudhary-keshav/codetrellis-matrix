      map.on('click', (e) => console.log('Clicked at', e.latlng));
      map.on('moveend', () => console.log('Bounds:', map.getBounds()));
      map.on('zoomend', () => console.log('Zoom:', map.getZoom()));
      map.on('locationfound', (e) => L.marker(e.latlng).addTo(map));
      map.on('locationerror', (e) => alert(e.message));

      // ✅ Layer events
      marker.on('click', (e) => { /* marker clicked */ });
      polygon.on('mouseover', (e) => e.target.setStyle({ weight: 3 }));

