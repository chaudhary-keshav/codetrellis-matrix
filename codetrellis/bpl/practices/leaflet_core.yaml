        pointToLayer: (feature, latlng) => {
          return L.circleMarker(latlng, {
            radius: feature.properties.magnitude * 3,
            fillColor: getColor(feature.properties.depth),
            fillOpacity: 0.8,
            weight: 1,
          });
        },
      }).addTo(map);

      // ✅ DivIcon for custom HTML points
      L.geoJSON(data, {
        pointToLayer: (feature, latlng) => {
          return L.marker(latlng, {
