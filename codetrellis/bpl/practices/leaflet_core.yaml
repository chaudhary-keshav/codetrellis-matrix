  - id: LEAFLET049
    title: "Use TypeScript types for Leaflet and Mapbox GL"
    description: "Install @types/leaflet, @types/mapbox-gl for TypeScript support. Use proper type imports for map options, layer options, and event types. React-Leaflet and MapLibre GL include built-in types."
    category: "leaflet_ecosystem"
    severity: "info"
    applicability:
      frameworks: ["leaflet", "react-leaflet", "mapbox-gl", "maplibre-gl"]
    tags: ["leaflet", "typescript", "types", "type-safety", "dx"]
    example: |
      // ✅ TypeScript with Leaflet
      import L, { LatLngExpression, MapOptions, MarkerOptions } from 'leaflet';

      const center: LatLngExpression = [51.505, -0.09];
      const options: MapOptions = { center, zoom: 13, zoomControl: true };
      const map: L.Map = L.map('map', options);

      // ✅ TypeScript with Mapbox GL
      import mapboxgl, { Map, MapOptions, Marker } from 'mapbox-gl';

      const map: Map = new mapboxgl.Map({
        container: 'map',
        style: 'mapbox://styles/mapbox/streets-v12',
        center: [-74.5, 40],
        zoom: 9,
      } satisfies MapOptions);

  - id: LEAFLET050
    title: "Choose between Leaflet, Mapbox GL, and MapLibre GL appropriately"
    description: "Leaflet: lightweight, plugin-rich, SVG/Canvas, great for standard maps. Mapbox GL: WebGL, vector tiles, 3D terrain, custom styles (requires token). MapLibre GL: open-source Mapbox GL fork, no token required. Choose based on your rendering needs and budget."
    category: "leaflet_ecosystem"
    severity: "info"
    applicability:
      frameworks: ["leaflet", "react-leaflet", "mapbox-gl", "maplibre-gl"]
    tags: ["leaflet", "mapbox", "maplibre", "comparison", "architecture"]
    example: |
      // Leaflet: Best for standard 2D maps, plugin ecosystem
      // - 42KB gzipped, extensive plugin library
      // - SVG/Canvas rendering, great mobile support
      // - Free, open source (BSD-2)

      // Mapbox GL JS: Best for custom styles, 3D, vector tiles
      // - WebGL rendering, smooth animations
      // - Custom map styles via Mapbox Studio
      // - Requires access token, pricing per map loads

      // MapLibre GL JS: Open-source alternative to Mapbox GL
      // - Fork of Mapbox GL v1.13 (before license change)
      // - WebGL rendering, vector tiles
      // - Free, no token required, community maintained

      // React wrappers:
      // - react-leaflet → Leaflet
      // - react-map-gl → Mapbox GL / MapLibre GL
