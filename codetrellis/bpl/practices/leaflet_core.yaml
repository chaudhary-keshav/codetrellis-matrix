  - id: LEAFLET041
    title: "Use Web Workers for heavy geospatial computation"
    description: "Offload heavy geospatial operations (spatial joins, buffering, intersection) to Web Workers to keep the UI responsive. Libraries like Turf.js work well in workers."
    category: "leaflet_performance"
    severity: "info"
    applicability:
      frameworks: ["leaflet", "mapbox-gl", "maplibre-gl"]
    tags: ["leaflet", "performance", "web-workers", "computation", "turf"]
    example: |
      // ✅ Geospatial computation in Web Worker
      // worker.js
      import * as turf from '@turf/turf';
      self.onmessage = (e) => {
        const { points, polygon } = e.data;
        const within = turf.pointsWithinPolygon(points, polygon);
        self.postMessage(within);
      };

      // main.js
      const worker = new Worker('worker.js');
      worker.postMessage({ points, polygon });
      worker.onmessage = (e) => {
        L.geoJSON(e.data).addTo(map);
      };

  - id: LEAFLET042
    title: "Implement viewport-based data loading"
    description: "Only load and render data within the current map viewport. Use getBounds() to determine visible area and filter/fetch data accordingly. Remove off-screen features for memory efficiency."
    category: "leaflet_performance"
    severity: "warning"
