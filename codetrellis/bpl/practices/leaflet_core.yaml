      });

  - id: LEAFLET043
    title: "Use requestAnimationFrame for smooth map animations"
    description: "When programmatically animating the map (custom fly animations, feature transitions), use requestAnimationFrame for smooth 60fps animations instead of setTimeout/setInterval."
    category: "leaflet_performance"
    severity: "info"
    applicability:
      frameworks: ["leaflet", "mapbox-gl", "maplibre-gl"]
    tags: ["leaflet", "performance", "animation", "raf", "smooth"]
    example: |
      // ✅ Smooth custom animation
      function animateTo(targetLatLng, duration = 2000) {
        const start = performance.now();
        const startLatLng = map.getCenter();

        function step(timestamp) {
          const progress = Math.min((timestamp - start) / duration, 1);
          const eased = 1 - Math.pow(1 - progress, 3); // ease-out cubic

          const lat = startLatLng.lat + (targetLatLng.lat - startLatLng.lat) * eased;
          const lng = startLatLng.lng + (targetLatLng.lng - startLatLng.lng) * eased;

          map.setView([lat, lng], map.getZoom(), { animate: false });

          if (progress < 1) requestAnimationFrame(step);
        }
        requestAnimationFrame(step);
      }

  - id: LEAFLET044
    title: "Implement proper map cleanup on component unmount"
    description: "Always call map.remove() when the map component unmounts. This removes all event listeners, layers, and DOM elements. In React, use useEffect cleanup. This prevents memory leaks in SPAs."
    category: "leaflet_performance"
    severity: "error"
    applicability:
      frameworks: ["leaflet", "react-leaflet", "mapbox-gl", "maplibre-gl"]
    tags: ["leaflet", "performance", "cleanup", "memory-leak", "lifecycle"]
    example: |
      // ✅ React cleanup
      useEffect(() => {
        const map = L.map('map').setView([51.505, -0.09], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
          .addTo(map);

        return () => {
          map.remove();  // Cleans up everything
        };
      }, []);

      // ✅ Mapbox GL cleanup
      useEffect(() => {
        const map = new mapboxgl.Map({ container: 'map', ... });
        return () => map.remove();
      }, []);

      // ❌ No cleanup - memory leak in SPA
      useEffect(() => {
        const map = L.map('map').setView([51.505, -0.09], 13);
        // No return cleanup!
      }, []);

