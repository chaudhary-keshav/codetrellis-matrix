  - id: LEAFLET033
    title: "Use filter option to selectively display GeoJSON features"
    description: "Pass a filter function to L.geoJSON to control which features are displayed. Return true to include, false to exclude. This is more efficient than filtering the data array beforehand for large datasets."
    category: "leaflet_geojson"
    severity: "info"
    applicability:
      frameworks: ["leaflet", "react-leaflet"]
    tags: ["leaflet", "geojson", "filter", "conditional", "display"]
    example: |
      // ✅ Filter features by property
      L.geoJSON(data, {
        filter: (feature) => feature.properties.population > 100000,
        style: { color: 'blue', weight: 2 },
      }).addTo(map);

      // ✅ Dynamic filtering
      function updateFilter(minPop) {
        geoLayer.clearLayers();
        geoLayer.addData(data);
        geoLayer.eachLayer((layer) => {
          if (layer.feature.properties.population < minPop) {
            geoLayer.removeLayer(layer);
          }
        });
      }

  - id: LEAFLET034
    title: "Validate and simplify GeoJSON data before loading"
    description: "Validate GeoJSON structure before passing to L.geoJSON. Simplify complex geometries to reduce file size and improve rendering performance. Use Turf.js for spatial operations and simplification."
    category: "leaflet_geojson"
    severity: "warning"
    applicability:
      frameworks: ["leaflet", "react-leaflet", "mapbox-gl"]
    tags: ["leaflet", "geojson", "validation", "simplification", "turf"]
    example: |
      // ✅ Simplify with Turf.js
      import * as turf from '@turf/turf';
      const simplified = turf.simplify(geojson, {
        tolerance: 0.01,
        highQuality: true,
      });
      L.geoJSON(simplified).addTo(map);

      // ✅ Validate before loading
      function isValidGeoJSON(data) {
        return data && data.type &&
          ['FeatureCollection', 'Feature', 'GeometryCollection']
            .includes(data.type);
      }

  - id: LEAFLET035
    title: "Load large GeoJSON asynchronously with progress indication"
    description: "Fetch large GeoJSON files asynchronously and show loading state. Consider using TopoJSON for compressed geometry. For very large datasets, use vector tiles instead of client-side GeoJSON."
    category: "leaflet_geojson"
    severity: "warning"
    applicability:
      frameworks: ["leaflet", "react-leaflet", "mapbox-gl"]
    tags: ["leaflet", "geojson", "async", "loading", "topojson", "large-data"]
    example: |
      // ✅ Async GeoJSON loading
      async function loadGeoJSON(url) {
        const loading = L.control({ position: 'topright' });
        loading.onAdd = () => {
          const div = L.DomUtil.create('div', 'loading');
          div.textContent = 'Loading data...';
          return div;
        };
        loading.addTo(map);

        const response = await fetch(url);
        const data = await response.json();
        L.geoJSON(data).addTo(map);

        loading.remove();
      }

      // ✅ TopoJSON for smaller files
      import * as topojson from 'topojson-client';
      const geojson = topojson.feature(topoData, topoData.objects.states);
      L.geoJSON(geojson).addTo(map);

