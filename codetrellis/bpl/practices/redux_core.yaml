  - id: REDUX039
    title: "Minimize state stored in Redux"
    description: "Only store state in Redux that is truly global and needed across multiple components. Keep ephemeral UI state (form inputs, tooltips, modals) in local component state or URL params."
    category: "redux_performance"
    severity: "critical"
    applicability:
      frameworks: ["redux", "redux-toolkit"]
    tags: ["redux", "state-design", "performance"]
    example: |
      // ✅ Redux: shared across app
      // - Authentication status, user profile
      // - Server-fetched data caches
      // - Global UI state (theme, sidebar open)

      // ✅ Local state: component-specific
      // - Form input values (before submission)
      // - Dropdown open/closed
      // - Hover/focus states

  - id: REDUX040
    title: "Use shallowEqual for array/object selectors"
    description: "When a selector returns a new object or array, use shallowEqual as the equality function in useSelector to prevent unnecessary re-renders."
    category: "redux_performance"
    severity: "critical"
    applicability:
      frameworks: ["react-redux", "redux-toolkit"]
    tags: ["redux", "shallowEqual", "performance", "re-renders"]
    example: |
      import { shallowEqual } from 'react-redux';
      const { name, email } = useAppSelector(
        (state) => ({ name: state.user.name, email: state.user.email }),
        shallowEqual
      );

  - id: REDUX041
    title: "Avoid putting non-serializable values in state"
    description: "Redux state should only contain serializable data (objects, arrays, primitives). Never store class instances, functions, Promises, Maps, Sets, or Symbols. RTK's serializability middleware warns about this."
    category: "redux_performance"
    severity: "critical"
    applicability:
      frameworks: ["redux", "redux-toolkit"]
    tags: ["redux", "serializable", "state", "devtools"]
    example: |
      // ❌ Non-serializable
      { callback: () => {}, date: new Date(), set: new Set() }

      // ✅ Serializable
      { timestamp: Date.now(), items: ['a', 'b'], config: { key: 'value' } }

  - id: REDUX042
    title: "Use Redux Toolkit's autoBatchEnhancer for high-frequency updates"
    description: "For applications with many rapid dispatches (real-time data, animations), use autoBatchEnhancer to batch multiple dispatches into a single re-render. Included by default in RTK 2.0+."
    category: "redux_performance"
    severity: "critical"
    applicability:
      frameworks: ["redux-toolkit"]
    tags: ["redux", "batching", "performance", "autoBatch"]
    example: |
      // RTK 1.9+: opt-in
      const store = configureStore({
        reducer: rootReducer,
        enhancers: (getDefaultEnhancers) =>
          getDefaultEnhancers().concat(autoBatchEnhancer()),
      });

  - id: REDUX043
    title: "Configure redux-persist wisely"
    description: "When using redux-persist, whitelist only essential slices. Never persist sensitive data. Use transforms for data migration and encryption. Configure version for state migrations."
    category: "redux_performance"
    severity: "critical"
    applicability:
      frameworks: ["redux-persist"]
    tags: ["redux", "persist", "storage", "whitelist"]
    example: |
      const persistConfig = {
        key: 'root',
        version: 1,
        storage,
        whitelist: ['auth', 'settings'], // only persist these
        transforms: [encryptTransform({ secretKey: process.env.SECRET_KEY })],
        migrate: createMigrate(migrations, { debug: false }),
      };

