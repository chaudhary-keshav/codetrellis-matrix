    title: "Migrate from legacy Redux to RTK incrementally"
    description: "Migrate from createStore/switch-case to configureStore/createSlice incrementally. Start by swapping createStore with configureStore (drop-in compatible). Then convert one slice at a time from switch-case to createSlice."
