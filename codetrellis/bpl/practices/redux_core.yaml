  # REDUX TESTING (REDUX044-REDUX046) - Testing patterns
  # ============================================================================

  - id: REDUX044
    title: "Test slices with reducer and action creator"
    description: "Test slice reducers by dispatching actions and asserting the resulting state. Test initial state, each reducer case, and extraReducer cases independently."
    category: "redux_testing"
    severity: "critical"
    applicability:
      frameworks: ["redux-toolkit"]
    tags: ["redux", "testing", "reducers", "unit-test"]
    example: |
      describe('counterSlice', () => {
        it('should handle initial state', () => {
          expect(counterReducer(undefined, { type: 'unknown' })).toEqual({ value: 0 });
        });
        it('should handle increment', () => {
          const actual = counterReducer({ value: 3 }, increment());
          expect(actual.value).toEqual(4);
        });
      });

  - id: REDUX045
    title: "Use renderWithProviders helper for component tests"
    description: "Create a reusable renderWithProviders helper that wraps components with a real Redux store. Pass preloadedState to set up test scenarios without mocking the store."
    category: "redux_testing"
    severity: "critical"
    applicability:
      frameworks: ["redux-toolkit", "testing-library"]
    tags: ["redux", "testing", "integration", "renderWithProviders"]
    example: |
      function renderWithProviders(
        ui: React.ReactElement,
        { preloadedState, store = configureStore({ reducer: rootReducer, preloadedState }), ...options } = {}
      ) {
        function Wrapper({ children }: { children: React.ReactNode }) {
          return <Provider store={store}>{children}</Provider>;
        }
        return { store, ...render(ui, { wrapper: Wrapper, ...options }) };
      }

  - id: REDUX046
    title: "Test RTK Query with MSW for API mocking"
    description: "Use MSW (Mock Service Worker) to mock API responses when testing RTK Query endpoints. MSW intercepts network requests, providing realistic test scenarios without a running backend."
    category: "redux_testing"
    severity: "critical"
    applicability:
      frameworks: ["rtk-query", "msw"]
    tags: ["redux", "rtk-query", "msw", "testing"]
    example: |
      import { setupServer } from 'msw/node';
      import { http, HttpResponse } from 'msw';
      const server = setupServer(
        http.get('/api/users', () => HttpResponse.json([{ id: '1', name: 'Alice' }]))
      );
      beforeAll(() => server.listen());
      afterEach(() => server.resetHandlers());
      afterAll(() => server.close());

  # ============================================================================
  # REDUX TYPE SAFETY (REDUX047-REDUX049) - TypeScript patterns
  # ============================================================================

  - id: REDUX047
    title: "Use PayloadAction type for action parameters"
    description: "Always type action parameters with PayloadAction<T> in createSlice reducers. This ensures both the reducer and auto-generated action creators are properly typed."
    category: "redux_type_safety"
    severity: "critical"
    applicability:
      frameworks: ["redux-toolkit", "typescript"]
    tags: ["redux", "typescript", "PayloadAction", "typing"]
    example: |
      import { PayloadAction } from '@reduxjs/toolkit';
      reducers: {
        userUpdated(state, action: PayloadAction<{ id: string; changes: Partial<User> }>) {
          const { id, changes } = action.payload;
          Object.assign(state.entities[id], changes);
        },
      }

  - id: REDUX048
    title: "Type createAsyncThunk return and argument types"
    description: "Provide explicit generic types to createAsyncThunk for the return type and argument type. For thunkAPI typing, use the third generic parameter with an object containing state, dispatch, and rejectValue types."
    category: "redux_type_safety"
    severity: "critical"
    applicability:
      frameworks: ["redux-toolkit", "typescript"]
    tags: ["redux", "typescript", "thunk", "typing"]
    example: |
      export const fetchUser = createAsyncThunk<
        User,          // Return type
        string,        // Argument type
        { state: RootState; rejectValue: ApiError }  // ThunkAPI config
      >(
        'users/fetchById',
        async (userId, { rejectWithValue }) => {
          try { return await api.getUser(userId); }
          catch (err) { return rejectWithValue(err as ApiError); }
        }
      );

  - id: REDUX049
    title: "Use withTypes for typed hooks in RTK 2.0+"
    description: "In RTK 2.0+, use .withTypes<>() on useSelector, useDispatch, and useStore to create pre-typed hooks. This replaces the manual TypedUseSelectorHook pattern from RTK 1.x."
    category: "redux_type_safety"
    severity: "critical"
    applicability:
      frameworks: ["redux-toolkit-v2", "typescript"]
    tags: ["redux", "rtk-v2", "typescript", "withTypes"]
    example: |
      // RTK 2.0+ typed hooks
      import { useSelector, useDispatch, useStore } from 'react-redux';
      export const useAppSelector = useSelector.withTypes<RootState>();
      export const useAppDispatch = useDispatch.withTypes<AppDispatch>();
      export const useAppStore = useStore.withTypes<AppStore>();

