  - id: VUE026
    title: "Use Pinia for Global State"
    category: vue_state_management
    level: beginner
    priority: critical
    applicability:
      frameworks:
        - vue
    content:
      description: |
        Use Pinia as the official state management library. Prefer Setup Stores
        (function syntax) for Composition API consistency.
      rationale: |
        Pinia is Vue's official store with TypeScript support, devtools integration,
        and hot module replacement. It replaces Vuex for Vue 3.
      good_examples:
        - |
          // stores/useUserStore.ts
          import { defineStore } from 'pinia'
          import { ref, computed } from 'vue'

          export const useUserStore = defineStore('user', () => {
            // State
            const user = ref<User | null>(null)
            const isLoading = ref(false)

            // Getters
            const isAuthenticated = computed(() => !!user.value)
            const fullName = computed(() =>
              user.value ? `${user.value.firstName} ${user.value.lastName}` : ''
            )

            // Actions
            async function login(credentials: Credentials) {
              isLoading.value = true
              try {
                user.value = await authApi.login(credentials)
              } finally {
                isLoading.value = false
              }
            }

            function logout() {
              user.value = null
            }

            return { user, isLoading, isAuthenticated, fullName, login, logout }
          })
    tags:
      - state-management
      - pinia
      - stores
    python_version:
      min_version: null

  - id: VUE027
    title: "Keep Store Actions for Async Logic"
    category: vue_state_management
    level: intermediate
    priority: high
    applicability:
      frameworks:
        - vue
    content:
      description: |
        Keep async operations and complex mutations in store actions. Components
        should call actions, not directly modify store state for complex operations.
      rationale: |
        Centralizing async logic in stores keeps components simple, makes state
        changes trackable in devtools, and enables easy testing.
      good_examples:
        - |
          // ✅ In store
          async function fetchProducts(filters: Filters) {
            isLoading.value = true
            error.value = null
            try {
              const response = await api.getProducts(filters)
              products.value = response.data
              totalCount.value = response.total
            } catch (e) {
              error.value = e as Error
            } finally {
              isLoading.value = false
            }
          }

          // ✅ In component
          const store = useProductStore()
          onMounted(() => store.fetchProducts(filters.value))
    tags:
      - state-management
      - actions
      - async
    python_version:
      min_version: null

  - id: VUE028
    title: "Use storeToRefs for Reactive Store Destructuring"
    category: vue_state_management
    level: beginner
    priority: high
    applicability:
      frameworks:
        - vue
    content:
      description: |
        Use storeToRefs() when destructuring reactive state from Pinia stores.
        Destructure actions directly since they're not reactive.
      rationale: |
        Direct destructuring of store state loses reactivity. storeToRefs
        converts store state and getters to refs while preserving reactivity.
      good_examples:
        - |
          <script setup lang="ts">
          import { storeToRefs } from 'pinia'

          const store = useUserStore()

          // ✅ storeToRefs for reactive state/getters
          const { user, isAuthenticated, fullName } = storeToRefs(store)

          // ✅ Actions can be destructured directly
          const { login, logout } = store
          </script>
      bad_examples:
        - |
          // ❌ Loses reactivity!
          const { user, isAuthenticated } = useUserStore()
    tags:
      - state-management
      - pinia
      - reactivity
    python_version:
      min_version: null

  - id: VUE029
    title: "Organize Stores by Domain"
    category: vue_state_management
    level: intermediate
    priority: medium
    applicability:
      frameworks:
        - vue
    content:
      description: |
        Create separate stores for each domain (auth, products, cart, settings).
        Avoid monolithic stores. Compose stores when they need to interact.
      rationale: |
        Domain-specific stores improve code organization, enable independent
        testing, and prevent bloated state objects.
      good_examples:
        - |
          // stores/useAuthStore.ts - Authentication state
          // stores/useCartStore.ts - Shopping cart state
          // stores/useProductStore.ts - Product catalog state

          // Composing stores
          export const useCartStore = defineStore('cart', () => {
            const authStore = useAuthStore()  // Cross-store reference

            async function checkout() {
              if (!authStore.isAuthenticated) {
                throw new Error('Must be logged in')
              }
              // ...
            }
          })
    tags:
      - state-management
      - architecture
      - organization
    python_version:
      min_version: null

  - id: VUE030
    title: "Use Composables Instead of Stores for Local State"
    category: vue_composables
    level: intermediate
    priority: medium
    applicability:
      frameworks:
        - vue
    content:
      description: |
        Use composables for component-local or feature-local state. Only use
        stores for truly global state that needs to persist across views.
      rationale: |
        Not all state needs to be global. Composables provide scoped state that
        is automatically cleaned up when the component unmounts.
      good_examples:
        - |
          // ✅ Composable for local state
          function useFormValidation(rules: ValidationRules) {
            const errors = ref<Record<string, string>>({})
            const isValid = computed(() => Object.keys(errors.value).length === 0)

            function validate(field: string, value: unknown) {
              // validation logic
            }

            return { errors, isValid, validate }
          }

          // ✅ Store for global state only
          // Auth state, user preferences, shopping cart, notifications
    tags:
