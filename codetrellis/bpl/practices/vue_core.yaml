  - id: VUE046
    title: "Use Suspense for Async Dependencies"
    category: vue_components
    level: advanced
    priority: medium
    applicability:
      frameworks:
        - vue
    content:
      description: |
        Use Suspense (experimental) to handle async dependencies declaratively.
        Provide fallback content while async setup resolves.
      rationale: |
        Suspense simplifies loading state management for components with async
        setup() or top-level await in <script setup>.
      good_examples:
        - |
          <template>
            <Suspense>
              <template #default>
                <AsyncDashboard />
              </template>
              <template #fallback>
                <LoadingSpinner />
              </template>
            </Suspense>
          </template>

          // AsyncDashboard.vue
          <script setup lang="ts">
          // Top-level await in script setup
          const data = await fetchDashboardData()
          </script>
    tags:
      - components
      - suspense
      - async
    python_version:
      min_version: null

  - id: VUE047
    title: "Implement Error Boundaries"
    category: vue_components
    level: intermediate
    priority: high
    applicability:
      frameworks:
        - vue
    content:
      description: |
        Use onErrorCaptured or errorCaptured hook to create error boundary
        components. Prevent child errors from crashing the entire app.
      rationale: |
        Error boundaries gracefully handle component errors, display fallback
        UI, and log errors for debugging without breaking the application.
      good_examples:
        - |
          <script setup lang="ts">
          import { ref, onErrorCaptured } from 'vue'

          const error = ref<Error | null>(null)

          onErrorCaptured((err) => {
            error.value = err
            console.error('Captured error:', err)
            return false  // prevent propagation
          })
          </script>

          <template>
            <div v-if="error" class="error-boundary">
              <h2>Something went wrong</h2>
              <button @click="error = null">Retry</button>
            </div>
            <slot v-else />
          </template>
    tags:
      - error-handling
      - components
      - resilience
    python_version:
      min_version: null

  - id: VUE048
    title: "Structure Project with Feature-Based Organization"
    category: vue_style
    level: intermediate
    priority: high
    applicability:
      frameworks:
        - vue
    content:
      description: |
        Organize Vue projects by feature/domain rather than file type. Colocate
        components, composables, stores, and tests by feature.
      rationale: |
        Feature-based organization scales better than type-based (components/,
        composables/, stores/) for larger applications. Related code is colocated.
      good_examples:
        - |
          src/
            features/
              auth/
                components/LoginForm.vue
                composables/useAuth.ts
                stores/useAuthStore.ts
                types/auth.ts
                __tests__/
              products/
                components/ProductList.vue
                composables/useProducts.ts
                stores/useProductStore.ts
            shared/
              components/BaseButton.vue
              composables/useFetch.ts
              utils/formatDate.ts
    tags:
      - architecture
      - organization
      - scalability
    python_version:
      min_version: null

  - id: VUE049
    title: "Use Plugin Pattern for Reusable Functionality"
    category: vue_plugins
    level: advanced
    priority: low
    applicability:
      frameworks:
        - vue
    content:
      description: |
        Create Vue plugins for reusable functionality that needs app-level
        registration (global components, directives, provide/inject, config).
      rationale: |
        Plugins encapsulate reusable setup logic, making it easy to share
        functionality across projects or publish as npm packages.
      good_examples:
        - |
          // plugins/analytics.ts
          import type { App, Plugin } from 'vue'

          interface AnalyticsOptions {
            trackingId: string
            debug?: boolean
          }

          export const AnalyticsPlugin: Plugin = {
            install(app: App, options: AnalyticsOptions) {
              const analytics = createAnalytics(options)

              // Provide for injection
              app.provide('analytics', analytics)

              // Global property
              app.config.globalProperties.$analytics = analytics

              // Global directive
              app.directive('track-click', {
                mounted(el, binding) {
                  el.addEventListener('click', () => {
                    analytics.track(binding.value)
                  })
                },
              })
            },
          }
    tags:
      - plugins
      - reusability
      - architecture
    python_version:
      min_version: null

  - id: VUE050
    title: "Use Teleport for Portal Rendering"
    category: vue_components
    level: intermediate
    priority: medium
    applicability:
      frameworks:
        - vue
    content:
      description: |
        Use Teleport to render component content outside its parent DOM tree.
        Ideal for modals, tooltips, and notifications.
      rationale: |
        Teleport solves CSS stacking context issues by rendering content at a
        different DOM location while keeping the component's logical hierarchy.
      good_examples:
        - |
          <template>
            <button @click="showModal = true">Open Modal</button>

            <Teleport to="body">
              <div v-if="showModal" class="modal-overlay">
                <div class="modal-content">
                  <h2>{{ title }}</h2>
                  <slot />
                  <button @click="showModal = false">Close</button>
                </div>
              </div>
            </Teleport>
          </template>
    tags:
      - components
      - teleport
      - dom
    python_version:
      min_version: null
