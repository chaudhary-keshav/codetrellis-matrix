# Vue.js Best Practices Library
# Version: 1.0.0
# Vue Version: 2.x through 3.5+ (Options API, Composition API, Script Setup)
# Total Practices: 50
# Coverage: Components, Composition API, Reactivity, Routing, State, Performance, Testing, Vue 3.5+

version: "1.0.0"
framework: vue
framework_version:
  min_version: "3.0"
description: "Comprehensive Vue.js 2.x-3.5+ best practices with Composition API, Script Setup, and modern patterns"

practices:
  # ============================================================================
  # COMPONENT FUNDAMENTALS (VUE001-VUE010)
  # ============================================================================

  - id: VUE001
    title: "Use Script Setup for New Components"
    category: vue_script_setup
    level: beginner
    priority: critical
    applicability:
      frameworks:
        - vue
    content:
      description: |
        Prefer <script setup> syntax for all new Vue 3 components. It provides
        less boilerplate, better TypeScript inference, and improved runtime performance.
      rationale: |
        <script setup> compiles to more optimized code, enables better TypeScript
        support with compiler macros (defineProps, defineEmits, defineExpose), and
        removes the need for explicit return statements.
      good_examples:
        - |
          <script setup lang="ts">
          import { ref, computed } from 'vue'

          const props = defineProps<{
            title: string
            count?: number
          }>()

          const emit = defineEmits<{
            (e: 'update', value: number): void
            (e: 'close'): void
          }>()

          const localCount = ref(props.count ?? 0)
          const doubled = computed(() => localCount.value * 2)
          </script>
      bad_examples:
        - |
          // Avoid verbose Composition API without <script setup>
          export default defineComponent({
            props: { title: String, count: Number },
            emits: ['update', 'close'],
            setup(props, { emit }) {
              const localCount = ref(props.count ?? 0)
              const doubled = computed(() => localCount.value * 2)
              return { localCount, doubled }
            }
          })
    tags:
      - components
      - script-setup
    python_version:
      min_version: null

  - id: VUE002
    title: "Type Props with TypeScript Generics"
    category: vue_components
    level: beginner
    priority: critical
    applicability:
      frameworks:
        - vue
    content:
      description: |
        Use TypeScript generics with defineProps for type-safe prop definitions.
        Use withDefaults for default values.
      rationale: |
        Generic prop types provide compile-time type checking, IDE autocompletion,
        and self-documenting component APIs.
      good_examples:
        - |
          <script setup lang="ts">
          interface Props {
            title: string
            items: Item[]
            loading?: boolean
            variant?: 'primary' | 'secondary'
          }

          const props = withDefaults(defineProps<Props>(), {
            loading: false,
            variant: 'primary',
          })
          </script>
      bad_examples:
        - |
          // Avoid runtime-only prop validation
          defineProps({
            title: { type: String, required: true },
            items: { type: Array, required: true },
            loading: { type: Boolean, default: false },
          })
    tags:
      - components
      - typescript
      - props
    python_version:
      min_version: null

  - id: VUE003
    title: "Use Single File Components"
    category: vue_components
    level: beginner
    priority: critical
    applicability:
      frameworks:
        - vue
    content:
      description: |
        Organize components as Single File Components (.vue) with template,
        script, and style sections. Use scoped styles to prevent CSS leaks.
      rationale: |
        SFCs provide colocation of template, logic, and styles. Scoped styles
        prevent unintended global CSS side effects. Build tools optimize SFC compilation.
      good_examples:
        - |
          <template>
            <div class="user-card">
              <h3>{{ user.name }}</h3>
              <p>{{ user.email }}</p>
            </div>
          </template>

          <script setup lang="ts">
          defineProps<{ user: User }>()
          </script>

          <style scoped>
          .user-card {
            padding: 1rem;
            border: 1px solid var(--border-color);
          }
          </style>
    tags:
      - components
      - sfc
      - styling
    python_version:
      min_version: null

  - id: VUE004
    title: "Define Explicit Component Events with defineEmits"
    category: vue_components
    level: beginner
    priority: high
    applicability:
      frameworks:
        - vue
    content:
      description: |
        Always define emitted events with defineEmits. Use TypeScript for type-safe
        event payloads. Prefer emit over direct parent method calls.
      rationale: |
        Explicit event declarations serve as documentation, enable Vue Devtools
        tracking, and provide type safety for parent-child communication.
      good_examples:
        - |
          <script setup lang="ts">
          const emit = defineEmits<{
            (e: 'submit', data: FormData): void
            (e: 'cancel'): void
            (e: 'validate', field: string, valid: boolean): void
          }>()

          function handleSubmit() {
            emit('submit', formData.value)
          }
          </script>
    tags:
      - components
      - events
    python_version:
      min_version: null

  - id: VUE005
    title: "Use Slots for Flexible Component Composition"
    category: vue_components
    level: intermediate
    priority: high
    applicability:
      frameworks:
        - vue
    content:
      description: |
        Use named and scoped slots for flexible component composition. Define
        slot types with defineSlots for TypeScript support.
      rationale: |
        Slots enable the Compound Component pattern, making components more
        reusable and flexible without excessive prop drilling.
      good_examples:
        - |
          <script setup lang="ts">
          defineSlots<{
            default(props: { item: Item }): any
            header(props: { title: string }): any
            empty(): any
          }>()
          </script>

          <template>
            <div class="data-list">
              <div class="header">
                <slot name="header" :title="title" />
              </div>
              <template v-if="items.length">
                <div v-for="item in items" :key="item.id">
                  <slot :item="item" />
                </div>
              </template>
              <slot v-else name="empty">
                <p>No items found</p>
              </slot>
            </div>
          </template>
    tags:
      - components
      - slots
      - composition
    python_version:
      min_version: null

  - id: VUE006
    title: "Use Provide/Inject for Deep Component Trees"
    category: vue_components
    level: intermediate
    priority: medium
    applicability:
      frameworks:
        - vue
    content:
      description: |
        Use provide/inject for passing data through deep component trees without
        prop drilling. Use InjectionKey for type safety.
      rationale: |
        Provide/inject avoids excessive prop drilling in deep component hierarchies
        while maintaining reactivity and type safety.
      good_examples:
        - |
          // injection-keys.ts
          import type { InjectionKey, Ref } from 'vue'
          export const ThemeKey: InjectionKey<Ref<Theme>> = Symbol('theme')

          // Parent component
          <script setup lang="ts">
          import { provide, ref } from 'vue'
          import { ThemeKey } from './injection-keys'

          const theme = ref<Theme>({ mode: 'dark' })
          provide(ThemeKey, theme)
          </script>

          // Child component (any depth)
          <script setup lang="ts">
          import { inject } from 'vue'
          import { ThemeKey } from './injection-keys'

          const theme = inject(ThemeKey)!
          </script>
    tags:
      - components
      - provide-inject
      - dependency-injection
    python_version:
      min_version: null

  - id: VUE007
    title: "Use defineModel for Two-Way Binding"
    category: vue_components
    level: intermediate
    priority: medium
    applicability:
      frameworks:
        - vue
    content:
      description: |
        Use defineModel (Vue 3.4+) for clean two-way binding between parent
        and child components, replacing the manual v-model pattern.
      rationale: |
        defineModel eliminates boilerplate for v-model support, providing a
        cleaner API than manually handling modelValue prop and update:modelValue emit.
      good_examples:
        - |
          <script setup lang="ts">
          // Simple model
          const modelValue = defineModel<string>({ required: true })

          // Named model
          const title = defineModel<string>('title')

          // Model with default
          const count = defineModel<number>('count', { default: 0 })
          </script>

          <template>
            <input v-model="modelValue" />
          </template>
    tags:
      - components
      - v-model
      - vue-3.4
    python_version:
      min_version: null

  - id: VUE008
    title: "Use defineExpose Sparingly"
    category: vue_components
    level: intermediate
    priority: medium
    applicability:
      frameworks:
        - vue
    content:
      description: |
        Only use defineExpose when a parent truly needs to call child methods
        via template refs. Prefer events and props for communication.
      rationale: |
        defineExpose creates tight coupling. Exposed methods should be limited
        to imperative use cases like focus(), reset(), or validate().
      good_examples:
        - |
          <script setup lang="ts">
          import { ref } from 'vue'

          const inputRef = ref<HTMLInputElement>()

          function focus() {
            inputRef.value?.focus()
          }

          function reset() {
            inputRef.value!.value = ''
          }

          defineExpose({ focus, reset })
          </script>
    tags:
      - components
      - expose
      - api-design
    python_version:
      min_version: null

  - id: VUE009
    title: "Follow Component Naming Conventions"
    category: vue_style
    level: beginner
    priority: high
    applicability:
      frameworks:
        - vue
    content:
      description: |
        Use PascalCase for component names and filenames. Use multi-word names
        to avoid conflicts with HTML elements. Prefix base components.
      rationale: |
        Consistent naming improves codebase navigation, prevents HTML element
        conflicts, and makes component usage clear in templates.
      good_examples:
        - |
          // Good component names:
          // BaseButton.vue, BaseIcon.vue (base components)
          // AppHeader.vue, AppSidebar.vue (app-level)
          // UserProfile.vue, UserAvatar.vue (feature-level)
          // TheNavbar.vue, TheSidebar.vue (singleton components)
      bad_examples:
        - |
          // Avoid:
          // button.vue (conflicts with <button>)
          // header.vue (conflicts with <header>)
          // item.vue (too generic)
          // myComponent.vue (camelCase)
    tags:
      - conventions
      - naming
    python_version:
      min_version: null

  - id: VUE010
    title: "Use Async Components for Code Splitting"
    category: vue_performance
    level: intermediate
    priority: medium
    applicability:
      frameworks:
        - vue
    content:
      description: |
        Use defineAsyncComponent for lazy-loading heavy components. Provide
        loading and error states for better user experience.
      rationale: |
        Async components reduce initial bundle size and improve Time to Interactive
        by only loading component code when needed.
      good_examples:
        - |
          import { defineAsyncComponent } from 'vue'

          const HeavyChart = defineAsyncComponent({
            loader: () => import('./HeavyChart.vue'),
            loadingComponent: LoadingSpinner,
            errorComponent: ErrorDisplay,
            delay: 200,
            timeout: 10000,
          })
    tags:
      - performance
      - code-splitting
      - lazy-loading
    python_version:
      min_version: null

  # ============================================================================
  # COMPOSITION API & REACTIVITY (VUE011-VUE020)
  # ============================================================================

  - id: VUE011
    title: "Choose ref vs reactive Correctly"
    category: vue_reactivity
    level: beginner
    priority: critical
    applicability:
      frameworks:
        - vue
    content:
      description: |
        Use ref for primitives and reactive for objects. Prefer ref in most
        cases for consistency and to avoid destructuring pitfalls.
      rationale: |
        ref works with all value types and is explicit about reactivity via .value.
        reactive loses reactivity when destructured. ref is the recommended default.
      good_examples:
        - |
          <script setup lang="ts">
          import { ref, reactive } from 'vue'

          // ✅ ref for primitives and most cases
          const count = ref(0)
          const name = ref('')
          const isLoading = ref(false)

          // ✅ reactive for object state that won't be destructured
          const form = reactive({
            email: '',
            password: '',
            errors: {} as Record<string, string>,
          })
          </script>
      bad_examples:
        - |
          // ❌ Don't destructure reactive objects
          const state = reactive({ count: 0, name: '' })
          const { count, name } = state // loses reactivity!

          // ❌ Don't reassign reactive objects
          let state = reactive({ items: [] })
          state = reactive({ items: newItems }) // breaks reactivity
    tags:
      - reactivity
      - ref
      - reactive
    python_version:
      min_version: null

  - id: VUE012
    title: "Use Computed Properties for Derived State"
    category: vue_reactivity
    level: beginner
    priority: critical
    applicability:
      frameworks:
        - vue
    content:
      description: |
        Use computed() for any value derived from reactive state. Computed
        values are cached and only re-evaluate when dependencies change.
      rationale: |
        Computed properties are more efficient than methods for derived values
        because they cache results. They also clearly express data dependencies.
      good_examples:
        - |
          <script setup lang="ts">
          import { ref, computed } from 'vue'

          const items = ref<Item[]>([])
          const searchQuery = ref('')

          // ✅ Computed for derived state
          const filteredItems = computed(() =>
            items.value.filter(item =>
              item.name.toLowerCase().includes(searchQuery.value.toLowerCase())
            )
          )

          const totalPrice = computed(() =>
            filteredItems.value.reduce((sum, item) => sum + item.price, 0)
          )

          // ✅ Writable computed
          const fullName = computed({
            get: () => `${firstName.value} ${lastName.value}`,
            set: (val: string) => {
              const [first, ...rest] = val.split(' ')
              firstName.value = first
              lastName.value = rest.join(' ')
            },
          })
          </script>
    tags:
      - reactivity
      - computed
      - performance
    python_version:
      min_version: null

  - id: VUE013
    title: "Use watchEffect for Side Effects"
    category: vue_reactivity
    level: intermediate
    priority: high
    applicability:
      frameworks:
        - vue
    content:
      description: |
        Use watchEffect for side effects that depend on reactive state.
        Use watch when you need the old value, explicit sources, or lazy execution.
      rationale: |
        watchEffect auto-tracks dependencies and runs immediately, making it
        ideal for sync-style side effects. watch gives more control for complex scenarios.
      good_examples:
        - |
          <script setup lang="ts">
          import { ref, watch, watchEffect } from 'vue'

          const userId = ref(1)
          const userData = ref<User | null>(null)

          // ✅ watchEffect for simple reactive side effects
          watchEffect(async () => {
            userData.value = await fetchUser(userId.value)
          })

          // ✅ watch when you need old value or explicit sources
          watch(userId, async (newId, oldId) => {
            console.log(`User changed from ${oldId} to ${newId}`)
            userData.value = await fetchUser(newId)
          }, { immediate: true })

          // ✅ watch multiple sources
          watch([firstName, lastName], ([first, last]) => {
            fullName.value = `${first} ${last}`
          })
          </script>
    tags:
      - reactivity
      - watchers
      - side-effects
    python_version:
      min_version: null

  - id: VUE014
    title: "Create Reusable Composables"
    category: vue_composables
    level: intermediate
    priority: critical
    applicability:
      frameworks:
        - vue
    content:
      description: |
        Extract reusable logic into composable functions (use* convention).
        Composables encapsulate reactive state, watchers, and lifecycle hooks.
      rationale: |
        Composables are Vue's primary code reuse mechanism. They provide better
        type inference, testability, and composability than mixins or renderless components.
      good_examples:
        - |
          // composables/useFetch.ts
          import { ref, watchEffect, type Ref } from 'vue'

          export function useFetch<T>(url: Ref<string> | string) {
            const data = ref<T | null>(null) as Ref<T | null>
            const error = ref<Error | null>(null)
            const isLoading = ref(false)

            async function execute() {
              isLoading.value = true
              error.value = null
              try {
                const response = await fetch(typeof url === 'string' ? url : url.value)
                data.value = await response.json()
              } catch (e) {
                error.value = e as Error
              } finally {
                isLoading.value = false
              }
            }

            watchEffect(() => { execute() })

            return { data, error, isLoading, refresh: execute }
          }
      bad_examples:
        - |
          // ❌ Don't use mixins for code reuse
          export const fetchMixin = {
            data() { return { data: null, loading: false } },
            methods: { async fetchData(url) { /* ... */ } },
          }
    tags:
      - composables
      - code-reuse
      - patterns
    python_version:
      min_version: null

  - id: VUE015
    title: "Handle Composable Cleanup"
    category: vue_composables
    level: intermediate
    priority: high
    applicability:
      frameworks:
        - vue
    content:
      description: |
        Always clean up side effects in composables using onUnmounted or
        watchEffect's cleanup function. Prevent memory leaks from timers,
        event listeners, and subscriptions.
      rationale: |
        Failing to clean up side effects causes memory leaks, especially in SPAs
        where components mount and unmount frequently.
      good_examples:
        - |
          import { ref, onMounted, onUnmounted } from 'vue'

          export function useEventListener(
            target: EventTarget,
            event: string,
            handler: EventListener,
          ) {
            onMounted(() => target.addEventListener(event, handler))
            onUnmounted(() => target.removeEventListener(event, handler))
          }

          export function useInterval(callback: () => void, ms: number) {
            const id = ref<ReturnType<typeof setInterval>>()

            onMounted(() => {
              id.value = setInterval(callback, ms)
            })

            onUnmounted(() => {
              if (id.value) clearInterval(id.value)
            })
          }
    tags:
      - composables
      - cleanup
      - memory-leaks
    python_version:
      min_version: null

  - id: VUE016
    title: "Use toRef and toRefs for Reactive Prop Handling"
    category: vue_reactivity
    level: intermediate
    priority: medium
    applicability:
      frameworks:
        - vue
    content:
      description: |
        Use toRef/toRefs to create reactive references from props when passing
        them to composables. Use Reactive Props Destructure (Vue 3.5+).
      rationale: |
        Props are reactive but destructuring loses reactivity. toRef/toRefs
        maintain reactivity. Vue 3.5+ enables direct destructuring with defaults.
      good_examples:
        - |
          <script setup lang="ts">
          import { toRef } from 'vue'

          const props = defineProps<{ userId: string }>()

          // ✅ toRef maintains reactivity
          const userId = toRef(props, 'userId')
          const { data } = useFetch(userId)

          // ✅ Vue 3.5+ Reactive Props Destructure
          const { count = 0, title } = defineProps<{
            count?: number
            title: string
          }>()
          </script>
    tags:
      - reactivity
      - props
      - vue-3.5
    python_version:
      min_version: null

  - id: VUE017
    title: "Use shallowRef for Large Objects"
    category: vue_performance
    level: advanced
    priority: medium
    applicability:
      frameworks:
        - vue
    content:
      description: |
        Use shallowRef/shallowReactive for large objects or collections where
        deep reactivity is not needed. This avoids expensive deep proxy creation.
      rationale: |
        Deep reactivity on large data structures creates proxy overhead for every
        nested property. shallowRef only tracks .value reassignment.
      good_examples:
        - |
          import { shallowRef, triggerRef } from 'vue'

          // ✅ Large list that replaces entirely
          const items = shallowRef<Item[]>([])

          // Replace entire array (triggers update)
          items.value = [...items.value, newItem]

          // For mutations, manually trigger
          items.value.push(newItem)
          triggerRef(items)
    tags:
      - performance
      - reactivity
      - optimization
    python_version:
      min_version: null

  - id: VUE018
    title: "Use useTemplateRef for Template References"
    category: vue_reactivity
    level: intermediate
    priority: medium
    applicability:
      frameworks:
        - vue
    content:
      description: |
        Use useTemplateRef (Vue 3.5+) for type-safe template references.
        Fall back to ref with template ref attribute for earlier versions.
      rationale: |
        useTemplateRef provides better TypeScript inference and clearer intent
        compared to using ref() for template references.
      good_examples:
        - |
          <script setup lang="ts">
          import { useTemplateRef, onMounted } from 'vue'

          // ✅ Vue 3.5+ useTemplateRef
          const inputEl = useTemplateRef<HTMLInputElement>('input')

          onMounted(() => {
            inputEl.value?.focus()
          })
          </script>

          <template>
            <input ref="input" />
          </template>
    tags:
      - reactivity
      - template-refs
      - vue-3.5
    python_version:
      min_version: null

  - id: VUE019
    title: "Avoid Mutating Props"
    category: vue_components
    level: beginner
    priority: critical
    applicability:
      frameworks:
        - vue
    content:
      description: |
        Never mutate props directly. Use local copies with ref, computed properties,
        or emit events to request changes from the parent.
      rationale: |
        Props follow one-way data flow. Mutating them causes confusing bugs,
        Vue warnings, and makes component behavior unpredictable.
      good_examples:
        - |
          <script setup lang="ts">
          const props = defineProps<{ initialCount: number }>()
          const emit = defineEmits<{ (e: 'update', v: number): void }>()

          // ✅ Local copy of prop
          const localCount = ref(props.initialCount)

          // ✅ Emit to parent instead of mutating
          function increment() {
            emit('update', props.initialCount + 1)
          }
          </script>
      bad_examples:
        - |
          // ❌ Never mutate props
          props.count++ // Vue warning!
          props.items.push(newItem) // Silent mutation, hard to debug
    tags:
      - components
      - props
      - one-way-data-flow
    python_version:
      min_version: null

  - id: VUE020
    title: "Use readonly for Immutable Reactive State"
    category: vue_reactivity
    level: intermediate
    priority: medium
    applicability:
      frameworks:
        - vue
    content:
      description: |
        Use readonly() to create immutable views of reactive state. Use it
        when providing state via provide/inject or from composables.
      rationale: |
        readonly prevents accidental mutations of shared state, enforcing
        clear ownership of data and predictable state management.
      good_examples:
        - |
          import { ref, readonly, provide } from 'vue'

          const state = ref({ count: 0 })

          // ✅ Provide readonly version
          provide('state', readonly(state))

          // In composable
          export function useCounter() {
            const count = ref(0)
            const increment = () => count.value++
            return { count: readonly(count), increment }
          }
    tags:
      - reactivity
      - immutability
      - patterns
    python_version:
      min_version: null

  # ============================================================================
  # ROUTING (VUE021-VUE025)
  # ============================================================================

  - id: VUE021
    title: "Use Lazy Route Loading"
    category: vue_routing
    level: beginner
    priority: critical
    applicability:
      frameworks:
        - vue
    content:
      description: |
        Always lazy-load route components using dynamic imports. Group related
        routes with magic comments for named chunks.
      rationale: |
        Lazy loading routes reduces initial bundle size dramatically, improving
        First Contentful Paint and Time to Interactive.
      good_examples:
        - |
          const routes = [
            {
              path: '/dashboard',
              component: () => import('./views/Dashboard.vue'),
            },
            {
              path: '/settings',
              component: () => import(/* webpackChunkName: "settings" */ './views/Settings.vue'),
            },
          ]
    tags:
      - routing
      - performance
      - code-splitting
    python_version:
      min_version: null

  - id: VUE022
    title: "Use Navigation Guards for Auth and Access Control"
    category: vue_routing
    level: intermediate
    priority: high
    applicability:
      frameworks:
        - vue
    content:
      description: |
        Use beforeEach for global authentication checks. Use per-route
        beforeEnter for route-specific authorization. Use route meta for
        declarative access control.
      rationale: |
        Centralized auth guards prevent unauthorized access, ensure consistent
        redirect behavior, and keep auth logic out of components.
      good_examples:
        - |
          router.beforeEach(async (to, from) => {
            const auth = useAuthStore()

            if (to.meta.requiresAuth && !auth.isAuthenticated) {
              return { name: 'login', query: { redirect: to.fullPath } }
            }

            if (to.meta.roles && !to.meta.roles.includes(auth.user?.role)) {
              return { name: 'forbidden' }
            }
          })

          const routes = [
            {
              path: '/admin',
              meta: { requiresAuth: true, roles: ['admin'] },
              component: () => import('./views/Admin.vue'),
            },
          ]
    tags:
      - routing
      - security
      - authentication
    python_version:
      min_version: null

  - id: VUE023
    title: "Type Route Params and Query"
    category: vue_routing
    level: intermediate
    priority: medium
    applicability:
      frameworks:
        - vue
    content:
      description: |
        Use typed route params and query parameters. Validate params in
        route guards or with props: true for type-safe component props.
      rationale: |
        Typed route parameters prevent runtime errors from invalid or missing
        params and improve developer experience with autocomplete.
      good_examples:
        - |
