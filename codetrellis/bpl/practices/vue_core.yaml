      - composables
      - architecture
    python_version:
      min_version: null

  - id: VUE031
    title: "Persist Store State When Needed"
    category: vue_state_management
    level: intermediate
    priority: low
    applicability:
      frameworks:
        - vue
    content:
      description: |
        Use pinia-plugin-persistedstate or similar for persisting stores to
        localStorage/sessionStorage. Only persist necessary state.
      rationale: |
        State persistence improves UX for auth tokens, user preferences, and
        draft content. Avoid persisting sensitive or easily re-fetchable data.
      good_examples:
        - |
          import { defineStore } from 'pinia'

          export const useSettingsStore = defineStore('settings', () => {
            const theme = ref<'light' | 'dark'>('light')
            const locale = ref('en')
            return { theme, locale }
          }, {
            persist: {
              key: 'app-settings',
              storage: localStorage,
              pick: ['theme', 'locale'],
            },
          })
    tags:
      - state-management
      - persistence
      - localStorage
    python_version:
      min_version: null

  - id: VUE032
    title: "Use Vuex Modules for Legacy Vue 2 Projects"
    category: vue_state_management
    level: intermediate
    priority: low
    applicability:
      frameworks:
        - vue
    content:
      description: |
        For Vue 2 projects still using Vuex, organize state into namespaced
        modules. Plan migration to Pinia for Vue 3 upgrades.
      rationale: |
        Vuex modules provide namespace isolation and improve organization in
        larger apps. Pinia migration is straightforward from Vuex modules.
      good_examples:
        - |
          // store/modules/user.js (Vuex)
          export default {
