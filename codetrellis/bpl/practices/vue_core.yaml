          const routes = [
            {
              path: '/users/:id',
              component: () => import('./views/UserDetail.vue'),
              props: true,  // passes route.params as component props
            },
          ]

          // In component
          <script setup lang="ts">
          const props = defineProps<{ id: string }>()
          const { data: user } = useFetch(`/api/users/${props.id}`)
          </script>
    tags:
