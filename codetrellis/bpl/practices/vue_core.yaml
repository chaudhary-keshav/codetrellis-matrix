  - id: VUE041
    title: "Test Components with Vue Test Utils"
    category: vue_testing
    level: intermediate
    priority: high
    applicability:
      frameworks:
        - vue
    content:
      description: |
        Use @vue/test-utils with Vitest for component testing. Test behavior,
        not implementation details. Prefer user-centric assertions.
      rationale: |
        Testing behavior ensures tests remain valid during refactoring.
        Vue Test Utils provides mounting, interaction, and assertion utilities.
      good_examples:
        - |
          import { mount } from '@vue/test-utils'
          import { describe, it, expect } from 'vitest'
          import Counter from './Counter.vue'

          describe('Counter', () => {
            it('increments count when button is clicked', async () => {
              const wrapper = mount(Counter, {
                props: { initialCount: 0 },
              })

              expect(wrapper.text()).toContain('0')
              await wrapper.find('button').trigger('click')
              expect(wrapper.text()).toContain('1')
            })

            it('emits update event', async () => {
              const wrapper = mount(Counter)
              await wrapper.find('button').trigger('click')
              expect(wrapper.emitted('update')).toBeTruthy()
              expect(wrapper.emitted('update')![0]).toEqual([1])
            })
          })
    tags:
      - testing
      - vue-test-utils
      - vitest
    python_version:
      min_version: null

  - id: VUE042
    title: "Test Composables in Isolation"
    category: vue_testing
    level: intermediate
    priority: high
    applicability:
      frameworks:
        - vue
    content:
      description: |
        Test composables by wrapping them in a test component or using
        testing utilities. Mock external dependencies.
      rationale: |
        Composables encapsulate reusable logic and should be tested independently
        from components that use them.
      good_examples:
        - |
          import { withSetup } from '../test-utils'
          import { useCounter } from './useCounter'

          // Helper to test composable outside component
          function withSetup<T>(composable: () => T) {
            let result: T
            const app = createApp({
              setup() {
                result = composable()
                return () => {}
              },
            })
            app.mount(document.createElement('div'))
            return { result: result!, app }
          }

          describe('useCounter', () => {
            it('increments count', () => {
              const { result } = withSetup(() => useCounter(0))
              expect(result.count.value).toBe(0)
              result.increment()
              expect(result.count.value).toBe(1)
            })
          })
    tags:
      - testing
      - composables
      - unit-testing
    python_version:
      min_version: null

  - id: VUE043
    title: "Test Pinia Stores"
    category: vue_testing
    level: intermediate
    priority: medium
    applicability:
      frameworks:
        - vue
    content:
      description: |
        Test Pinia stores using createTestingPinia or by testing store logic
