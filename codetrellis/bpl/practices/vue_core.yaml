  # ============================================================================
  # SECURITY & PATTERNS (VUE045-VUE050)
  # ============================================================================

  - id: VUE045
    title: "Sanitize Dynamic HTML Rendering"
    category: vue_security
    level: intermediate
    priority: critical
    applicability:
      frameworks:
        - vue
    content:
      description: |
        Avoid v-html with user-provided content. When v-html is necessary,
        sanitize input using DOMPurify or similar libraries.
      rationale: |
        v-html renders raw HTML and is vulnerable to XSS attacks if user input
        is not sanitized. Vue's template interpolation auto-escapes by default.
      good_examples:
        - |
          <script setup lang="ts">
          import DOMPurify from 'dompurify'

          const props = defineProps<{ rawHtml: string }>()
          const safeHtml = computed(() => DOMPurify.sanitize(props.rawHtml))
          </script>

          <template>
            <!-- ✅ Sanitized HTML -->
            <div v-html="safeHtml" />

            <!-- ✅ Prefer template interpolation -->
            <p>{{ userInput }}</p>
          </template>
      bad_examples:
        - |
          <!-- ❌ XSS vulnerability! -->
          <div v-html="userComment" />
    tags:
      - security
      - xss
      - sanitization
    python_version:
