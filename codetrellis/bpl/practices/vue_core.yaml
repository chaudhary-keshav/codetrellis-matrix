  # ============================================================================
  # DIRECTIVES & TRANSITIONS (VUE033-VUE035)
  # ============================================================================

  - id: VUE033
    title: "Create Custom Directives for DOM Operations"
    category: vue_directives
    level: advanced
    priority: medium
    applicability:
      frameworks:
        - vue
    content:
      description: |
        Use custom directives for reusable low-level DOM manipulations.
        Prefer composables for most logic; directives are for DOM access only.
      rationale: |
        Directives are the right abstraction for focus management, click-outside,
        intersection observer, and other DOM-level behaviors.
      good_examples:
        - |
          // directives/vFocus.ts
          import type { Directive } from 'vue'

          export const vFocus: Directive = {
            mounted(el: HTMLElement) {
              el.focus()
            },
          }

          // directives/vClickOutside.ts
          export const vClickOutside: Directive = {
            mounted(el, binding) {
              el._clickOutside = (event: Event) => {
                if (!el.contains(event.target as Node)) {
                  binding.value(event)
                }
              }
              document.addEventListener('click', el._clickOutside)
            },
            unmounted(el) {
              document.removeEventListener('click', el._clickOutside)
            },
          }
    tags:
      - directives
      - dom
      - reusability
    python_version:
      min_version: null

  - id: VUE034
    title: "Use Transition for Smooth State Changes"
    category: vue_transitions
    level: intermediate
    priority: medium
    applicability:
      frameworks:
        - vue
    content:
      description: |
        Use Transition and TransitionGroup for animating element enter/leave.
        Prefer CSS transitions over JavaScript hooks for performance.
      rationale: |
        Vue's Transition component integrates with the reactivity system, ensuring
        animations play correctly with v-if/v-show and list changes.
      good_examples:
        - |
          <template>
            <Transition name="slide-fade" mode="out-in">
              <div v-if="showContent" key="content">
                {{ content }}
              </div>
            </Transition>

            <TransitionGroup name="list" tag="ul">
              <li v-for="item in items" :key="item.id">
                {{ item.text }}
              </li>
            </TransitionGroup>
          </template>

          <style scoped>
          .slide-fade-enter-active { transition: all 0.3s ease-out; }
          .slide-fade-leave-active { transition: all 0.2s ease-in; }
          .slide-fade-enter-from { transform: translateX(20px); opacity: 0; }
          .slide-fade-leave-to { transform: translateX(-20px); opacity: 0; }
          </style>
    tags:
      - transitions
      - animation
      - ux
    python_version:
      min_version: null

  - id: VUE035
    title: "Register Directives Properly"
    category: vue_directives
    level: beginner
    priority: medium
    applicability:
      frameworks:
        - vue
    content:
      description: |
        Register directives locally in components or globally in app setup.
        Prefer local registration for tree-shaking.
      rationale: |
        Local registration ensures directives are only bundled when used.
        Global registration is appropriate for widely-used directives.
      good_examples:
        - |
          // Local registration (preferred)
          <script setup>
          import { vFocus } from '@/directives/vFocus'
          </script>

          <template>
            <input v-focus />
          </template>

          // Global registration (for widespread use)
          // main.ts
          app.directive('focus', vFocus)
          app.directive('click-outside', vClickOutside)
    tags:
      - directives
      - registration
      - tree-shaking
    python_version:
      min_version: null

  # ============================================================================
  # PERFORMANCE (VUE036-VUE040)
  # ============================================================================

  - id: VUE036
    title: "Use v-once and v-memo for Static Content"
    category: vue_performance
    level: advanced
    priority: medium
    applicability:
      frameworks:
        - vue
    content:
      description: |
        Use v-once for truly static content that never changes. Use v-memo
        (Vue 3.2+) to memoize sub-trees based on specific dependencies.
      rationale: |
        v-once and v-memo skip re-rendering of content that hasn't changed,
        reducing virtual DOM diffing overhead in large templates.
      good_examples:
        - |
          <template>
            <!-- ✅ Static header that never changes -->
            <header v-once>
              <h1>{{ appTitle }}</h1>
              <p>{{ appDescription }}</p>
            </header>

            <!-- ✅ Memoize expensive list items -->
            <div v-for="item in list" :key="item.id" v-memo="[item.selected]">
              <ExpensiveComponent :item="item" />
            </div>
          </template>
    tags:
      - performance
      - rendering
      - optimization
    python_version:
      min_version: null

  - id: VUE037
    title: "Use v-show vs v-if Appropriately"
    category: vue_performance
    level: beginner
    priority: high
    applicability:
      frameworks:
        - vue
    content:
      description: |
        Use v-if for conditions that rarely change (conditional rendering).
        Use v-show for frequently toggled elements (CSS display toggle).
      rationale: |
        v-if has higher toggle cost (creates/destroys components) but no initial
        render cost for false. v-show renders always but toggles cheaply with CSS.
      good_examples:
        - |
          <!-- ✅ v-if for auth-dependent content (rarely changes) -->
          <AdminPanel v-if="isAdmin" />

          <!-- ✅ v-show for frequently toggled UI -->
          <div v-show="isDropdownOpen" class="dropdown-menu">
            <!-- menu items -->
          </div>
    tags:
      - performance
      - rendering
      - conditional
    python_version:
      min_version: null

  - id: VUE038
    title: "Always Use key with v-for"
    category: vue_performance
    level: beginner
    priority: critical
    applicability:
      frameworks:
        - vue
    content:
      description: |
        Always provide a unique key attribute when using v-for. Use stable
        identifiers (IDs), never array indices, for dynamic lists.
      rationale: |
        Keys enable Vue's virtual DOM diffing algorithm to efficiently track
        element identity. Without keys, Vue uses an inefficient in-place patch strategy.
      good_examples:
        - |
          <!-- ✅ Unique stable key -->
          <div v-for="user in users" :key="user.id">
            {{ user.name }}
          </div>

          <!-- ✅ Composite key when needed -->
          <div v-for="(item, index) in items" :key="`${item.type}-${item.id}`">
            {{ item.name }}
          </div>
      bad_examples:
        - |
          <!-- ❌ No key -->
          <div v-for="user in users">{{ user.name }}</div>

          <!-- ❌ Index as key with dynamic lists -->
          <div v-for="(user, index) in users" :key="index">{{ user.name }}</div>
    tags:
      - performance
      - rendering
      - v-for
    python_version:
      min_version: null

  - id: VUE039
    title: "Use KeepAlive for Caching Components"
    category: vue_performance
    level: intermediate
    priority: medium
    applicability:
      frameworks:
        - vue
    content:
      description: |
        Use KeepAlive to cache component instances when switching between views.
        Set max to limit cached instances and prevent memory issues.
      rationale: |
        KeepAlive preserves component state and avoids expensive re-creation,
        improving perceived performance for tab-style interfaces.
      good_examples:
        - |
          <template>
            <KeepAlive :max="5" :include="['Dashboard', 'Profile']">
              <component :is="currentTab" />
            </KeepAlive>
          </template>

          // In kept-alive components
          <script setup>
          import { onActivated, onDeactivated } from 'vue'

          onActivated(() => {
            // refresh data on re-activation
          })

          onDeactivated(() => {
            // pause expensive operations
          })
          </script>
    tags:
      - performance
      - caching
      - keep-alive
    python_version:
      min_version: null

  - id: VUE040
    title: "Virtualize Long Lists"
    category: vue_performance
    level: advanced
    priority: high
    applicability:
      frameworks:
        - vue
    content:
      description: |
        Use virtual scrolling for lists with 100+ items. Libraries like
        vue-virtual-scroller or @tanstack/vue-virtual render only visible items.
      rationale: |
        Rendering thousands of DOM nodes causes jank and high memory usage.
        Virtual scrolling keeps DOM node count constant regardless of list size.
      good_examples:
        - |
          <script setup lang="ts">
          import { useVirtualList } from '@vueuse/core'

          const { list, containerProps, wrapperProps } = useVirtualList(items, {
            itemHeight: 48,
          })
          </script>

          <template>
            <div v-bind="containerProps" style="height: 400px; overflow: auto">
              <div v-bind="wrapperProps">
                <div v-for="{ data, index } in list" :key="data.id" style="height: 48px">
                  {{ data.name }}
                </div>
              </div>
            </div>
          </template>
    tags:
      - performance
      - virtual-scrolling
      - large-lists
    python_version:
      min_version: null

