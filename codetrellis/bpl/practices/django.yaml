# Django Best Practices Library
# Version: 1.0.0
# Django Version: 4.2+ (with latest features)
# Total Practices: 30
# Coverage: Models, Views, Forms, Admin, Middleware, Security, Testing

version: '1.0.0'
framework: django
framework_version:
  min_version: '4.2'
description: 'Comprehensive Django best practices for web application development'

practices:
  # ============================================================================
  # MODELS & DATABASE (DJANGO001-DJANGO008)
  # ============================================================================

  - id: DJANGO001
    title: 'Use Django Model Best Practices'
    category: architecture
    level: beginner
    priority: critical
    applicability:
      frameworks:
        - django
    content:
      description: |
        Follow Django model conventions: use verbose names, help texts,
        proper field types, and implement __str__ method.
      rationale: |
        Well-structured models improve admin interface, debugging,
        and overall code maintainability.
      good_examples:
        - |
          # ✅ Well-structured Django model
          from django.db import models
          from django.utils.translation import gettext_lazy as _

          class Article(models.Model):
              """Published article with author and metadata."""

              class Status(models.TextChoices):
                  DRAFT = 'draft', _('Draft')
                  PUBLISHED = 'published', _('Published')
                  ARCHIVED = 'archived', _('Archived')

              title = models.CharField(
                  _('title'),
                  max_length=200,
                  help_text=_('Article headline'),
              )
              slug = models.SlugField(
                  _('slug'),
                  max_length=200,
                  unique=True,
                  db_index=True,
              )
              author = models.ForeignKey(
                  'auth.User',
                  on_delete=models.PROTECT,
                  related_name='articles',
                  verbose_name=_('author'),
              )
              content = models.TextField(_('content'))
              status = models.CharField(
                  _('status'),
                  max_length=20,
                  choices=Status.choices,
                  default=Status.DRAFT,
                  db_index=True,
              )
              created_at = models.DateTimeField(_('created at'), auto_now_add=True)
              updated_at = models.DateTimeField(_('updated at'), auto_now=True)

              class Meta:
                  verbose_name = _('article')
                  verbose_name_plural = _('articles')
                  ordering = ['-created_at']
                  indexes = [
                      models.Index(fields=['status', '-created_at']),
                  ]

              def __str__(self) -> str:
                  return self.title

              def get_absolute_url(self) -> str:
                  from django.urls import reverse
                  return reverse('article_detail', kwargs={'slug': self.slug})
      bad_examples:
        - |
          # ❌ Poorly structured model
          class Article(models.Model):
              title = models.CharField(max_length=200)
              slug = models.SlugField()  # No uniqueness, no index
              author = models.ForeignKey('auth.User', on_delete=models.CASCADE)
              content = models.TextField()
              status = models.CharField(max_length=20)  # No choices defined
              # No Meta class, no __str__, no timestamps
      references:
        - 'https://docs.djangoproject.com/en/4.2/topics/db/models/'
      tags:
        - models
        - database
        - django

  - id: DJANGO002
    title: 'Use Custom Model Managers and QuerySets'
    category: patterns
    level: intermediate
    priority: high
    applicability:
      frameworks:
        - django
    content:
      description: |
        Create custom managers and querysets to encapsulate common queries
        and keep business logic out of views.
      rationale: |
        Custom managers make queries reusable, testable, and keep
        the code DRY. They also improve readability.
      good_examples:
        - |
          # ✅ Custom QuerySet and Manager
          from django.db import models
          from django.utils import timezone

          class ArticleQuerySet(models.QuerySet):
              """Custom queryset for Article model."""

              def published(self):
                  """Return only published articles."""
                  return self.filter(
                      status=Article.Status.PUBLISHED,
                      published_at__lte=timezone.now(),
                  )

              def by_author(self, author):
                  """Filter articles by author."""
                  return self.filter(author=author)

              def recent(self, days: int = 7):
                  """Return articles from the last N days."""
                  cutoff = timezone.now() - timezone.timedelta(days=days)
                  return self.filter(created_at__gte=cutoff)

              def with_comment_count(self):
                  """Annotate with comment count."""
                  return self.annotate(
                      comment_count=models.Count('comments')
                  )

          class ArticleManager(models.Manager):
              """Custom manager using ArticleQuerySet."""

              def get_queryset(self):
                  return ArticleQuerySet(self.model, using=self._db)

              def published(self):
                  return self.get_queryset().published()

              def recent_published(self, days: int = 7):
                  return self.get_queryset().published().recent(days)

          class Article(models.Model):
              # ... fields ...
              objects = ArticleManager()

          # Usage:
          # Article.objects.published()
          # Article.objects.recent_published(30)
          # Article.objects.published().by_author(user).with_comment_count()
      bad_examples:
        - |
          # ❌ Query logic scattered in views
          def article_list(request):
              articles = Article.objects.filter(
                  status='published',
                  published_at__lte=timezone.now(),
              ).annotate(
                  comment_count=Count('comments')
              )  # Repeated everywhere
      references:
        - 'https://docs.djangoproject.com/en/4.2/topics/db/managers/'
      tags:
        - models
        - managers
        - querysets

  - id: DJANGO003
    title: 'Optimize Database Queries'
    category: performance
    level: intermediate
    priority: high
    applicability:
      frameworks:
        - django
    content:
      description: |
        Use select_related, prefetch_related, and only/defer to optimize
        database queries and avoid N+1 problems.
      rationale: |
        Unoptimized queries cause significant performance issues,
        especially with related objects.
      good_examples:
        - |
          # ✅ Optimized queries
          from django.db.models import Prefetch

          # select_related for ForeignKey/OneToOne (single JOIN)
          articles = Article.objects.select_related('author', 'category')
          for article in articles:
              print(article.author.name)  # No extra query

          # prefetch_related for ManyToMany/reverse ForeignKey
          articles = Article.objects.prefetch_related('tags', 'comments')
          for article in articles:
              for tag in article.tags.all():  # Already fetched
                  print(tag.name)

          # Custom Prefetch with filtering
          recent_comments = Comment.objects.filter(
              created_at__gte=timezone.now() - timedelta(days=7)
          ).select_related('author')

          articles = Article.objects.prefetch_related(
              Prefetch('comments', queryset=recent_comments, to_attr='recent_comments')
          )

          # Only fetch needed fields
          articles = Article.objects.only('title', 'slug', 'author_id')

          # Defer large fields
          articles = Article.objects.defer('content', 'metadata')

          # Bulk operations
          Article.objects.filter(status='draft').update(status='published')
          Article.objects.bulk_create([
              Article(title='A'), Article(title='B')
          ], batch_size=1000)
      bad_examples:
        - |
          # ❌ N+1 query problem
          articles = Article.objects.all()
          for article in articles:
              print(article.author.name)  # Query per article!
              for comment in article.comments.all():  # More queries!
                  print(comment.text)
      references:
        - 'https://docs.djangoproject.com/en/4.2/ref/models/querysets/'
      tags:
        - performance
        - queries
        - optimization

  - id: DJANGO004
    title: 'Use Database Migrations Properly'
    category: database
    level: beginner
    priority: critical
    applicability:
      frameworks:
        - django
    content:
      description: |
        Create atomic migrations, handle data migrations separately,
        and ensure migrations are reversible.
      rationale: |
        Proper migrations prevent data loss, enable rollbacks,
        and ensure smooth deployments.
      good_examples:
        - |
          # ✅ Data migration with RunPython
          from django.db import migrations

          def populate_slug(apps, schema_editor):
              Article = apps.get_model('blog', 'Article')
              for article in Article.objects.filter(slug=''):
                  article.slug = slugify(article.title)
                  article.save(update_fields=['slug'])

          def reverse_populate_slug(apps, schema_editor):
              # Reversible - set to empty string
              Article = apps.get_model('blog', 'Article')
              Article.objects.all().update(slug='')

          class Migration(migrations.Migration):
              dependencies = [
                  ('blog', '0002_add_slug_field'),
              ]

              operations = [
                  migrations.RunPython(
                      populate_slug,
                      reverse_populate_slug,
                  ),
              ]

          # ✅ Schema migration with sensible defaults
          class Migration(migrations.Migration):
              operations = [
                  migrations.AddField(
                      model_name='article',
                      name='view_count',
                      field=models.PositiveIntegerField(default=0),
                  ),
                  # Add index in separate migration to avoid locking
                  migrations.AddIndex(
                      model_name='article',
                      index=models.Index(fields=['view_count'], name='article_views_idx'),
                  ),
              ]
      bad_examples:
        - |
          # ❌ Non-reversible migration
          def delete_old_data(apps, schema_editor):
              Article = apps.get_model('blog', 'Article')
              Article.objects.filter(status='draft').delete()

          class Migration(migrations.Migration):
              operations = [
                  migrations.RunPython(delete_old_data),  # Can't reverse!
              ]
      references:
        - 'https://docs.djangoproject.com/en/4.2/topics/migrations/'
      tags:
        - migrations
        - database
        - deployment

  - id: DJANGO005
    title: 'Use Model Signals Sparingly'
    category: patterns
    level: intermediate
    priority: medium
    applicability:
      frameworks:
        - django
    content:
      description: |
        Use signals only for decoupled functionality. Prefer explicit
        method calls or model methods for coupled logic.
      rationale: |
        Signals create implicit dependencies that are hard to debug
        and test. Use them only for truly decoupled concerns.
      good_examples:
        - |
          # ✅ Appropriate signal use - decoupled audit logging
          from django.db.models.signals import post_save, post_delete
          from django.dispatch import receiver

          @receiver(post_save, sender=Article)
          def log_article_save(sender, instance, created, **kwargs):
              """Log article creation/update for audit trail."""
              action = 'created' if created else 'updated'
              AuditLog.objects.create(
                  model_name='Article',
                  object_id=instance.pk,
                  action=action,
              )

          # ✅ Better: explicit method call for coupled logic
          class Article(models.Model):
              def publish(self):
                  """Explicit publish method instead of signal."""
                  self.status = self.Status.PUBLISHED
                  self.published_at = timezone.now()
                  self.save()
                  # Clear related logic
                  self.notify_subscribers()
                  self.update_search_index()

              def notify_subscribers(self):
                  """Send notifications to subscribers."""
                  for subscriber in self.author.subscribers.all():
                      send_notification(subscriber, self)
      bad_examples:
        - |
          # ❌ Overusing signals for coupled logic
          @receiver(post_save, sender=Article)
          def on_article_save(sender, instance, created, **kwargs):
              # Too much logic in signal - hard to test/debug
              if created:
                  send_email(instance.author, 'Article created')
                  update_stats(instance.author)
                  clear_cache('articles')
                  index_article(instance)  # What if this fails?
      references:
        - 'https://docs.djangoproject.com/en/4.2/topics/signals/'
      tags:
        - signals
        - patterns
        - architecture

  - id: DJANGO006
    title: 'Implement Soft Delete Pattern'
    category: patterns
    level: intermediate
    priority: medium
    applicability:
      frameworks:
        - django
    content:
      description: |
        Use soft deletes for important data. Override delete() and
        create a custom manager to filter deleted records.
      rationale: |
        Soft deletes allow data recovery, maintain audit trails,
        and preserve referential integrity.
      good_examples:
        - |
          # ✅ Soft delete implementation
          from django.db import models
          from django.utils import timezone

          class SoftDeleteQuerySet(models.QuerySet):
              def delete(self):
                  """Soft delete all records in queryset."""
                  return self.update(deleted_at=timezone.now())

              def hard_delete(self):
                  """Actually delete records."""
                  return super().delete()

              def alive(self):
                  """Return non-deleted records."""
                  return self.filter(deleted_at__isnull=True)

              def dead(self):
                  """Return deleted records."""
                  return self.filter(deleted_at__isnull=False)

          class SoftDeleteManager(models.Manager):
              def get_queryset(self):
                  return SoftDeleteQuerySet(self.model, using=self._db).alive()

              def all_with_deleted(self):
                  return SoftDeleteQuerySet(self.model, using=self._db)

              def deleted_only(self):
                  return SoftDeleteQuerySet(self.model, using=self._db).dead()

          class SoftDeleteModel(models.Model):
              """Abstract base model with soft delete."""
              deleted_at = models.DateTimeField(null=True, blank=True, db_index=True)

              objects = SoftDeleteManager()
              all_objects = models.Manager()  # Include deleted

              class Meta:
                  abstract = True

              def delete(self, using=None, keep_parents=False):
                  self.deleted_at = timezone.now()
                  self.save(update_fields=['deleted_at'])

              def hard_delete(self):
                  super().delete()

              def restore(self):
                  self.deleted_at = None
                  self.save(update_fields=['deleted_at'])
      bad_examples:
        - |
          # ❌ Hard delete - data lost forever
          article.delete()  # Gone!

          # ❌ Manual soft delete without manager filter
          article.is_deleted = True
          article.save()
          # But Article.objects.all() still returns deleted!
      tags:
        - soft-delete
        - patterns
        - data-integrity

  - id: DJANGO007
    title: 'Use Database Constraints'
    category: database
    level: intermediate
    priority: high
    applicability:
      frameworks:
        - django
    content:
      description: |
        Use database-level constraints (unique_together, CheckConstraint,
        UniqueConstraint) to ensure data integrity.
      rationale: |
        Database constraints provide a safety net that Python code
        alone cannot guarantee, especially with concurrent requests.
      good_examples:
        - |
          # ✅ Database constraints
          from django.db import models
          from django.db.models import Q, F

          class Booking(models.Model):
              room = models.ForeignKey('Room', on_delete=models.CASCADE)
              user = models.ForeignKey('auth.User', on_delete=models.CASCADE)
              start_date = models.DateField()
              end_date = models.DateField()
              status = models.CharField(max_length=20)

              class Meta:
                  constraints = [
                      # Unique constraint with condition
                      models.UniqueConstraint(
                          fields=['room', 'start_date'],
                          condition=Q(status='confirmed'),
                          name='unique_confirmed_booking',
                      ),
                      # Check constraint
                      models.CheckConstraint(
                          check=Q(end_date__gt=F('start_date')),
                          name='booking_end_after_start',
                      ),
                      # Composite unique
                      models.UniqueConstraint(
                          fields=['user', 'room', 'start_date'],
                          name='unique_user_room_date',
                      ),
                  ]

          class Product(models.Model):
              name = models.CharField(max_length=100)
              price = models.DecimalField(max_digits=10, decimal_places=2)
              discount_price = models.DecimalField(
                  max_digits=10, decimal_places=2, null=True
              )

              class Meta:
                  constraints = [
                      models.CheckConstraint(
                          check=Q(price__gt=0),
                          name='positive_price',
                      ),
                      models.CheckConstraint(
                          check=Q(discount_price__isnull=True) | Q(discount_price__lt=F('price')),
                          name='discount_less_than_price',
                      ),
                  ]
      bad_examples:
        - |
          # ❌ Only Python validation - race condition possible
          def save(self, *args, **kwargs):
              if self.end_date <= self.start_date:
                  raise ValidationError('End must be after start')
              # Two requests can still create overlapping bookings!
              super().save(*args, **kwargs)
      references:
        - 'https://docs.djangoproject.com/en/4.2/ref/models/constraints/'
      tags:
        - constraints
        - database
        - data-integrity

  - id: DJANGO008
    title: 'Use Transactions Properly'
    category: database
    level: intermediate
    priority: high
    applicability:
      frameworks:
        - django
    content:
      description: |
        Use atomic transactions for operations that must succeed or
        fail together. Understand transaction isolation levels.
      rationale: |
        Proper transaction handling prevents data corruption and
        ensures consistency in multi-step operations.
      good_examples:
        - |
          # ✅ Atomic transactions
          from django.db import transaction

          @transaction.atomic
          def transfer_funds(from_account, to_account, amount):
              """Transfer money between accounts atomically."""
              from_account.balance = F('balance') - amount
              from_account.save(update_fields=['balance'])

              to_account.balance = F('balance') + amount
              to_account.save(update_fields=['balance'])

              # Create transaction records
              Transaction.objects.create(
                  account=from_account, amount=-amount, type='debit'
              )
              Transaction.objects.create(
                  account=to_account, amount=amount, type='credit'
              )
              # If any step fails, all changes are rolled back

          # ✅ Nested transaction with savepoint
          @transaction.atomic
          def create_order(user, items):
              order = Order.objects.create(user=user)

              for item in items:
                  try:
                      with transaction.atomic():
                          # Savepoint - can fail without rolling back order
                          OrderItem.objects.create(order=order, **item)
                          update_inventory(item['product_id'], -item['quantity'])
                  except InsufficientStock:
                      # This item failed, but order continues
                      pass

              return order

          # ✅ Select for update to prevent race conditions
          @transaction.atomic
          def reserve_seat(event_id, user):
              seat = Seat.objects.select_for_update().filter(
                  event_id=event_id, status='available'
              ).first()

              if not seat:
                  raise NoSeatsAvailable()

              seat.status = 'reserved'
              seat.reserved_by = user
              seat.save()
              return seat
      bad_examples:
        - |
          # ❌ No transaction - partial failure possible
          def transfer_funds(from_account, to_account, amount):
              from_account.balance -= amount
              from_account.save()  # If next line fails, money is lost!
              to_account.balance += amount
              to_account.save()
      references:
        - 'https://docs.djangoproject.com/en/4.2/topics/db/transactions/'
      tags:
        - transactions
        - database
        - atomicity

  # ============================================================================
  # VIEWS & URL ROUTING (DJANGO009-DJANGO014)
  # ============================================================================

  - id: DJANGO009
    title: 'Use Class-Based Views Appropriately'
    category: architecture
    level: intermediate
    priority: high
    applicability:
      frameworks:
        - django
    content:
      description: |
        Use CBVs for CRUD operations and standard patterns. Use FBVs
        for simple or highly custom logic. Prefer generic views.
      rationale: |
        CBVs reduce boilerplate for common patterns, while FBVs
        can be clearer for simple or unusual cases.
      good_examples:
        - |
          # ✅ Generic CBVs for CRUD
          from django.views.generic import (
              ListView, DetailView, CreateView, UpdateView, DeleteView
          )
          from django.contrib.auth.mixins import LoginRequiredMixin, UserPassesTestMixin
          from django.urls import reverse_lazy

          class ArticleListView(ListView):
              model = Article
              template_name = 'articles/list.html'
              context_object_name = 'articles'
              paginate_by = 20

              def get_queryset(self):
                  return Article.objects.published().select_related('author')

          class ArticleDetailView(DetailView):
              model = Article
              template_name = 'articles/detail.html'
              context_object_name = 'article'
              slug_url_kwarg = 'article_slug'

              def get_queryset(self):
                  return super().get_queryset().select_related('author')

          class ArticleCreateView(LoginRequiredMixin, CreateView):
              model = Article
              form_class = ArticleForm
              template_name = 'articles/form.html'
              success_url = reverse_lazy('article_list')

              def form_valid(self, form):
                  form.instance.author = self.request.user
                  return super().form_valid(form)

          class ArticleUpdateView(LoginRequiredMixin, UserPassesTestMixin, UpdateView):
              model = Article
              form_class = ArticleForm
              template_name = 'articles/form.html'

              def test_func(self):
                  return self.get_object().author == self.request.user

          # ✅ FBV for simple custom logic
          @login_required
          def toggle_favorite(request, article_id):
              """Simple toggle - FBV is clearer here."""
              article = get_object_or_404(Article, pk=article_id)
              favorite, created = Favorite.objects.get_or_create(
                  user=request.user, article=article
              )
              if not created:
                  favorite.delete()
              return JsonResponse({'favorited': created})
      bad_examples:
        - |
          # ❌ Reinventing the wheel
          class MyListView(View):
              def get(self, request):
                  articles = Article.objects.all()
                  paginator = Paginator(articles, 20)
                  page = request.GET.get('page')
                  # ... manual pagination ...
                  return render(request, 'list.html', {'articles': articles})
      references:
        - 'https://docs.djangoproject.com/en/4.2/topics/class-based-views/'
      tags:
        - views
        - cbv
        - architecture

  - id: DJANGO010
    title: 'Use Django REST Framework for APIs'
    category: api_design
    level: intermediate
    priority: high
    applicability:
      frameworks:
        - django
    content:
      description: |
        Use Django REST Framework (DRF) for building APIs. Use serializers,
        viewsets, and proper authentication/permissions.
      rationale: |
        DRF provides a robust, well-tested foundation for REST APIs
        with automatic documentation, validation, and authentication.
      good_examples:
        - |
          # ✅ DRF serializers and viewsets
          from rest_framework import serializers, viewsets, permissions
          from rest_framework.decorators import action
          from rest_framework.response import Response

          class ArticleSerializer(serializers.ModelSerializer):
              author = serializers.StringRelatedField(read_only=True)
              comment_count = serializers.IntegerField(read_only=True)

              class Meta:
                  model = Article
                  fields = ['id', 'title', 'slug', 'content', 'author',
                           'status', 'comment_count', 'created_at']
                  read_only_fields = ['slug', 'created_at']

              def create(self, validated_data):
                  validated_data['author'] = self.context['request'].user
                  validated_data['slug'] = slugify(validated_data['title'])
                  return super().create(validated_data)

          class IsAuthorOrReadOnly(permissions.BasePermission):
              def has_object_permission(self, request, view, obj):
                  if request.method in permissions.SAFE_METHODS:
                      return True
                  return obj.author == request.user

          class ArticleViewSet(viewsets.ModelViewSet):
              queryset = Article.objects.all()
              serializer_class = ArticleSerializer
              permission_classes = [permissions.IsAuthenticatedOrReadOnly, IsAuthorOrReadOnly]
              lookup_field = 'slug'

              def get_queryset(self):
                  return Article.objects.published().annotate(
                      comment_count=Count('comments')
                  ).select_related('author')

              @action(detail=True, methods=['post'])
              def publish(self, request, slug=None):
                  article = self.get_object()
                  article.publish()
                  return Response({'status': 'published'})
      bad_examples:
        - |
          # ❌ Manual JSON serialization
          @csrf_exempt
          def api_articles(request):
              if request.method == 'GET':
                  articles = Article.objects.all()
                  data = [{'id': a.id, 'title': a.title} for a in articles]
                  return JsonResponse({'articles': data})
              # No authentication, no validation, no permissions...
      references:
        - 'https://www.django-rest-framework.org/'
      tags:
        - drf
        - api
        - rest

  - id: DJANGO011
    title: 'Proper URL Configuration'
    category: routing
    level: beginner
    priority: high
    applicability:
      frameworks:
        - django
    content:
      description: |
        Use app-level URL namespaces, path converters, and named URLs.
        Organize URLs logically by app.
      rationale: |
        Good URL structure makes routing maintainable, enables
        reverse URL resolution, and prevents naming conflicts.
      good_examples:
        - |
          # ✅ App-level urls.py with namespace
          # blog/urls.py
          from django.urls import path, include
          from . import views

          app_name = 'blog'  # Namespace

          urlpatterns = [
              path('', views.ArticleListView.as_view(), name='article_list'),
              path('<slug:slug>/', views.ArticleDetailView.as_view(), name='article_detail'),
              path('<slug:slug>/edit/', views.ArticleUpdateView.as_view(), name='article_edit'),
              path('create/', views.ArticleCreateView.as_view(), name='article_create'),
              path('author/<str:username>/', views.AuthorArticlesView.as_view(), name='author_articles'),
          ]

          # ✅ Project urls.py
          # project/urls.py
          from django.urls import path, include

          urlpatterns = [
              path('admin/', admin.site.urls),
              path('blog/', include('blog.urls', namespace='blog')),
              path('api/v1/', include('api.urls', namespace='api_v1')),
              path('api/v2/', include('api.v2.urls', namespace='api_v2')),
          ]

          # ✅ Using reverse with namespace
          from django.urls import reverse

          url = reverse('blog:article_detail', kwargs={'slug': 'my-article'})
          # In template: {% url 'blog:article_detail' slug=article.slug %}
      bad_examples:
        - |
          # ❌ Flat URLs without namespace
          urlpatterns = [
              path('article-list/', article_list),  # No name!
              path('article/<int:id>/', article_detail),  # Using id instead of slug
              # Hundreds of URLs in one file...
          ]
      references:
        - 'https://docs.djangoproject.com/en/4.2/topics/http/urls/'
      tags:
        - urls
        - routing
        - namespaces

  - id: DJANGO012
    title: 'Handle Form Validation Properly'
    category: forms
    level: intermediate
    priority: high
    applicability:
      frameworks:
        - django
    content:
      description: |
        Use Django forms for validation. Implement clean methods for
        field-level and form-level validation.
      rationale: |
        Forms provide consistent validation, CSRF protection,
        and proper error handling.
      good_examples:
        - |
          # ✅ Form with custom validation
          from django import forms
          from django.core.exceptions import ValidationError

          class ArticleForm(forms.ModelForm):
              class Meta:
                  model = Article
                  fields = ['title', 'content', 'category', 'tags']
                  widgets = {
                      'content': forms.Textarea(attrs={'rows': 10}),
                      'tags': forms.CheckboxSelectMultiple(),
                  }

              def clean_title(self):
                  """Field-level validation."""
                  title = self.cleaned_data['title']
                  if Article.objects.filter(
                      slug=slugify(title)
                  ).exclude(pk=self.instance.pk).exists():
                      raise ValidationError('An article with this title already exists.')
                  return title

              def clean(self):
                  """Form-level validation."""
                  cleaned_data = super().clean()
                  category = cleaned_data.get('category')
                  content = cleaned_data.get('content')

                  if category and category.requires_long_content:
                      if content and len(content) < 500:
                          raise ValidationError({
                              'content': 'This category requires at least 500 characters.'
                          })

                  return cleaned_data

          # ✅ View handling form
          class ArticleCreateView(LoginRequiredMixin, CreateView):
              model = Article
              form_class = ArticleForm

              def form_valid(self, form):
                  form.instance.author = self.request.user
                  messages.success(self.request, 'Article created successfully!')
                  return super().form_valid(form)

              def form_invalid(self, form):
                  messages.error(self.request, 'Please correct the errors below.')
                  return super().form_invalid(form)
      bad_examples:
        - |
          # ❌ Manual validation in view
          def create_article(request):
              title = request.POST.get('title')
              if not title:
                  return HttpResponse('Title required', status=400)
              if len(title) > 200:
                  return HttpResponse('Title too long', status=400)
              # No CSRF protection, no proper error handling...
      references:
        - 'https://docs.djangoproject.com/en/4.2/topics/forms/'
      tags:
        - forms
        - validation
        - security

  - id: DJANGO013
    title: 'Use Middleware Appropriately'
    category: patterns
    level: intermediate
    priority: medium
    applicability:
      frameworks:
        - django
    content:
      description: |
        Create custom middleware for cross-cutting concerns like logging,
        timing, or request modification. Keep middleware focused.
      rationale: |
        Middleware handles concerns that span multiple views without
        duplicating code, but should be used sparingly.
      good_examples:
        - |
          # ✅ Request timing middleware
          import time
          import logging

          logger = logging.getLogger(__name__)

          class RequestTimingMiddleware:
              """Log request processing time."""

              def __init__(self, get_response):
                  self.get_response = get_response

              def __call__(self, request):
                  start_time = time.time()

                  response = self.get_response(request)

                  duration = time.time() - start_time
                  logger.info(
                      f'{request.method} {request.path} - {response.status_code} - {duration:.3f}s'
                  )
                  response['X-Request-Duration'] = f'{duration:.3f}'

                  return response

          # ✅ Correlation ID middleware
          import uuid

          class CorrelationIdMiddleware:
              """Add correlation ID to requests for tracing."""

              def __init__(self, get_response):
                  self.get_response = get_response

              def __call__(self, request):
                  correlation_id = request.headers.get(
                      'X-Correlation-ID',
                      str(uuid.uuid4())
                  )
                  request.correlation_id = correlation_id

                  response = self.get_response(request)
                  response['X-Correlation-ID'] = correlation_id

                  return response

          # ✅ settings.py
          MIDDLEWARE = [
              'django.middleware.security.SecurityMiddleware',
              'myapp.middleware.CorrelationIdMiddleware',  # Early
              'django.contrib.sessions.middleware.SessionMiddleware',
              # ...
              'myapp.middleware.RequestTimingMiddleware',  # Late
          ]
      bad_examples:
        - |
          # ❌ Business logic in middleware
          class ArticleMiddleware:
              def __call__(self, request):
                  if request.path.startswith('/articles/'):
                      # Don't put view logic in middleware!
                      request.featured_articles = Article.objects.featured()[:5]
                  return self.get_response(request)
      references:
        - 'https://docs.djangoproject.com/en/4.2/topics/http/middleware/'
      tags:
        - middleware
        - patterns
        - logging

  - id: DJANGO014
    title: 'Implement Proper Pagination'
    category: performance
    level: beginner
    priority: high
    applicability:
      frameworks:
        - django
    content:
      description: |
        Always paginate list views. Use Django's built-in pagination
        or cursor-based pagination for large datasets.
      rationale: |
        Pagination prevents loading excessive data, improves response
        times, and provides better UX.
      good_examples:
        - |
          # ✅ CBV with pagination
          from django.views.generic import ListView

          class ArticleListView(ListView):
              model = Article
              paginate_by = 20
              template_name = 'articles/list.html'

              def get_queryset(self):
                  return Article.objects.published().select_related('author')

          # ✅ FBV with pagination
          from django.core.paginator import Paginator, EmptyPage, PageNotAnInteger

          def article_list(request):
              articles = Article.objects.published()
              paginator = Paginator(articles, 20)

              page = request.GET.get('page', 1)
              try:
                  page_obj = paginator.page(page)
              except PageNotAnInteger:
                  page_obj = paginator.page(1)
              except EmptyPage:
                  page_obj = paginator.page(paginator.num_pages)

              return render(request, 'articles/list.html', {
                  'page_obj': page_obj,
              })

          # ✅ Template with pagination
          # templates/articles/list.html
          """
          {% for article in page_obj %}
              {{ article.title }}
          {% endfor %}

          <nav>
              {% if page_obj.has_previous %}
                  <a href="?page={{ page_obj.previous_page_number }}">Previous</a>
              {% endif %}

              <span>Page {{ page_obj.number }} of {{ page_obj.paginator.num_pages }}</span>

              {% if page_obj.has_next %}
                  <a href="?page={{ page_obj.next_page_number }}">Next</a>
              {% endif %}
          </nav>
          """
      bad_examples:
        - |
          # ❌ No pagination - loads everything
          def article_list(request):
              articles = Article.objects.all()  # Could be millions!
              return render(request, 'list.html', {'articles': articles})
      tags:
        - pagination
        - performance
        - ux

