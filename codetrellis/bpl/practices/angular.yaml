  - id: NG041
    title: 'Track By for Lists'
    category: performance
    level: beginner
    priority: critical
    angular_version:
      min_version: '17.0'
    content:
      description: |
        Always use track expression in @for loops. It's required in Angular 17+
        and essential for efficient DOM updates.
      rationale: |
        Track expressions enable Angular to identify items and minimize
        DOM operations when lists change.
      good_examples:
        - |
          @Component({
            template: `
              <!-- Track by unique ID (best) -->
              @for (user of users(); track user.id) {
                <app-user-card [user]="user" />
              }

              <!-- Track by index (use only for static lists) -->
              @for (item of staticItems; track $index) {
                <li>{{ item }}</li>
              }

              <!-- Track by composite key -->
              @for (item of items(); track item.categoryId + '-' + item.id) {
                <app-item [data]="item" />
              }

              <!-- Track by computed value -->
              @for (order of orders(); track trackOrder(order)) {
                <app-order [order]="order" />
              }
            `
          })
          export class ListComponent {
            users = signal<User[]>([]);
            items = signal<Item[]>([]);
            orders = signal<Order[]>([]);
            staticItems = ['A', 'B', 'C'];

            trackOrder(order: Order): string {
              return `${order.id}-${order.version}`;
            }
          }
      bad_examples:
        - |
          // ❌ Missing track (error in Angular 17+)
          @for (user of users()) {
            <app-user-card [user]="user" />
          }

          // ❌ Track by index for dynamic lists
          @for (user of users(); track $index) {
            <app-user-card [user]="user" />
          }
      tags:
        - performance
        - for-loop
        - track

  - id: NG042
    title: 'Virtual Scrolling'
    category: performance
    level: intermediate
    priority: high
    angular_version:
      min_version: '7.0'
    content:
      description: |
        Use CDK virtual scrolling for large lists to render only visible items.
        Essential for lists with hundreds or thousands of items.
      rationale: |
        Virtual scrolling dramatically reduces memory usage and improves
        performance by rendering only visible DOM elements.
      good_examples:
        - |
          import { ScrollingModule } from '@angular/cdk/scrolling';

          @Component({
            standalone: true,
            imports: [ScrollingModule],
            template: `
              <!-- Fixed size items -->
              <cdk-virtual-scroll-viewport itemSize="50" class="list-viewport">
                <div *cdkVirtualFor="let item of items(); trackBy: trackById" class="item">
                  {{ item.name }}
                </div>
              </cdk-virtual-scroll-viewport>

              <!-- Variable size items with autosize -->
              <cdk-virtual-scroll-viewport autosize class="list-viewport">
                <app-item
                  *cdkVirtualFor="let item of items(); trackBy: trackById"
                  [item]="item"
                />
              </cdk-virtual-scroll-viewport>
            `,
            styles: [`
              .list-viewport {
                height: 400px;
                width: 100%;
              }

              .item {
                height: 50px;
              }
            `]
          })
          export class VirtualListComponent {
            items = signal<Item[]>([]);

            trackById(index: number, item: Item): string {
              return item.id;
            }
          }
      tags:
        - performance
        - virtual-scroll
        - cdk

  - id: NG043
    title: 'Image Optimization'
    category: performance
    level: beginner
    priority: high
    angular_version:
      min_version: '15.0'
    content:
      description: |
        Use NgOptimizedImage directive for automatic image optimization,
        lazy loading, and proper sizing.
      rationale: |
        NgOptimizedImage enforces best practices and can significantly
        improve LCP (Largest Contentful Paint) scores.
      good_examples:
        - |
          import { NgOptimizedImage } from '@angular/common';

          @Component({
            standalone: true,
            imports: [NgOptimizedImage],
            template: `
              <!-- Basic usage (must specify width and height) -->
              <img
                ngSrc="/images/hero.jpg"
                width="1200"
                height="600"
                alt="Hero image"
                priority
              />

              <!-- Responsive image with fill -->
              <div class="image-container">
                <img
                  ngSrc="/images/product.jpg"
                  fill
                  [alt]="product().name"
                  sizes="(max-width: 768px) 100vw, 50vw"
                />
              </div>

              <!-- Lazy loaded (default) with placeholder -->
              <img
                ngSrc="/images/thumbnail.jpg"
                width="200"
                height="200"
                [placeholder]="placeholderUrl"
                alt="Thumbnail"
              />

              <!-- Using image loader -->
              <img
                ngSrc="product-123"
                width="400"
                height="400"
                [loaderParams]="{ quality: 80 }"
                alt="Product"
              />
            `,
            styles: [`
              .image-container {
                position: relative;
                width: 100%;
                height: 300px;
              }
            `]
          })
          export class ImageComponent {
            product = input.required<Product>();
            placeholderUrl = 'data:image/svg+xml,...';
          }
      tags:
        - performance
        - images
        - optimization

  - id: NG044
    title: 'Bundle Analysis and Optimization'
    category: performance
    level: advanced
    priority: high
    angular_version:
      min_version: '16.0'
    content:
      description: |
        Analyze and optimize bundle size using source-map-explorer or
        webpack-bundle-analyzer. Identify and fix large dependencies.
      rationale: |
        Understanding bundle composition helps identify optimization
        opportunities and prevent bundle bloat.
      good_examples:
        - |
          // package.json scripts
          {
            "scripts": {
              "analyze": "ng build --source-map && source-map-explorer dist/**/*.js",
              "analyze:bundle": "ng build --stats-json && webpack-bundle-analyzer dist/stats.json"
            }
          }

          // Common optimizations:

          // 1. Import specific lodash functions
          // ❌ import _ from 'lodash';
          // ✅ import debounce from 'lodash/debounce';

          // 2. Use date-fns instead of moment
          // ❌ import moment from 'moment';
          // ✅ import { format, parseISO } from 'date-fns';

          // 3. Lazy load heavy components
          @Component({
            template: `
              @defer (on viewport) {
                <app-chart-library />
              }
            `
          })

          // 4. Tree-shake icons
          // ❌ import { MatIconModule } from '@angular/material/icon';
          // ✅ Import only needed icons

          // 5. angular.json optimization
          {
            "optimization": {
              "scripts": true,
              "styles": {
                "minify": true,
                "inlineCritical": true
              },
