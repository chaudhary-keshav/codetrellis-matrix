  # ============================================================================

  - id: NG036
    title: 'Component Testing with Signals'
    category: testing
    level: intermediate
    priority: critical
    angular_version:
      min_version: '17.0'
    content:
      description: |
        Test components with signal inputs using ComponentFixture.componentRef.setInput().
        Understand signal reactivity in tests.
      rationale: |
        Proper signal testing ensures components behave correctly when
        inputs change and computed values update.
      good_examples:
        - |
          describe('UserCardComponent', () => {
            let fixture: ComponentFixture<UserCardComponent>;
            let component: UserCardComponent;

            beforeEach(async () => {
              await TestBed.configureTestingModule({
                imports: [UserCardComponent]
              }).compileComponents();

              fixture = TestBed.createComponent(UserCardComponent);
              component = fixture.componentInstance;
            });

            it('should display user name', () => {
              // Set signal input
              fixture.componentRef.setInput('user', { name: 'John', email: 'john@test.com' });
              fixture.detectChanges();

              expect(fixture.nativeElement.textContent).toContain('John');
            });

            it('should update when input changes', () => {
              fixture.componentRef.setInput('user', { name: 'John' });
              fixture.detectChanges();

              // Update input
              fixture.componentRef.setInput('user', { name: 'Jane' });
              fixture.detectChanges();

              expect(fixture.nativeElement.textContent).toContain('Jane');
            });

            it('should compute full name', () => {
              fixture.componentRef.setInput('firstName', 'John');
              fixture.componentRef.setInput('lastName', 'Doe');
              fixture.detectChanges();

              // Access computed signal
              expect(component.fullName()).toBe('John Doe');
            });

            it('should emit output event', () => {
              const spy = jest.fn();
              component.userSelected.subscribe(spy);

              fixture.componentRef.setInput('user', { id: '1', name: 'John' });
              fixture.detectChanges();

              fixture.nativeElement.querySelector('button').click();

              expect(spy).toHaveBeenCalledWith({ id: '1', name: 'John' });
            });
          });
      tags:
        - testing
        - signals
        - component-testing

  - id: NG037
    title: 'Service Testing'
    category: testing
    level: intermediate
    priority: high
    angular_version:
      min_version: '16.0'
    content:
      description: |
        Test services with signal-based state using TestBed. Mock dependencies
        with injection tokens. Test effects with fakeAsync.
      rationale: |
        Thorough service testing ensures business logic works correctly
        and signal reactivity behaves as expected.
      good_examples:
        - |
          describe('AuthService', () => {
            let service: AuthService;
            let httpMock: HttpTestingController;

            beforeEach(() => {
              TestBed.configureTestingModule({
                imports: [HttpClientTestingModule],
                providers: [
                  AuthService,
                  { provide: ENVIRONMENT, useValue: { apiUrl: 'http://test' } }
                ]
              });

              service = TestBed.inject(AuthService);
              httpMock = TestBed.inject(HttpTestingController);
            });

            afterEach(() => {
              httpMock.verify();
            });

            it('should be unauthenticated initially', () => {
              expect(service.isAuthenticated()).toBe(false);
              expect(service.user()).toBeNull();
            });

            it('should update state on login', async () => {
              const user = { id: '1', name: 'Test' };
              const loginPromise = service.login({ email: 'test@test.com', password: 'pass' });

              const req = httpMock.expectOne('http://test/api/auth/login');
              req.flush(user);

              await loginPromise;

              expect(service.isAuthenticated()).toBe(true);
              expect(service.user()).toEqual(user);
            });

            it('should handle login error', async () => {
              const loginPromise = service.login({ email: 'test@test.com', password: 'wrong' });

              const req = httpMock.expectOne('http://test/api/auth/login');
              req.flush('Unauthorized', { status: 401, statusText: 'Unauthorized' });

              await expect(loginPromise).rejects.toThrow();
              expect(service.error()).toBe('Login failed');
              expect(service.isAuthenticated()).toBe(false);
            });
          });
      tags:
        - testing
        - services
        - http-testing

  - id: NG038
    title: 'Testing with Harnesses'
    category: testing
    level: advanced
    priority: medium
    angular_version:
      min_version: '10.0'
    content:
      description: |
        Use component harnesses for reliable, resilient UI testing.
        Create custom harnesses for your components.
      rationale: |
        Harnesses abstract DOM queries, making tests more maintainable
        and resistant to template changes.
      good_examples:
        - |
          // Custom harness
          export class UserCardHarness extends ComponentHarness {
            static hostSelector = 'app-user-card';

            private getNameElement = this.locatorFor('.user-name');
            private getEditButton = this.locatorFor('button.edit');
            private getDeleteButton = this.locatorForOptional('button.delete');

            async getName(): Promise<string> {
              const el = await this.getNameElement();
              return el.text();
            }

            async clickEdit(): Promise<void> {
              const button = await this.getEditButton();
              return button.click();
            }

            async hasDeleteButton(): Promise<boolean> {
              const button = await this.getDeleteButton();
              return button !== null;
            }
          }

          // Using harness in tests
          describe('UserCardComponent', () => {
            let loader: HarnessLoader;

            beforeEach(async () => {
              await TestBed.configureTestingModule({
                imports: [UserCardComponent]
              }).compileComponents();

              const fixture = TestBed.createComponent(TestHostComponent);
              loader = TestbedHarnessEnvironment.loader(fixture);
            });

            it('should display user name', async () => {
              const harness = await loader.getHarness(UserCardHarness);
              expect(await harness.getName()).toBe('John Doe');
            });

            it('should handle edit click', async () => {
              const harness = await loader.getHarness(UserCardHarness);
              await harness.clickEdit();
              // Assert edit behavior
            });
          });
      tags:
        - testing
        - harnesses
        - component-testing

  - id: NG039
    title: 'Effect and Timer Testing'
    category: testing
    level: advanced
    priority: medium
    angular_version:
      min_version: '16.0'
    content:
      description: |
        Test effects and timer-based code using fakeAsync, tick, and flush.
        Understand TestBed.flushEffects() for signal effects.
      rationale: |
        Async code requires special testing utilities to control time
        and ensure all effects have completed.
      good_examples:
        - |
          describe('SearchComponent', () => {
            it('should debounce search', fakeAsync(() => {
              const fixture = TestBed.createComponent(SearchComponent);
              const component = fixture.componentInstance;
              const searchSpy = jest.spyOn(component['searchService'], 'search')
                .mockReturnValue(of([]));

              component.query.set('test');

              // Effect hasn't run yet
              expect(searchSpy).not.toHaveBeenCalled();

              // Advance past debounce time
              tick(300);
              TestBed.flushEffects();

              expect(searchSpy).toHaveBeenCalledWith('test');
            }));

            it('should cancel pending search on new query', fakeAsync(() => {
              const fixture = TestBed.createComponent(SearchComponent);
              const component = fixture.componentInstance;
              const searchSpy = jest.spyOn(component['searchService'], 'search')
                .mockReturnValue(of([]));

              component.query.set('first');
              tick(100);

              component.query.set('second');
              tick(300);
              TestBed.flushEffects();

              // Only second search should happen
              expect(searchSpy).toHaveBeenCalledTimes(1);
              expect(searchSpy).toHaveBeenCalledWith('second');
            }));

            it('should handle interval updates', fakeAsync(() => {
              const fixture = TestBed.createComponent(TimerComponent);
              fixture.detectChanges();

              expect(fixture.componentInstance.count()).toBe(0);

              tick(1000);
              expect(fixture.componentInstance.count()).toBe(1);

              tick(5000);
              expect(fixture.componentInstance.count()).toBe(6);

              discardPeriodicTasks();
            }));
          });
      tags:
        - testing
        - async
        - effects

  - id: NG040
    title: 'E2E Testing Best Practices'
    category: testing
    level: advanced
    priority: medium
    angular_version:
      min_version: '12.0'
    content:
      description: |
        Write E2E tests using Playwright or Cypress with page object pattern.
        Focus on user flows and critical paths.
      rationale: |
        E2E tests verify the application works correctly from a user's
        perspective, catching integration issues.
      good_examples:
        - |
          // Playwright example with page object
          // pages/login.page.ts
          export class LoginPage {
            readonly page: Page;
            readonly emailInput: Locator;
            readonly passwordInput: Locator;
            readonly submitButton: Locator;
            readonly errorMessage: Locator;

            constructor(page: Page) {
              this.page = page;
              this.emailInput = page.getByLabel('Email');
              this.passwordInput = page.getByLabel('Password');
              this.submitButton = page.getByRole('button', { name: 'Sign In' });
              this.errorMessage = page.getByRole('alert');
            }

            async goto(): Promise<void> {
              await this.page.goto('/login');
            }

            async login(email: string, password: string): Promise<void> {
              await this.emailInput.fill(email);
              await this.passwordInput.fill(password);
              await this.submitButton.click();
            }
          }

          // login.spec.ts
          test.describe('Login', () => {
            let loginPage: LoginPage;

            test.beforeEach(async ({ page }) => {
              loginPage = new LoginPage(page);
              await loginPage.goto();
            });

            test('successful login redirects to dashboard', async ({ page }) => {
              await loginPage.login('user@test.com', 'password');

              await expect(page).toHaveURL('/dashboard');
              await expect(page.getByText('Welcome')).toBeVisible();
            });

            test('invalid credentials show error', async () => {
              await loginPage.login('user@test.com', 'wrong');

              await expect(loginPage.errorMessage).toBeVisible();
              await expect(loginPage.errorMessage).toContainText('Invalid credentials');
            });
          });
      tags:
        - testing
        - e2e
        - playwright

