  - id: NG045
    title: 'Zone.js Optimization'
    category: performance
    level: expert
    priority: medium
    angular_version:
      min_version: '18.0'
    content:
      description: |
        Optimize or eliminate Zone.js for better performance. Use zoneless
        change detection with signals for maximum efficiency.
      rationale: |
        Zone.js patches all async APIs and triggers change detection.
        Zoneless mode with signals provides fine-grained updates.
      good_examples:
        - |
          // Enable experimental zoneless mode (Angular 18+)
          // main.ts
          bootstrapApplication(AppComponent, {
            providers: [
              provideExperimentalZonelessChangeDetection()
            ]
          });

          // Component must use signals for reactivity
          @Component({
            changeDetection: ChangeDetectionStrategy.OnPush,
            template: `
              <p>Count: {{ count() }}</p>
              <button (click)="increment()">+</button>
            `
          })
          export class CounterComponent {
            count = signal(0);

            increment(): void {
              this.count.update(c => c + 1);
            }
          }

          // For Zone.js apps, optimize with runOutsideAngular
          @Component({...})
          export class AnimationComponent {
            private ngZone = inject(NgZone);

            startAnimation(): void {
              this.ngZone.runOutsideAngular(() => {
                // Heavy animation code that doesn't need CD
                requestAnimationFrame(this.animate.bind(this));
              });
            }

            onAnimationComplete(): void {
              this.ngZone.run(() => {
                // Update signals/trigger CD when needed
                this.animationComplete.set(true);
              });
            }
          }
      tags:
        - performance
        - zoneless
        - change-detection
