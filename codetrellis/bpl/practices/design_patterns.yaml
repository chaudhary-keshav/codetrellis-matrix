  - id: DP001
    title: 'Singleton Pattern'
    category: patterns
    level: beginner
    priority: high
    content:
      description: |
        Ensure a class has only one instance and provide a global point of access.
        In modern frameworks, prefer dependency injection over global singletons.
      rationale: |
        Singletons control shared resources (DB connections, configurations).
        However, they can make testing difficult and create hidden dependencies.
      good_examples:
        - |
          # Python - Thread-safe Singleton with metaclass
          import threading
          from typing import ClassVar, Dict, Any

          class SingletonMeta(type):
              """Thread-safe singleton metaclass."""
              _instances: ClassVar[Dict[type, Any]] = {}
              _lock: ClassVar[threading.Lock] = threading.Lock()

              def __call__(cls, *args, **kwargs):
                  with cls._lock:
                      if cls not in cls._instances:
                          instance = super().__call__(*args, **kwargs)
                          cls._instances[cls] = instance
                  return cls._instances[cls]

          class DatabaseConnection(metaclass=SingletonMeta):
              def __init__(self):
                  self.connection = self._create_connection()

              def _create_connection(self):
                  return "Connected"

          # Usage
          db1 = DatabaseConnection()
          db2 = DatabaseConnection()
          assert db1 is db2  # Same instance
        - |
          // TypeScript - Module-based singleton (preferred)
          class Logger {
            private static instance: Logger;
            private logs: string[] = [];

            private constructor() {} // Private constructor

            static getInstance(): Logger {
              if (!Logger.instance) {
                Logger.instance = new Logger();
              }
              return Logger.instance;
            }

            log(message: string): void {
              this.logs.push(`[${new Date().toISOString()}] ${message}`);
            }
          }

          // Better: Use dependency injection
          @Injectable({ providedIn: 'root' }) // Angular singleton
          export class LoggerService {
            private logs: string[] = [];

            log(message: string): void {
              this.logs.push(message);
            }
          }
      anti_patterns:
        - Overusing singletons for things that don't need global state
        - Making testing difficult by not allowing injection
        - Hidden dependencies through global access
      tags:
        - creational
        - singleton
        - gof

  - id: DP002
    title: 'Factory Method Pattern'
    category: patterns
    level: intermediate
    priority: high
    content:
      description: |
        Define an interface for creating an object, but let subclasses decide
        which class to instantiate. Defer instantiation to subclasses.
      rationale: |
        Factory Method provides flexibility in object creation, enabling
        code to work with different implementations without modification.
      good_examples:
        - |
          # Python - Factory Method
          from abc import ABC, abstractmethod
          from typing import Protocol

          class Document(Protocol):
              def render(self) -> str: ...

          class PDFDocument:
              def render(self) -> str:
                  return "Rendering PDF"

          class HTMLDocument:
              def render(self) -> str:
                  return "Rendering HTML"

          class DocumentCreator(ABC):
              @abstractmethod
              def create_document(self) -> Document:
                  """Factory method - subclasses decide what to create."""
                  pass

              def process(self) -> str:
                  doc = self.create_document()
                  return doc.render()

          class PDFCreator(DocumentCreator):
              def create_document(self) -> Document:
                  return PDFDocument()

          class HTMLCreator(DocumentCreator):
              def create_document(self) -> Document:
                  return HTMLDocument()

          # Usage
          def process_document(creator: DocumentCreator) -> str:
              return creator.process()
        - |
          // TypeScript - Factory Method with generics
          interface Notification {
            send(message: string): void;
          }

          class EmailNotification implements Notification {
            constructor(private email: string) {}
            send(message: string): void {
              console.log(`Email to ${this.email}: ${message}`);
            }
          }

          class SMSNotification implements Notification {
            constructor(private phone: string) {}
            send(message: string): void {
              console.log(`SMS to ${this.phone}: ${message}`);
            }
          }

          // Factory function (simpler approach)
          function createNotification(type: 'email' | 'sms', recipient: string): Notification {
            switch (type) {
              case 'email': return new EmailNotification(recipient);
              case 'sms': return new SMSNotification(recipient);
            }
          }
      tags:
        - creational
        - factory
        - gof

  - id: DP003
    title: 'Abstract Factory Pattern'
    category: patterns
    level: advanced
    priority: medium
    content:
      description: |
        Provide an interface for creating families of related objects without
        specifying their concrete classes. Creates related object families.
      rationale: |
        Abstract Factory ensures products from a family are used together
        and makes it easy to switch between product families.
      good_examples:
        - |
          # Python - Abstract Factory for UI Components
          from abc import ABC, abstractmethod
          from dataclasses import dataclass

          # Abstract products
          class Button(ABC):
              @abstractmethod
              def render(self) -> str: ...

          class Input(ABC):
              @abstractmethod
              def render(self) -> str: ...

          # Concrete products - Light theme
          class LightButton(Button):
              def render(self) -> str:
                  return "<button class='light'>Click</button>"

          class LightInput(Input):
              def render(self) -> str:
                  return "<input class='light'/>"

          # Concrete products - Dark theme
          class DarkButton(Button):
              def render(self) -> str:
                  return "<button class='dark'>Click</button>"

          class DarkInput(Input):
              def render(self) -> str:
                  return "<input class='dark'/>"

          # Abstract factory
          class UIFactory(ABC):
              @abstractmethod
              def create_button(self) -> Button: ...

              @abstractmethod
              def create_input(self) -> Input: ...

          # Concrete factories
          class LightThemeFactory(UIFactory):
              def create_button(self) -> Button:
                  return LightButton()

              def create_input(self) -> Input:
                  return LightInput()

          class DarkThemeFactory(UIFactory):
              def create_button(self) -> Button:
                  return DarkButton()

              def create_input(self) -> Input:
                  return DarkInput()

          # Client code works with any factory
          def render_form(factory: UIFactory) -> str:
              button = factory.create_button()
              input_field = factory.create_input()
              return f"{input_field.render()}{button.render()}"
      tags:
        - creational
        - abstract-factory
        - gof

  - id: DP004
    title: 'Builder Pattern'
    category: patterns
    level: intermediate
    priority: critical
    content:
      description: |
        Separate the construction of a complex object from its representation
        so the same construction process can create different representations.
      rationale: |
        Builder handles complex object creation step by step, making code
        more readable and allowing different configurations.
      good_examples:
        - |
          # Python - Builder with dataclass
          from dataclasses import dataclass, field
          from typing import Optional, Self

          @dataclass
          class HttpRequest:
              method: str
              url: str
              headers: dict[str, str] = field(default_factory=dict)
              body: Optional[str] = None
              timeout: int = 30
              retries: int = 3

          class HttpRequestBuilder:
              def __init__(self, method: str, url: str):
                  self._method = method
                  self._url = url
                  self._headers: dict[str, str] = {}
                  self._body: Optional[str] = None
                  self._timeout = 30
                  self._retries = 3

              def header(self, key: str, value: str) -> Self:
                  self._headers[key] = value
                  return self

              def json_body(self, data: dict) -> Self:
                  import json
                  self._body = json.dumps(data)
                  self._headers['Content-Type'] = 'application/json'
                  return self

              def timeout(self, seconds: int) -> Self:
                  self._timeout = seconds
                  return self

              def retries(self, count: int) -> Self:
                  self._retries = count
                  return self

              def build(self) -> HttpRequest:
                  return HttpRequest(
                      method=self._method,
                      url=self._url,
                      headers=self._headers,
                      body=self._body,
                      timeout=self._timeout,
                      retries=self._retries
                  )

          # Fluent usage
          request = (
              HttpRequestBuilder('POST', '/api/users')
              .header('Authorization', 'Bearer token')
              .json_body({'name': 'John', 'email': 'john@example.com'})
              .timeout(10)
              .retries(5)
              .build()
          )
        - |
          // TypeScript - Builder with type safety
          interface QueryConfig {
            select: string[];
            from: string;
            where?: string;
            orderBy?: { column: string; direction: 'ASC' | 'DESC' };
            limit?: number;
          }

          class QueryBuilder {
            private config: Partial<QueryConfig> = {};

            select(...columns: string[]): this {
              this.config.select = columns;
              return this;
            }

            from(table: string): this {
              this.config.from = table;
              return this;
            }

            where(condition: string): this {
              this.config.where = condition;
              return this;
            }

            orderBy(column: string, direction: 'ASC' | 'DESC' = 'ASC'): this {
              this.config.orderBy = { column, direction };
              return this;
            }

            limit(count: number): this {
              this.config.limit = count;
              return this;
            }

            build(): string {
              if (!this.config.select || !this.config.from) {
                throw new Error('SELECT and FROM are required');
              }

              let sql = `SELECT ${this.config.select.join(', ')} FROM ${this.config.from}`;
              if (this.config.where) sql += ` WHERE ${this.config.where}`;
              if (this.config.orderBy) sql += ` ORDER BY ${this.config.orderBy.column} ${this.config.orderBy.direction}`;
              if (this.config.limit) sql += ` LIMIT ${this.config.limit}`;

              return sql;
            }
          }

          const query = new QueryBuilder()
            .select('id', 'name', 'email')
            .from('users')
            .where('active = true')
            .orderBy('name', 'ASC')
            .limit(10)
            .build();
      tags:
        - creational
        - builder
        - fluent-api
        - gof

  - id: DP005
    title: 'Prototype Pattern'
    category: patterns
    level: intermediate
    priority: medium
    content:
      description: |
        Create new objects by cloning a prototypical instance rather than
        through traditional construction. Useful for expensive object creation.
      rationale: |
        Prototype avoids the cost of creating objects from scratch when
        similar objects already exist and can be cloned.
      good_examples:
        - |
          # Python - Prototype with copy
          from copy import deepcopy
          from dataclasses import dataclass, field
          from typing import Self

          @dataclass
          class DocumentTemplate:
              title: str
              styles: dict[str, str] = field(default_factory=dict)
              sections: list[str] = field(default_factory=list)
              metadata: dict = field(default_factory=dict)

              def clone(self) -> Self:
                  """Create a deep copy of this template."""
                  return deepcopy(self)

              def with_title(self, title: str) -> Self:
                  """Clone and modify title."""
                  cloned = self.clone()
                  cloned.title = title
                  return cloned

          # Create prototype
          report_template = DocumentTemplate(
              title="Report Template",
              styles={'font': 'Arial', 'size': '12pt'},
              sections=['Header', 'Body', 'Footer'],
              metadata={'version': '1.0'}
          )

          # Clone and customize
          q1_report = report_template.with_title("Q1 Financial Report")
          q2_report = report_template.with_title("Q2 Financial Report")
        - |
          // TypeScript - Prototype Registry
          interface Prototype<T> {
            clone(): T;
          }

          class Shape implements Prototype<Shape> {
            constructor(
              public x: number,
              public y: number,
              public color: string
            ) {}

            clone(): Shape {
              return new Shape(this.x, this.y, this.color);
            }
          }

          class Circle extends Shape {
            constructor(x: number, y: number, color: string, public radius: number) {
              super(x, y, color);
            }

            clone(): Circle {
              return new Circle(this.x, this.y, this.color, this.radius);
            }
          }

          // Prototype registry
          class ShapeRegistry {
            private prototypes = new Map<string, Shape>();

            register(name: string, shape: Shape): void {
              this.prototypes.set(name, shape);
            }

            create(name: string): Shape {
              const prototype = this.prototypes.get(name);
              if (!prototype) throw new Error(`Unknown shape: ${name}`);
              return prototype.clone();
            }
          }
      tags:
        - creational
        - prototype
        - cloning
        - gof

  - id: DP006
    title: 'Dependency Injection Pattern'
    category: patterns
    level: intermediate
    priority: critical
    content:
      description: |
        Supply dependencies to an object rather than having it create them.
        Fundamental for testable, maintainable code.
      rationale: |
        DI enables loose coupling, easier testing with mocks, and flexible
        configuration. Essential for modern application architecture.
      good_examples:
        - |
          # Python - Constructor Injection
          from typing import Protocol
          from dataclasses import dataclass

          class EmailSender(Protocol):
              def send(self, to: str, subject: str, body: str) -> bool: ...

          class UserRepository(Protocol):
              def find_by_id(self, user_id: str) -> dict | None: ...

          @dataclass
          class NotificationService:
              """Service with injected dependencies."""
              email_sender: EmailSender
              user_repo: UserRepository

              def notify_user(self, user_id: str, message: str) -> bool:
                  user = self.user_repo.find_by_id(user_id)
                  if not user:
                      return False
                  return self.email_sender.send(
                      to=user['email'],
                      subject='Notification',
                      body=message
                  )

          # Concrete implementations
          class SMTPEmailSender:
              def send(self, to: str, subject: str, body: str) -> bool:
                  # Real email sending
                  return True

          class PostgresUserRepository:
              def find_by_id(self, user_id: str) -> dict | None:
                  # Real database query
                  return {'email': 'user@example.com'}

          # Composition root - wire dependencies
          def create_notification_service() -> NotificationService:
              return NotificationService(
                  email_sender=SMTPEmailSender(),
                  user_repo=PostgresUserRepository()
              )

          # Testing with mocks
          def test_notify_user():
              mock_sender = MockEmailSender()
              mock_repo = MockUserRepository({'1': {'email': 'test@test.com'}})

              service = NotificationService(mock_sender, mock_repo)
              assert service.notify_user('1', 'Hello') is True
        - |
          // Angular - Dependency Injection
          @Injectable()
          export class NotificationService {
            private emailSender = inject(EmailSender);
            private userRepo = inject(UserRepository);

            async notifyUser(userId: string, message: string): Promise<boolean> {
              const user = await this.userRepo.findById(userId);
              if (!user) return false;
              return this.emailSender.send(user.email, 'Notification', message);
            }
          }

          // Testing with injection
          describe('NotificationService', () => {
            it('should send notification', async () => {
              await TestBed.configureTestingModule({
                providers: [
                  NotificationService,
                  { provide: EmailSender, useClass: MockEmailSender },
                  { provide: UserRepository, useClass: MockUserRepository }
                ]
              });

              const service = TestBed.inject(NotificationService);
              expect(await service.notifyUser('1', 'Hello')).toBe(true);
            });
          });
      tags:
        - creational
        - dependency-injection
        - testing
        - enterprise

  - id: DP007
    title: 'Object Pool Pattern'
    category: patterns
    level: advanced
    priority: medium
    content:
      description: |
        Manage a pool of reusable objects to avoid expensive object creation
        and destruction. Common for database connections, threads.
      rationale: |
        Object pools improve performance when object creation is expensive
        and objects are used frequently but briefly.
      good_examples:
        - |
          # Python - Generic Object Pool
          from typing import TypeVar, Generic, Callable, Optional
          from queue import Queue
          from contextlib import contextmanager
          import threading

          T = TypeVar('T')

          class ObjectPool(Generic[T]):
              def __init__(
                  self,
                  factory: Callable[[], T],
                  max_size: int = 10,
                  reset_fn: Optional[Callable[[T], None]] = None
              ):
                  self._factory = factory
                  self._reset_fn = reset_fn
                  self._pool: Queue[T] = Queue(maxsize=max_size)
                  self._lock = threading.Lock()
                  self._created = 0
                  self._max_size = max_size

              def acquire(self) -> T:
                  """Get an object from the pool or create a new one."""
                  try:
                      return self._pool.get_nowait()
                  except:
                      with self._lock:
                          if self._created < self._max_size:
                              self._created += 1
                              return self._factory()
                      # Block until one is available
                      return self._pool.get()

              def release(self, obj: T) -> None:
                  """Return an object to the pool."""
                  if self._reset_fn:
                      self._reset_fn(obj)
                  try:
                      self._pool.put_nowait(obj)
                  except:
                      pass  # Pool is full, discard

              @contextmanager
              def connection(self):
                  """Context manager for automatic release."""
                  obj = self.acquire()
                  try:
                      yield obj
                  finally:
                      self.release(obj)

          # Usage - Database connection pool
          db_pool = ObjectPool(
              factory=lambda: create_db_connection(),
              max_size=20,
              reset_fn=lambda conn: conn.rollback()
          )

          with db_pool.connection() as conn:
              cursor = conn.cursor()
              cursor.execute("SELECT * FROM users")
      tags:
        - creational
        - pool
        - performance
        - enterprise

