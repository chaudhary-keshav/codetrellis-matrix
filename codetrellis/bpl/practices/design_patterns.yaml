        - iterator
        - traversal
        - gof

  - id: DP023
    title: 'Mediator Pattern'
    category: patterns
    level: advanced
    priority: medium
    content:
      description: |
        Define an object that encapsulates how a set of objects interact.
        Mediator promotes loose coupling by keeping objects from referring to each other.
      rationale: |
        Mediator centralizes complex communication logic, reducing dependencies
        between components and simplifying maintenance.
      good_examples:
        - |
          # Python - Chat room mediator
          from abc import ABC, abstractmethod
          from dataclasses import dataclass, field
          from typing import Protocol

          class ChatMediator(Protocol):
              def send_message(self, message: str, sender: 'User') -> None: ...
              def add_user(self, user: 'User') -> None: ...

          @dataclass
          class User:
              name: str
              mediator: ChatMediator | None = None

              def send(self, message: str) -> None:
                  if self.mediator:
                      self.mediator.send_message(message, self)

              def receive(self, message: str, sender: 'User') -> None:
                  print(f"{self.name} received from {sender.name}: {message}")

          @dataclass
          class ChatRoom:
              """Mediator that coordinates communication between users."""
              users: list[User] = field(default_factory=list)

              def add_user(self, user: User) -> None:
                  user.mediator = self
                  self.users.append(user)
                  self._notify_all(f"{user.name} joined the chat", user)

              def send_message(self, message: str, sender: User) -> None:
                  for user in self.users:
                      if user != sender:
                          user.receive(message, sender)

              def _notify_all(self, message: str, except_user: User) -> None:
                  system = User("System")
                  for user in self.users:
                      if user != except_user:
                          user.receive(message, system)

          # Usage
          room = ChatRoom()
          alice = User("Alice")
          bob = User("Bob")

          room.add_user(alice)
          room.add_user(bob)

          alice.send("Hello everyone!")  # Bob receives
          bob.send("Hi Alice!")  # Alice receives
      tags:
        - behavioral
        - mediator
        - decoupling
        - gof

  - id: DP024
    title: 'Visitor Pattern'
    category: patterns
    level: advanced
    priority: low
    content:
      description: |
        Represent an operation to be performed on elements of an object structure.
        Visitor lets you define new operations without changing the element classes.
      rationale: |
        Visitor separates algorithms from objects, enabling new operations
        without modifying existing classes.
      good_examples:
        - |
          # Python - Document visitor
          from abc import ABC, abstractmethod
          from dataclasses import dataclass
          from typing import Protocol

          class DocumentVisitor(Protocol):
              def visit_paragraph(self, paragraph: 'Paragraph') -> str: ...
              def visit_heading(self, heading: 'Heading') -> str: ...
              def visit_list(self, list_elem: 'List') -> str: ...

          class DocumentElement(ABC):
              @abstractmethod
              def accept(self, visitor: DocumentVisitor) -> str: ...

          @dataclass
          class Paragraph(DocumentElement):
              text: str

              def accept(self, visitor: DocumentVisitor) -> str:
                  return visitor.visit_paragraph(self)

          @dataclass
          class Heading(DocumentElement):
              text: str
              level: int

              def accept(self, visitor: DocumentVisitor) -> str:
                  return visitor.visit_heading(self)

          @dataclass
          class List(DocumentElement):
              items: list[str]

              def accept(self, visitor: DocumentVisitor) -> str:
                  return visitor.visit_list(self)

          # Concrete visitors
          class HTMLVisitor:
              def visit_paragraph(self, p: Paragraph) -> str:
                  return f"<p>{p.text}</p>"

              def visit_heading(self, h: Heading) -> str:
                  return f"<h{h.level}>{h.text}</h{h.level}>"

              def visit_list(self, l: List) -> str:
                  items = ''.join(f"<li>{item}</li>" for item in l.items)
                  return f"<ul>{items}</ul>"

          class MarkdownVisitor:
              def visit_paragraph(self, p: Paragraph) -> str:
                  return p.text

              def visit_heading(self, h: Heading) -> str:
                  return f"{'#' * h.level} {h.text}"

              def visit_list(self, l: List) -> str:
                  return '\n'.join(f"- {item}" for item in l.items)

          # Usage
          doc = [Heading("Title", 1), Paragraph("Content"), List(["Item 1", "Item 2"])]
          html = HTMLVisitor()
          md = MarkdownVisitor()

          for elem in doc:
              print(elem.accept(html))
      tags:
        - behavioral
        - visitor
        - double-dispatch
        - gof

  - id: DP025
    title: 'Memento Pattern'
    category: patterns
    level: advanced
    priority: low
    content:
      description: |
        Capture and externalize an object's internal state without violating
        encapsulation, so the object can be restored to this state later.
      rationale: |
        Memento enables undo/redo and state snapshots while keeping
        the originator's implementation details private.
      good_examples:
        - |
          # Python - Editor with undo
          from dataclasses import dataclass
          from typing import Any

          @dataclass(frozen=True)
          class EditorMemento:
              """Immutable snapshot of editor state."""
              content: str
              cursor_position: int
              selection: tuple[int, int] | None

          class TextEditor:
              def __init__(self):
                  self._content = ""
                  self._cursor = 0
                  self._selection: tuple[int, int] | None = None

              def type(self, text: str) -> None:
                  self._content = (
                      self._content[:self._cursor] +
                      text +
                      self._content[self._cursor:]
                  )
                  self._cursor += len(text)

              def delete(self) -> None:
                  if self._cursor > 0:
                      self._content = (
                          self._content[:self._cursor-1] +
                          self._content[self._cursor:]
                      )
                      self._cursor -= 1

              def save(self) -> EditorMemento:
                  """Create memento of current state."""
                  return EditorMemento(
                      content=self._content,
                      cursor_position=self._cursor,
                      selection=self._selection
                  )

              def restore(self, memento: EditorMemento) -> None:
                  """Restore state from memento."""
                  self._content = memento.content
                  self._cursor = memento.cursor_position
                  self._selection = memento.selection

          class EditorHistory:
              def __init__(self, editor: TextEditor):
                  self._editor = editor
                  self._history: list[EditorMemento] = []
                  self._current = -1

              def save(self) -> None:
                  # Remove any redo states
                  self._history = self._history[:self._current + 1]
                  self._history.append(self._editor.save())
                  self._current = len(self._history) - 1

              def undo(self) -> bool:
                  if self._current > 0:
                      self._current -= 1
                      self._editor.restore(self._history[self._current])
                      return True
                  return False

              def redo(self) -> bool:
                  if self._current < len(self._history) - 1:
                      self._current += 1
                      self._editor.restore(self._history[self._current])
                      return True
                  return False
      tags:
        - behavioral
        - memento
        - undo
        - gof

