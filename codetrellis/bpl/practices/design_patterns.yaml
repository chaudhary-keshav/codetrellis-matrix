  - id: DP026
    title: 'Repository Pattern'
    category: patterns
    level: intermediate
    priority: critical
    content:
      description: |
        Mediate between the domain and data mapping layers using a collection-like
        interface for accessing domain objects.
      rationale: |
        Repository abstracts data access, enabling testability, swappable
        storage implementations, and clean domain logic.
      good_examples:
        - |
          # Python - Generic Repository
          from abc import ABC, abstractmethod
          from typing import TypeVar, Generic, Protocol
          from dataclasses import dataclass

          T = TypeVar('T')
          ID = TypeVar('ID')

          class Repository(Protocol[T, ID]):
              def find_by_id(self, id: ID) -> T | None: ...
              def find_all(self) -> list[T]: ...
              def save(self, entity: T) -> T: ...
              def delete(self, id: ID) -> bool: ...

          @dataclass
          class User:
              id: str | None
              name: str
              email: str

          class UserRepository(ABC):
              @abstractmethod
              def find_by_id(self, id: str) -> User | None: ...

              @abstractmethod
              def find_by_email(self, email: str) -> User | None: ...

              @abstractmethod
              def find_all(self) -> list[User]: ...

              @abstractmethod
              def save(self, user: User) -> User: ...

              @abstractmethod
              def delete(self, id: str) -> bool: ...

          # In-memory implementation for testing
          class InMemoryUserRepository(UserRepository):
              def __init__(self):
                  self._users: dict[str, User] = {}
                  self._counter = 0

              def find_by_id(self, id: str) -> User | None:
                  return self._users.get(id)

              def find_by_email(self, email: str) -> User | None:
                  return next((u for u in self._users.values() if u.email == email), None)

              def find_all(self) -> list[User]:
                  return list(self._users.values())

              def save(self, user: User) -> User:
                  if user.id is None:
                      self._counter += 1
                      user.id = str(self._counter)
                  self._users[user.id] = user
                  return user

              def delete(self, id: str) -> bool:
                  return self._users.pop(id, None) is not None

          # PostgreSQL implementation
          class PostgresUserRepository(UserRepository):
              def __init__(self, connection_pool):
                  self._pool = connection_pool

              def find_by_id(self, id: str) -> User | None:
                  # Real database query
                  pass
