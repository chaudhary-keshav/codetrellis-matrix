  - id: DP016
    title: 'Strategy Pattern'
    category: patterns
    level: intermediate
    priority: critical
    content:
      description: |
        Define a family of algorithms, encapsulate each one, and make them
        interchangeable. Strategy lets algorithms vary independently from clients.
      rationale: |
        Strategy eliminates conditional statements by encapsulating algorithms
        as objects, enabling runtime algorithm selection.
      good_examples:
        - |
          # Python - Strategy for pricing
          from typing import Protocol
          from dataclasses import dataclass
          from decimal import Decimal

          class PricingStrategy(Protocol):
              def calculate_price(self, base_price: Decimal, quantity: int) -> Decimal: ...

          class RegularPricing:
              def calculate_price(self, base_price: Decimal, quantity: int) -> Decimal:
                  return base_price * quantity

          class BulkPricing:
              def __init__(self, discount_threshold: int = 10, discount_rate: Decimal = Decimal('0.1')):
                  self.threshold = discount_threshold
                  self.rate = discount_rate

              def calculate_price(self, base_price: Decimal, quantity: int) -> Decimal:
                  total = base_price * quantity
                  if quantity >= self.threshold:
                      total *= (1 - self.rate)
                  return total

          class SubscriberPricing:
              def __init__(self, discount_rate: Decimal = Decimal('0.2')):
                  self.rate = discount_rate

              def calculate_price(self, base_price: Decimal, quantity: int) -> Decimal:
                  return base_price * quantity * (1 - self.rate)

          @dataclass
          class ShoppingCart:
              items: list[tuple[str, Decimal, int]]
              pricing_strategy: PricingStrategy

              def set_pricing_strategy(self, strategy: PricingStrategy) -> None:
                  self.pricing_strategy = strategy

              def calculate_total(self) -> Decimal:
                  return sum(
                      self.pricing_strategy.calculate_price(price, qty)
                      for _, price, qty in self.items
                  )

          # Usage - switch strategies at runtime
          cart = ShoppingCart(
              items=[('Widget', Decimal('10.00'), 5)],
              pricing_strategy=RegularPricing()
          )
          print(cart.calculate_total())  # 50.00

          cart.set_pricing_strategy(BulkPricing())
          print(cart.calculate_total())  # Still 50.00 (below threshold)
      tags:
        - behavioral
        - strategy
        - algorithms
        - gof

  - id: DP017
    title: 'Observer Pattern'
    category: patterns
    level: intermediate
    priority: critical
    content:
      description: |
        Define a one-to-many dependency between objects so that when one
        object changes state, all its dependents are notified automatically.
      rationale: |
        Observer enables loose coupling between subjects and observers,
        essential for event-driven architectures and reactive systems.
      good_examples:
        - |
          # Python - Type-safe Observer
          from typing import Protocol, TypeVar, Generic
          from dataclasses import dataclass, field
          from weakref import WeakSet

          T = TypeVar('T')

          class Observer(Protocol[T]):
              def update(self, data: T) -> None: ...

          @dataclass
          class Subject(Generic[T]):
              _observers: WeakSet[Observer[T]] = field(default_factory=WeakSet)

              def subscribe(self, observer: Observer[T]) -> None:
                  self._observers.add(observer)

              def unsubscribe(self, observer: Observer[T]) -> None:
                  self._observers.discard(observer)

              def notify(self, data: T) -> None:
                  for observer in self._observers:
                      observer.update(data)

          # Concrete implementation
          @dataclass
          class StockPrice:
              symbol: str
              price: float

          class StockTicker(Subject[StockPrice]):
              def update_price(self, symbol: str, price: float) -> None:
                  self.notify(StockPrice(symbol, price))

          class PriceDisplay:
              def update(self, data: StockPrice) -> None:
                  print(f"Display: {data.symbol} = ${data.price:.2f}")

          class PriceAlert:
              def __init__(self, threshold: float):
                  self.threshold = threshold

              def update(self, data: StockPrice) -> None:
                  if data.price > self.threshold:
                      print(f"ALERT: {data.symbol} exceeded ${self.threshold}!")

          # Usage
          ticker = StockTicker()
          ticker.subscribe(PriceDisplay())
          ticker.subscribe(PriceAlert(100.0))

          ticker.update_price('AAPL', 150.0)  # Both observers notified
        - |
          // TypeScript - RxJS-style Observable
          type Observer<T> = {
            next: (value: T) => void;
            error?: (error: Error) => void;
            complete?: () => void;
          };

          class Observable<T> {
            constructor(private producer: (observer: Observer<T>) => () => void) {}

            subscribe(observer: Observer<T>): { unsubscribe: () => void } {
              const teardown = this.producer(observer);
              return { unsubscribe: teardown };
            }

            pipe<U>(...operators: Array<(obs: Observable<any>) => Observable<any>>): Observable<U> {
              return operators.reduce((obs, op) => op(obs), this as Observable<any>);
            }
          }

          // Factory functions
          function fromEvent(target: EventTarget, event: string): Observable<Event> {
            return new Observable(observer => {
              const handler = (e: Event) => observer.next(e);
              target.addEventListener(event, handler);
              return () => target.removeEventListener(event, handler);
            });
          }
      tags:
        - behavioral
        - observer
        - events
        - gof

  - id: DP018
    title: 'Command Pattern'
    category: patterns
    level: intermediate
    priority: high
    content:
      description: |
        Encapsulate a request as an object, allowing parameterization,
        queuing, logging, and supporting undoable operations.
      rationale: |
        Command decouples the invoker from the receiver, enabling
        undo/redo, transaction logging, and macro recording.
      good_examples:
        - |
          # Python - Command with undo
          from abc import ABC, abstractmethod
          from dataclasses import dataclass, field
          from typing import Protocol

          class Command(ABC):
              @abstractmethod
              def execute(self) -> None: ...

              @abstractmethod
              def undo(self) -> None: ...

          # Receiver
          class TextDocument:
              def __init__(self):
                  self.content = ""

              def insert(self, position: int, text: str) -> None:
                  self.content = self.content[:position] + text + self.content[position:]

              def delete(self, position: int, length: int) -> str:
                  deleted = self.content[position:position + length]
                  self.content = self.content[:position] + self.content[position + length:]
                  return deleted

          # Concrete commands
          @dataclass
          class InsertCommand(Command):
              document: TextDocument
              position: int
              text: str

              def execute(self) -> None:
                  self.document.insert(self.position, self.text)

              def undo(self) -> None:
                  self.document.delete(self.position, len(self.text))

          @dataclass
          class DeleteCommand(Command):
              document: TextDocument
              position: int
              length: int
              _deleted_text: str = ""

              def execute(self) -> None:
                  self._deleted_text = self.document.delete(self.position, self.length)

              def undo(self) -> None:
                  self.document.insert(self.position, self._deleted_text)

          # Invoker with history
          @dataclass
          class CommandManager:
              history: list[Command] = field(default_factory=list)
              redo_stack: list[Command] = field(default_factory=list)

              def execute(self, command: Command) -> None:
                  command.execute()
                  self.history.append(command)
                  self.redo_stack.clear()

              def undo(self) -> None:
                  if self.history:
                      command = self.history.pop()
                      command.undo()
                      self.redo_stack.append(command)

              def redo(self) -> None:
                  if self.redo_stack:
                      command = self.redo_stack.pop()
                      command.execute()
                      self.history.append(command)
      tags:
        - behavioral
        - command
        - undo-redo
        - gof

  - id: DP019
    title: 'State Pattern'
    category: patterns
    level: intermediate
    priority: high
    content:
      description: |
        Allow an object to alter its behavior when its internal state changes.
        The object will appear to change its class.
      rationale: |
        State pattern eliminates complex conditionals by encapsulating
        state-specific behavior in separate state classes.
      good_examples:
        - |
          # Python - Order state machine
          from abc import ABC, abstractmethod
          from dataclasses import dataclass
          from typing import TYPE_CHECKING

          if TYPE_CHECKING:
              from order import Order

          class OrderState(ABC):
              @abstractmethod
              def confirm(self, order: 'Order') -> None: ...

              @abstractmethod
              def ship(self, order: 'Order') -> None: ...

              @abstractmethod
              def deliver(self, order: 'Order') -> None: ...

              @abstractmethod
              def cancel(self, order: 'Order') -> None: ...

          class PendingState(OrderState):
              def confirm(self, order: 'Order') -> None:
                  print("Order confirmed")
                  order.state = ConfirmedState()

              def ship(self, order: 'Order') -> None:
                  raise ValueError("Cannot ship pending order")

              def deliver(self, order: 'Order') -> None:
                  raise ValueError("Cannot deliver pending order")

              def cancel(self, order: 'Order') -> None:
                  print("Order cancelled")
                  order.state = CancelledState()

          class ConfirmedState(OrderState):
              def confirm(self, order: 'Order') -> None:
                  raise ValueError("Order already confirmed")

              def ship(self, order: 'Order') -> None:
                  print("Order shipped")
                  order.state = ShippedState()

              def deliver(self, order: 'Order') -> None:
                  raise ValueError("Cannot deliver unshipped order")

              def cancel(self, order: 'Order') -> None:
                  print("Order cancelled")
                  order.state = CancelledState()

          class ShippedState(OrderState):
              def confirm(self, order: 'Order') -> None:
                  raise ValueError("Order already confirmed")

              def ship(self, order: 'Order') -> None:
                  raise ValueError("Order already shipped")

              def deliver(self, order: 'Order') -> None:
                  print("Order delivered")
                  order.state = DeliveredState()

              def cancel(self, order: 'Order') -> None:
                  raise ValueError("Cannot cancel shipped order")

          @dataclass
          class Order:
              id: str
              state: OrderState = None

              def __post_init__(self):
                  self.state = PendingState()

              def confirm(self) -> None:
                  self.state.confirm(self)

              def ship(self) -> None:
                  self.state.ship(self)
      tags:
        - behavioral
        - state
        - state-machine
        - gof

  - id: DP020
    title: 'Template Method Pattern'
    category: patterns
    level: intermediate
    priority: medium
    content:
      description: |
        Define the skeleton of an algorithm in a method, deferring some steps
        to subclasses. Lets subclasses redefine steps without changing structure.
      rationale: |
        Template Method provides code reuse by defining invariant algorithm
        structure while allowing customization of specific steps.
      good_examples:
        - |
          # Python - Data processing template
          from abc import ABC, abstractmethod
          from dataclasses import dataclass
          from typing import TypeVar, Generic

          T = TypeVar('T')
          R = TypeVar('R')

          class DataProcessor(ABC, Generic[T, R]):
              """Template for data processing pipeline."""

              def process(self, source: str) -> R:
                  """Template method - defines algorithm structure."""
                  data = self.extract(source)
                  validated = self.validate(data)
                  transformed = self.transform(validated)
                  result = self.load(transformed)
                  self.notify(result)
                  return result

              @abstractmethod
              def extract(self, source: str) -> T:
                  """Extract data from source."""
                  pass

              def validate(self, data: T) -> T:
                  """Optional validation hook - can be overridden."""
                  return data

              @abstractmethod
              def transform(self, data: T) -> R:
                  """Transform data to output format."""
                  pass

              @abstractmethod
              def load(self, data: R) -> R:
                  """Load data to destination."""
                  pass

              def notify(self, result: R) -> None:
                  """Optional notification hook."""
                  pass

          # Concrete implementation
          class CSVToJSONProcessor(DataProcessor[list[dict], str]):
              def extract(self, source: str) -> list[dict]:
                  # Read CSV file
                  return [{'name': 'John', 'age': 30}]

              def validate(self, data: list[dict]) -> list[dict]:
                  return [row for row in data if 'name' in row]

              def transform(self, data: list[dict]) -> str:
                  import json
                  return json.dumps(data)

              def load(self, data: str) -> str:
                  # Write to file
                  return data

              def notify(self, result: str) -> None:
                  print(f"Processed {len(result)} characters")
      tags:
        - behavioral
        - template-method
        - inheritance
        - gof

  - id: DP021
    title: 'Chain of Responsibility Pattern'
    category: patterns
    level: intermediate
    priority: medium
    content:
      description: |
        Avoid coupling the sender of a request to its receiver by giving
        more than one object a chance to handle the request.
      rationale: |
        Chain of Responsibility enables flexible request processing with
        dynamic chain configuration and single responsibility handlers.
      good_examples:
        - |
          # Python - Request processing chain
          from abc import ABC, abstractmethod
          from dataclasses import dataclass
          from typing import Optional

          @dataclass
          class Request:
              path: str
              method: str
              headers: dict[str, str]
              body: Optional[str] = None

          @dataclass
          class Response:
              status: int
              body: str

          class Handler(ABC):
              def __init__(self):
                  self._next: Optional[Handler] = None

              def set_next(self, handler: 'Handler') -> 'Handler':
                  self._next = handler
                  return handler

              def handle(self, request: Request) -> Optional[Response]:
                  result = self.process(request)
                  if result is not None:
                      return result
                  if self._next:
                      return self._next.handle(request)
                  return None

              @abstractmethod
              def process(self, request: Request) -> Optional[Response]: ...

          # Concrete handlers
          class AuthHandler(Handler):
              def process(self, request: Request) -> Optional[Response]:
                  if 'Authorization' not in request.headers:
                      return Response(401, 'Unauthorized')
                  return None  # Pass to next

          class RateLimitHandler(Handler):
              def __init__(self, max_requests: int = 100):
                  super().__init__()
                  self.request_count = 0
                  self.max_requests = max_requests

              def process(self, request: Request) -> Optional[Response]:
                  self.request_count += 1
                  if self.request_count > self.max_requests:
                      return Response(429, 'Too Many Requests')
                  return None

          class LoggingHandler(Handler):
              def process(self, request: Request) -> Optional[Response]:
                  print(f"{request.method} {request.path}")
                  return None

          # Build chain
          auth = AuthHandler()
          rate_limit = RateLimitHandler()
          logging = LoggingHandler()

          auth.set_next(rate_limit).set_next(logging)

          # Process request through chain
          response = auth.handle(Request('/api/users', 'GET', {}))
      tags:
        - behavioral
        - chain-of-responsibility
        - middleware
        - gof

  - id: DP022
    title: 'Iterator Pattern'
    category: patterns
    level: beginner
    priority: high
    content:
      description: |
        Provide a way to access elements of an aggregate object sequentially
        without exposing its underlying representation.
      rationale: |
        Iterators provide uniform traversal interface for collections,
        enabling polymorphic iteration over different data structures.
      good_examples:
        - |
          # Python - Custom iterator with generator
          from typing import Iterator, Generic, TypeVar
          from dataclasses import dataclass

          T = TypeVar('T')

          @dataclass
          class TreeNode(Generic[T]):
              value: T
              left: 'TreeNode[T] | None' = None
              right: 'TreeNode[T] | None' = None

          class BinaryTree(Generic[T]):
              def __init__(self, root: TreeNode[T] | None = None):
                  self.root = root

              def inorder(self) -> Iterator[T]:
                  """In-order traversal using generator."""
                  def traverse(node: TreeNode[T] | None) -> Iterator[T]:
                      if node:
                          yield from traverse(node.left)
                          yield node.value
                          yield from traverse(node.right)
                  yield from traverse(self.root)

              def preorder(self) -> Iterator[T]:
                  """Pre-order traversal."""
                  def traverse(node: TreeNode[T] | None) -> Iterator[T]:
                      if node:
                          yield node.value
                          yield from traverse(node.left)
                          yield from traverse(node.right)
                  yield from traverse(self.root)

              def __iter__(self) -> Iterator[T]:
                  """Default iteration is in-order."""
                  return self.inorder()

          # Usage
          tree = BinaryTree(TreeNode(
              value=5,
              left=TreeNode(3, TreeNode(1), TreeNode(4)),
              right=TreeNode(7, TreeNode(6), TreeNode(8))
          ))

          for value in tree:  # Uses __iter__ -> inorder
              print(value)  # 1, 3, 4, 5, 6, 7, 8

          for value in tree.preorder():
              print(value)  # 5, 3, 1, 4, 7, 6, 8
      tags:
