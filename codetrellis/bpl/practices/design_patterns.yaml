  - id: DP008
    title: 'Adapter Pattern'
    category: patterns
    level: intermediate
    priority: high
    content:
      description: |
        Convert the interface of a class into another interface clients expect.
        Allows incompatible interfaces to work together.
      rationale: |
        Adapters enable integration of third-party libraries or legacy code
        without modifying their source code.
      good_examples:
        - |
          # Python - Adapter for different payment providers
          from typing import Protocol
          from dataclasses import dataclass

          # Target interface our app expects
          class PaymentProcessor(Protocol):
              def process_payment(self, amount: float, currency: str) -> dict: ...

          # Adaptee 1 - Stripe (different interface)
          class StripeAPI:
              def create_charge(self, amount_cents: int, currency: str) -> dict:
                  return {'id': 'ch_123', 'status': 'succeeded'}

          # Adaptee 2 - PayPal (another interface)
          class PayPalSDK:
              def execute_payment(self, payment_data: dict) -> dict:
                  return {'id': 'PAY-123', 'state': 'approved'}

          # Adapter for Stripe
          @dataclass
          class StripeAdapter:
              stripe: StripeAPI

              def process_payment(self, amount: float, currency: str) -> dict:
                  result = self.stripe.create_charge(
                      amount_cents=int(amount * 100),
                      currency=currency
                  )
                  return {
                      'transaction_id': result['id'],
                      'success': result['status'] == 'succeeded'
                  }

          # Adapter for PayPal
          @dataclass
          class PayPalAdapter:
              paypal: PayPalSDK

              def process_payment(self, amount: float, currency: str) -> dict:
                  result = self.paypal.execute_payment({
                      'amount': {'total': str(amount), 'currency': currency}
                  })
                  return {
                      'transaction_id': result['id'],
                      'success': result['state'] == 'approved'
                  }

          # Client code works with any adapter
          def checkout(processor: PaymentProcessor, amount: float) -> bool:
              result = processor.process_payment(amount, 'USD')
              return result['success']
      tags:
        - structural
        - adapter
        - integration
        - gof

  - id: DP009
    title: 'Decorator Pattern'
    category: patterns
    level: intermediate
    priority: critical
    content:
      description: |
        Attach additional responsibilities to an object dynamically.
        Provides a flexible alternative to subclassing for extending functionality.
      rationale: |
        Decorators follow the Open/Closed principle - open for extension,
        closed for modification. They enable feature composition.
      good_examples:
        - |
          # Python - Decorator for HTTP client
          from typing import Protocol
          from dataclasses import dataclass
          import time
          import logging

          class HttpClient(Protocol):
              def request(self, method: str, url: str, **kwargs) -> dict: ...

          class BasicHttpClient:
              def request(self, method: str, url: str, **kwargs) -> dict:
                  # Actual HTTP request
                  return {'status': 200, 'data': 'response'}

          # Logging decorator
          @dataclass
          class LoggingHttpClient:
              wrapped: HttpClient
              logger: logging.Logger

              def request(self, method: str, url: str, **kwargs) -> dict:
                  self.logger.info(f"Request: {method} {url}")
                  result = self.wrapped.request(method, url, **kwargs)
                  self.logger.info(f"Response: {result['status']}")
                  return result

          # Retry decorator
          @dataclass
          class RetryHttpClient:
              wrapped: HttpClient
              max_retries: int = 3

              def request(self, method: str, url: str, **kwargs) -> dict:
                  for attempt in range(self.max_retries):
                      try:
                          return self.wrapped.request(method, url, **kwargs)
                      except Exception as e:
                          if attempt == self.max_retries - 1:
                              raise
                          time.sleep(2 ** attempt)

          # Caching decorator
          @dataclass
          class CachingHttpClient:
              wrapped: HttpClient
              cache: dict = None

              def __post_init__(self):
                  self.cache = self.cache or {}

              def request(self, method: str, url: str, **kwargs) -> dict:
                  if method == 'GET' and url in self.cache:
                      return self.cache[url]
                  result = self.wrapped.request(method, url, **kwargs)
                  if method == 'GET':
                      self.cache[url] = result
                  return result

          # Compose decorators
          client = CachingHttpClient(
              RetryHttpClient(
                  LoggingHttpClient(
                      BasicHttpClient(),
                      logging.getLogger()
                  )
              )
          )
        - |
          // TypeScript - Decorator pattern with composition
          interface DataSource {
            write(data: string): void;
            read(): string;
          }

          class FileDataSource implements DataSource {
            constructor(private filename: string) {}
            write(data: string): void { /* write to file */ }
            read(): string { return 'data'; }
          }

          // Base decorator
          abstract class DataSourceDecorator implements DataSource {
            constructor(protected wrapped: DataSource) {}
            write(data: string): void { this.wrapped.write(data); }
            read(): string { return this.wrapped.read(); }
          }

          // Encryption decorator
          class EncryptedDataSource extends DataSourceDecorator {
            write(data: string): void {
              const encrypted = this.encrypt(data);
              super.write(encrypted);
            }
            read(): string {
              const data = super.read();
              return this.decrypt(data);
            }
            private encrypt(data: string): string { return btoa(data); }
            private decrypt(data: string): string { return atob(data); }
          }

          // Compression decorator
          class CompressedDataSource extends DataSourceDecorator {
            write(data: string): void {
              super.write(this.compress(data));
            }
            read(): string {
              return this.decompress(super.read());
            }
            private compress(data: string): string { /* compress */ return data; }
            private decompress(data: string): string { /* decompress */ return data; }
          }

          // Usage - compose behaviors
          const source = new CompressedDataSource(
            new EncryptedDataSource(
              new FileDataSource('data.txt')
            )
          );
      tags:
        - structural
        - decorator
        - composition
        - gof

  - id: DP010
    title: 'Facade Pattern'
    category: patterns
    level: intermediate
    priority: high
    content:
      description: |
        Provide a unified interface to a set of interfaces in a subsystem.
        Facade defines a higher-level interface that makes the subsystem easier to use.
      rationale: |
        Facades reduce complexity for clients by hiding intricate subsystem
        interactions behind a simple interface.
      good_examples:
        - |
          # Python - Facade for video conversion
          from dataclasses import dataclass

          # Complex subsystem classes
          class VideoFile:
              def __init__(self, filename: str):
                  self.filename = filename
                  self.codec = self._detect_codec()

              def _detect_codec(self) -> str:
                  return 'mp4'

          class CodecFactory:
              @staticmethod
              def extract(file: VideoFile) -> 'Codec':
                  return Codec(file.codec)

          class Codec:
              def __init__(self, type: str):
                  self.type = type

          class BitrateReader:
              @staticmethod
              def read(file: VideoFile) -> int:
                  return 5000

          class AudioMixer:
              @staticmethod
              def fix(video: bytes) -> bytes:
                  return video

          # Facade - simple interface
          class VideoConverterFacade:
              """
              Simple interface for complex video conversion process.
              Clients don't need to know about codecs, bitrates, audio mixing.
              """

              def convert(self, filename: str, format: str) -> bytes:
                  """Convert video to specified format."""
                  file = VideoFile(filename)
                  codec = CodecFactory.extract(file)
                  bitrate = BitrateReader.read(file)

                  # Complex conversion logic hidden
                  result = self._do_conversion(file, codec, bitrate, format)
                  result = AudioMixer.fix(result)

                  return result

              def _do_conversion(self, file, codec, bitrate, format) -> bytes:
                  # Actual conversion
                  return b'converted'

          # Client uses simple facade
          converter = VideoConverterFacade()
          mp4_video = converter.convert('video.avi', 'mp4')
      tags:
        - structural
        - facade
        - simplification
        - gof

  - id: DP011
    title: 'Composite Pattern'
    category: patterns
    level: intermediate
    priority: medium
    content:
      description: |
        Compose objects into tree structures to represent part-whole hierarchies.
        Lets clients treat individual objects and compositions uniformly.
      rationale: |
        Composite enables recursive structures like file systems, UI components,
        or organizational hierarchies with uniform treatment.
      good_examples:
        - |
          # Python - File system composite
          from abc import ABC, abstractmethod
          from dataclasses import dataclass, field

          class FileSystemComponent(ABC):
              @abstractmethod
              def get_size(self) -> int: ...

              @abstractmethod
              def display(self, indent: int = 0) -> str: ...

          @dataclass
          class File(FileSystemComponent):
              name: str
              size: int

              def get_size(self) -> int:
                  return self.size

              def display(self, indent: int = 0) -> str:
                  return f"{'  ' * indent}📄 {self.name} ({self.size}b)"

          @dataclass
          class Directory(FileSystemComponent):
              name: str
              children: list[FileSystemComponent] = field(default_factory=list)

              def add(self, component: FileSystemComponent) -> None:
                  self.children.append(component)

              def remove(self, component: FileSystemComponent) -> None:
                  self.children.remove(component)

              def get_size(self) -> int:
                  return sum(child.get_size() for child in self.children)

              def display(self, indent: int = 0) -> str:
                  lines = [f"{'  ' * indent}📁 {self.name}/"]
                  for child in self.children:
                      lines.append(child.display(indent + 1))
                  return '\n'.join(lines)

          # Build tree structure
          root = Directory("project")
          src = Directory("src")
          src.add(File("main.py", 1500))
          src.add(File("utils.py", 800))
          root.add(src)
          root.add(File("README.md", 200))

          print(root.display())  # Treats files and directories uniformly
          print(f"Total: {root.get_size()} bytes")
      tags:
        - structural
        - composite
        - tree
        - gof

  - id: DP012
    title: 'Proxy Pattern'
    category: patterns
    level: intermediate
    priority: high
    content:
      description: |
        Provide a surrogate or placeholder for another object to control access.
        Types include virtual, protection, and remote proxies.
      rationale: |
        Proxies add a layer of control for lazy loading, access control,
        logging, caching, or remote object access.
      good_examples:
        - |
          # Python - Multiple proxy types
          from typing import Protocol
          from dataclasses import dataclass
          from functools import cached_property

          class Image(Protocol):
              def display(self) -> str: ...
              def get_dimensions(self) -> tuple[int, int]: ...

          class RealImage:
              def __init__(self, filename: str):
                  self.filename = filename
                  self._load_from_disk()

              def _load_from_disk(self):
                  print(f"Loading {self.filename} from disk...")
                  # Expensive operation

              def display(self) -> str:
                  return f"Displaying {self.filename}"

              def get_dimensions(self) -> tuple[int, int]:
                  return (1920, 1080)

          # Virtual Proxy - lazy loading
          @dataclass
          class LazyImageProxy:
              filename: str
              _image: RealImage | None = None

              @property
              def image(self) -> RealImage:
                  if self._image is None:
                      self._image = RealImage(self.filename)
                  return self._image

              def display(self) -> str:
                  return self.image.display()

              def get_dimensions(self) -> tuple[int, int]:
                  return self.image.get_dimensions()

          # Protection Proxy - access control
          @dataclass
          class SecureImageProxy:
              image: Image
              current_user: str
              allowed_users: set[str]

              def display(self) -> str:
                  if self.current_user not in self.allowed_users:
                      raise PermissionError("Access denied")
                  return self.image.display()

              def get_dimensions(self) -> tuple[int, int]:
                  return self.image.get_dimensions()

          # Caching Proxy
          @dataclass
          class CachingImageProxy:
              image: Image
              _cache: dict = None

              def __post_init__(self):
                  self._cache = {}

              def display(self) -> str:
                  if 'display' not in self._cache:
                      self._cache['display'] = self.image.display()
                  return self._cache['display']
      tags:
        - structural
        - proxy
        - lazy-loading
        - gof

  - id: DP013
    title: 'Bridge Pattern'
    category: patterns
    level: advanced
    priority: medium
    content:
      description: |
        Decouple an abstraction from its implementation so that the two can
        vary independently. Prevents explosion of class combinations.
      rationale: |
        Bridge separates concerns when you have multiple dimensions of
        variation (e.g., shapes × renderers, devices × remotes).
      good_examples:
        - |
          # Python - Bridge for messaging
          from abc import ABC, abstractmethod
          from dataclasses import dataclass

          # Implementation hierarchy
          class MessageSender(ABC):
              @abstractmethod
              def send_message(self, message: str) -> bool: ...

          class EmailSender(MessageSender):
              def send_message(self, message: str) -> bool:
                  print(f"Sending email: {message}")
                  return True

          class SMSSender(MessageSender):
              def send_message(self, message: str) -> bool:
                  print(f"Sending SMS: {message}")
                  return True

          class SlackSender(MessageSender):
              def send_message(self, message: str) -> bool:
                  print(f"Posting to Slack: {message}")
                  return True

          # Abstraction hierarchy
          class Notification(ABC):
              def __init__(self, sender: MessageSender):
                  self.sender = sender

              @abstractmethod
              def notify(self, title: str, body: str) -> bool: ...

          @dataclass
          class AlertNotification(Notification):
              sender: MessageSender

              def notify(self, title: str, body: str) -> bool:
                  message = f"🚨 ALERT: {title}\n{body}"
                  return self.sender.send_message(message)

          @dataclass
          class ReminderNotification(Notification):
              sender: MessageSender

              def notify(self, title: str, body: str) -> bool:
                  message = f"⏰ Reminder: {title}\n{body}"
                  return self.sender.send_message(message)

          # Can combine any abstraction with any implementation
          email_alert = AlertNotification(EmailSender())
          sms_reminder = ReminderNotification(SMSSender())
          slack_alert = AlertNotification(SlackSender())
      tags:
        - structural
        - bridge
        - decoupling
        - gof

  - id: DP014
    title: 'Flyweight Pattern'
    category: patterns
    level: advanced
    priority: low
    content:
      description: |
        Use sharing to support large numbers of fine-grained objects efficiently.
        Separate intrinsic (shared) from extrinsic (unique) state.
      rationale: |
        Flyweight reduces memory usage when many similar objects exist,
        like characters in a text editor or trees in a game.
      good_examples:
        - |
          # Python - Flyweight for game particles
          from dataclasses import dataclass
          from typing import ClassVar

          # Flyweight (intrinsic state - shared)
          @dataclass(frozen=True)
          class ParticleType:
              sprite: str  # Large texture data
              color: str

              # Factory/cache for flyweights
              _cache: ClassVar[dict[tuple, 'ParticleType']] = {}

              @classmethod
              def get(cls, sprite: str, color: str) -> 'ParticleType':
                  key = (sprite, color)
                  if key not in cls._cache:
                      cls._cache[key] = cls(sprite, color)
                  return cls._cache[key]

          # Context (extrinsic state - unique per instance)
          @dataclass
          class Particle:
              x: float
              y: float
              velocity_x: float
              velocity_y: float
              type: ParticleType  # Shared flyweight

              def move(self, dt: float) -> None:
                  self.x += self.velocity_x * dt
                  self.y += self.velocity_y * dt

              def render(self) -> None:
                  # Uses shared sprite, unique position
                  print(f"Draw {self.type.sprite} at ({self.x}, {self.y})")

          # Usage - millions of particles share few types
          fire_type = ParticleType.get("fire.png", "orange")
          smoke_type = ParticleType.get("smoke.png", "gray")

          particles = [
              Particle(x=i*10, y=0, velocity_x=0, velocity_y=1, type=fire_type)
              for i in range(10000)
          ]  # 10000 particles share 1 ParticleType
      tags:
        - structural
        - flyweight
        - memory-optimization
        - gof

  - id: DP015
    title: 'Module Pattern'
    category: patterns
    level: beginner
    priority: high
    content:
      description: |
        Encapsulate related code into a single unit with public and private
        members. Foundation of modular programming.
      rationale: |
        Module pattern provides encapsulation, namespace management, and
        clear public APIs. Essential for maintainable code organization.
      good_examples:
        - |
          # Python - Module pattern with __all__
          # utils/string_utils.py

          __all__ = ['capitalize_words', 'truncate']  # Public API

          # Private helper
          def _normalize_whitespace(text: str) -> str:
              return ' '.join(text.split())

          # Public functions
          def capitalize_words(text: str) -> str:
              """Capitalize each word in text."""
              normalized = _normalize_whitespace(text)
              return normalized.title()

          def truncate(text: str, max_length: int, suffix: str = '...') -> str:
              """Truncate text to max_length, adding suffix if truncated."""
              if len(text) <= max_length:
                  return text
              return text[:max_length - len(suffix)] + suffix
        - |
          // TypeScript - Module with barrel export
          // services/auth/index.ts (barrel)
          export { AuthService } from './auth.service';
          export type { AuthState, Credentials } from './auth.types';
          // Internal implementation not exported

          // services/auth/auth.service.ts
          import type { AuthState, Credentials } from './auth.types';
          import { validateCredentials } from './auth.validators'; // Internal

          export class AuthService {
            private state: AuthState = { user: null, isAuthenticated: false };

            async login(credentials: Credentials): Promise<boolean> {
              if (!validateCredentials(credentials)) {
                return false;
              }
              // Login logic
              return true;
            }
          }
      tags:
        - structural
        - module
        - encapsulation
        - enterprise

