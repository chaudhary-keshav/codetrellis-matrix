        - data-access
        - ddd

  - id: DP027
    title: 'Unit of Work Pattern'
    category: patterns
    level: advanced
    priority: high
    content:
      description: |
        Maintain a list of objects affected by a business transaction and
        coordinate writing out changes and resolving concurrency problems.
      rationale: |
        Unit of Work batches database operations into a single transaction,
        ensuring consistency and reducing database round trips.
      good_examples:
        - |
          # Python - Unit of Work
          from typing import Protocol, TypeVar, Generic
          from dataclasses import dataclass, field
          from contextlib import contextmanager
          from enum import Enum, auto

          T = TypeVar('T')

          class EntityState(Enum):
              NEW = auto()
              DIRTY = auto()
              REMOVED = auto()

          @dataclass
          class UnitOfWork:
              _new: dict[type, list] = field(default_factory=dict)
              _dirty: dict[type, list] = field(default_factory=dict)
              _removed: dict[type, list] = field(default_factory=dict)
              _committed: bool = False

              def register_new(self, entity: T) -> None:
                  entity_type = type(entity)
                  if entity_type not in self._new:
                      self._new[entity_type] = []
                  self._new[entity_type].append(entity)

              def register_dirty(self, entity: T) -> None:
                  entity_type = type(entity)
                  if entity_type not in self._dirty:
                      self._dirty[entity_type] = []
                  if entity not in self._dirty[entity_type]:
                      self._dirty[entity_type].append(entity)

              def register_removed(self, entity: T) -> None:
                  entity_type = type(entity)
                  if entity_type not in self._removed:
                      self._removed[entity_type] = []
                  self._removed[entity_type].append(entity)

              def commit(self) -> None:
                  """Persist all changes in a single transaction."""
                  try:
                      # Insert new entities
                      for entities in self._new.values():
                          for entity in entities:
                              self._insert(entity)

                      # Update dirty entities
                      for entities in self._dirty.values():
                          for entity in entities:
                              self._update(entity)

                      # Delete removed entities
                      for entities in self._removed.values():
                          for entity in entities:
                              self._delete(entity)

                      self._committed = True
                  except Exception:
                      self.rollback()
                      raise

              def rollback(self) -> None:
                  self._new.clear()
                  self._dirty.clear()
                  self._removed.clear()

          # Context manager usage
          @contextmanager
          def unit_of_work():
              uow = UnitOfWork()
              try:
                  yield uow
                  uow.commit()
              except Exception:
                  uow.rollback()
                  raise
      tags:
        - enterprise
        - unit-of-work
        - transaction
        - ddd

  - id: DP028
    title: 'CQRS Pattern'
    category: patterns
    level: advanced
    priority: medium
    content:
      description: |
        Command Query Responsibility Segregation - separate read and write
        operations into different models for scalability and optimization.
      rationale: |
        CQRS allows independent scaling and optimization of reads vs writes,
        enabling event sourcing and complex querying.
      good_examples:
        - |
          # Python - CQRS with separate read/write models
          from dataclasses import dataclass
          from abc import ABC, abstractmethod
          from typing import Protocol

          # Commands (Write side)
          @dataclass(frozen=True)
          class CreateOrderCommand:
              customer_id: str
              items: list[dict]

          @dataclass(frozen=True)
          class CancelOrderCommand:
              order_id: str
              reason: str

          class CommandHandler(Protocol):
              def handle(self, command) -> None: ...

          class CreateOrderHandler:
              def __init__(self, order_repo, event_bus):
                  self.order_repo = order_repo
                  self.event_bus = event_bus

              def handle(self, command: CreateOrderCommand) -> str:
                  # Business logic and validation
                  order = Order.create(
                      customer_id=command.customer_id,
                      items=command.items
                  )
                  self.order_repo.save(order)

                  # Publish event for read model update
                  self.event_bus.publish(OrderCreatedEvent(
                      order_id=order.id,
                      customer_id=order.customer_id,
                      total=order.total
                  ))
                  return order.id

          # Queries (Read side)
          @dataclass(frozen=True)
          class GetOrderQuery:
              order_id: str

          @dataclass(frozen=True)
          class ListCustomerOrdersQuery:
              customer_id: str
              page: int = 1
              limit: int = 10

          # Read model - optimized for queries
          @dataclass
          class OrderReadModel:
              id: str
              customer_name: str
              total: float
              status: str
              items_count: int

          class OrderQueryHandler:
              def __init__(self, read_db):
                  self.read_db = read_db  # Optimized read database

              def get_order(self, query: GetOrderQuery) -> OrderReadModel:
                  return self.read_db.find_order(query.order_id)

              def list_customer_orders(self, query: ListCustomerOrdersQuery) -> list[OrderReadModel]:
                  return self.read_db.find_orders_by_customer(
                      query.customer_id,
                      query.page,
                      query.limit
                  )
      tags:
        - enterprise
        - cqrs
        - architecture
        - ddd

  - id: DP029
    title: 'Event Sourcing Pattern'
    category: patterns
    level: expert
    priority: medium
    content:
      description: |
        Store the state of a business entity as a sequence of state-changing events.
        Reconstruct state by replaying events.
      rationale: |
        Event Sourcing provides complete audit trail, temporal queries,
        and the ability to rebuild state at any point in time.
      good_examples:
        - |
          # Python - Event Sourcing
          from dataclasses import dataclass, field
          from datetime import datetime
          from abc import ABC
          from typing import TypeVar, Generic
          import uuid

          @dataclass(frozen=True)
          class Event:
              event_id: str = field(default_factory=lambda: str(uuid.uuid4()))
              timestamp: datetime = field(default_factory=datetime.utcnow)

          @dataclass(frozen=True)
          class AccountCreated(Event):
              account_id: str
              owner_name: str

          @dataclass(frozen=True)
          class MoneyDeposited(Event):
              account_id: str
              amount: float

          @dataclass(frozen=True)
          class MoneyWithdrawn(Event):
              account_id: str
              amount: float

          class BankAccount:
              def __init__(self, account_id: str):
                  self.id = account_id
                  self.owner_name = ""
                  self.balance = 0.0
                  self._events: list[Event] = []

              @classmethod
              def from_events(cls, events: list[Event]) -> 'BankAccount':
                  """Reconstruct account state from events."""
                  if not events:
                      raise ValueError("No events to replay")

                  first_event = events[0]
                  if not isinstance(first_event, AccountCreated):
                      raise ValueError("First event must be AccountCreated")

                  account = cls(first_event.account_id)
                  for event in events:
                      account._apply(event)
                  return account

              def _apply(self, event: Event) -> None:
                  """Apply event to update state."""
                  if isinstance(event, AccountCreated):
                      self.owner_name = event.owner_name
                  elif isinstance(event, MoneyDeposited):
                      self.balance += event.amount
                  elif isinstance(event, MoneyWithdrawn):
                      self.balance -= event.amount

              def deposit(self, amount: float) -> MoneyDeposited:
                  if amount <= 0:
                      raise ValueError("Amount must be positive")
                  event = MoneyDeposited(account_id=self.id, amount=amount)
                  self._apply(event)
                  self._events.append(event)
                  return event

              def withdraw(self, amount: float) -> MoneyWithdrawn:
                  if amount > self.balance:
                      raise ValueError("Insufficient funds")
                  event = MoneyWithdrawn(account_id=self.id, amount=amount)
                  self._apply(event)
                  self._events.append(event)
                  return event

              @property
              def uncommitted_events(self) -> list[Event]:
                  return self._events.copy()

          # Event store
          class EventStore:
              def __init__(self):
                  self._events: dict[str, list[Event]] = {}

              def save(self, stream_id: str, events: list[Event]) -> None:
                  if stream_id not in self._events:
                      self._events[stream_id] = []
                  self._events[stream_id].extend(events)

              def load(self, stream_id: str) -> list[Event]:
                  return self._events.get(stream_id, [])
      tags:
        - enterprise
        - event-sourcing
        - audit
        - ddd

  - id: DP030
    title: 'Saga Pattern'
    category: patterns
    level: expert
    priority: medium
    content:
      description: |
        Manage distributed transactions across multiple services using a
        sequence of local transactions with compensating transactions for rollback.
      rationale: |
        Sagas enable reliable distributed transactions without two-phase
        commit, essential for microservices architectures.
      good_examples:
        - |
          # Python - Saga Orchestrator
          from dataclasses import dataclass, field
          from abc import ABC, abstractmethod
          from enum import Enum, auto
          from typing import Callable, Any

          class SagaState(Enum):
              PENDING = auto()
              RUNNING = auto()
              COMPLETED = auto()
              COMPENSATING = auto()
              FAILED = auto()

          @dataclass
          class SagaStep:
              name: str
              execute: Callable[[], Any]
              compensate: Callable[[], None]
              result: Any = None
              executed: bool = False

          class SagaOrchestrator:
              def __init__(self):
                  self.steps: list[SagaStep] = []
                  self.state = SagaState.PENDING
                  self.executed_steps: list[SagaStep] = []

              def add_step(
                  self,
                  name: str,
                  execute: Callable[[], Any],
                  compensate: Callable[[], None]
              ) -> 'SagaOrchestrator':
                  self.steps.append(SagaStep(name, execute, compensate))
                  return self

              def execute(self) -> bool:
                  self.state = SagaState.RUNNING

                  try:
                      for step in self.steps:
                          print(f"Executing: {step.name}")
                          step.result = step.execute()
                          step.executed = True
                          self.executed_steps.append(step)

                      self.state = SagaState.COMPLETED
                      return True

                  except Exception as e:
                      print(f"Step failed: {e}")
                      self._compensate()
                      return False

              def _compensate(self) -> None:
                  self.state = SagaState.COMPENSATING

                  # Compensate in reverse order
                  for step in reversed(self.executed_steps):
                      try:
                          print(f"Compensating: {step.name}")
                          step.compensate()
                      except Exception as e:
                          print(f"Compensation failed for {step.name}: {e}")
                          # Log and continue compensating

                  self.state = SagaState.FAILED

          # Usage - Order saga
          def create_order_saga(order_data: dict) -> SagaOrchestrator:
              return (
                  SagaOrchestrator()
                  .add_step(
                      "reserve_inventory",
                      lambda: inventory_service.reserve(order_data['items']),
                      lambda: inventory_service.release(order_data['items'])
                  )
                  .add_step(
                      "charge_payment",
                      lambda: payment_service.charge(order_data['payment']),
                      lambda: payment_service.refund(order_data['payment'])
                  )
                  .add_step(
                      "create_shipment",
                      lambda: shipping_service.create(order_data),
                      lambda: shipping_service.cancel(order_data['order_id'])
                  )
              )

          # Execute saga
          saga = create_order_saga(order_data)
          success = saga.execute()
      tags:
        - enterprise
        - saga
        - distributed-transactions
        - microservices
